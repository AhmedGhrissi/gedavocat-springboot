eidas_requirements:
  electronic_signatures:
    - name: "Qualified Timestamps"
      weight: 25
      implemented: true
      description: "TSA qualified timestamping"
    
    - name: "Long-term Signatures"
      weight: 20
      implemented: true
      description: "XAdES-LTA signatures"
    
    - name: "Archive Containers"
      weight: 20
      implemented: true
      description: "ASIC-E format containers"
    
    - name: "Legal Retention"
      weight: 20
      implemented: true
      description: "30-year minimum retention"
    
    - name: "Integrity Verification"
      weight: 15
      implemented: true
      description: "Periodic signature validation"

