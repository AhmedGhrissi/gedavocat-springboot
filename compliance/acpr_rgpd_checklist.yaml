      weight: 25
      implemented: true
      description: "Know Your Customer procedures"
    
    - name: "Transaction Monitoring"
      weight: 20
      implemented: true
      description: "Automated transaction analysis"
    
    - name: "PEP Screening"
      weight: 15
      implemented: true
