# ===================================================================
# Configuration O2Switch - GED Avocat (PRODUCTION)
# ===================================================================
# INSTRUCTIONS DE DÉPLOIEMENT:
# 1. Copiez ce fichier vers votre serveur O2Switch
# 2. Renommez-le en "application.properties"
# 3. Remplacez TOUTES les valeurs marquées avec VOTRE_XXX
# 4. Générez une nouvelle clé JWT sécurisée
# 5. Créez les répertoires d'upload avec les bonnes permissions
# ===================================================================

# ===================================================================
# PROFIL SPRING (Production)
# ===================================================================
spring.profiles.active=production
spring.application.name=GED Avocat

# ===================================================================
# Configuration du serveur
# ===================================================================
server.port=8080
server.address=0.0.0.0

# Contexte de l'application (décommentez si nécessaire)
# server.servlet.context-path=/gedavocat

# Timeout de session (30 minutes)
server.servlet.session.timeout=30m

# ===================================================================
# Configuration MySQL O2Switch
# ===================================================================
# IMPORTANT: Remplacez par vos identifiants O2Switch réels
# Format URL: jdbc:mysql://localhost:3306/NOM_BASE?options
spring.datasource.url=jdbc:mysql://localhost:3306/VOTRE_BASE_DE_DONNEES?useSSL=true&requireSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=false&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=VOTRE_UTILISATEUR_MYSQL
spring.datasource.password=VOTRE_MOT_DE_PASSE_MYSQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de connexions HikariCP (optimisé pour O2Switch)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=GedAvocatPool

# ===================================================================
# Configuration JPA / Hibernate
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ===================================================================
# Configuration Thymeleaf (cache activé pour la production)
# ===================================================================
spring.thymeleaf.cache=true
spring.thymeleaf.enabled=true
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ===================================================================
# Configuration des ressources statiques
# ===================================================================
spring.web.resources.cache.cachecontrol.max-age=7d
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# ===================================================================
# Configuration des fichiers uploadés
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=2MB

# Chemins de stockage O2Switch (IMPORTANT: Adapter ŕ votre structure)
# Format typique: /home/VOTRE_LOGIN/gedavocat/uploads
app.upload.dir=/home/VOTRE_UTILISATEUR/gedavocat/uploads/documents
app.signature.dir=/home/VOTRE_UTILISATEUR/gedavocat/uploads/signatures
app.temp.dir=/home/VOTRE_UTILISATEUR/gedavocat/temp

# Limites de stockage
app.storage.max-size=10GB
app.storage.quota-warning-threshold=80

# ===================================================================
# Configuration JWT (SÉCURITÉ CRITIQUE)
# ===================================================================
# IMPORTANT: Générez une clé secrčte unique et sécurisée
# Commande pour générer: openssl rand -base64 64
jwt.secret=CHANGEZ_CETTE_CLE_PAR_UNE_CLE_TRES_LONGUE_ET_SECURISEE_POUR_PRODUCTION_MINIMUM_64_CARACTERES
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===================================================================
# Configuration Email (SMTP O2Switch)
# ===================================================================
# IMPORTANT: Utilisez les paramčtres SMTP de votre domaine O2Switch
spring.mail.host=smtp.VOTRE_DOMAINE.com
spring.mail.port=587
spring.mail.username=noreply@VOTRE_DOMAINE.com
spring.mail.password=VOTRE_MOT_DE_PASSE_EMAIL
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.VOTRE_DOMAINE.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Configuration de l'expéditeur
app.mail.from=noreply@VOTRE_DOMAINE.com
app.mail.from-name=GED Avocat
app.mail.reply-to=contact@VOTRE_DOMAINE.com

# URL de base de l'application (pour les liens dans les emails)
app.base-url=https://VOTRE_DOMAINE.com

# ===================================================================
# Configuration des logs en production
# ===================================================================
logging.level.root=WARN
logging.level.com.gedavocat=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Fichier de log (adapter selon votre structure O2Switch)
logging.file.name=/home/VOTRE_UTILISATEUR/gedavocat/logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.file.total-size-cap=500MB

# Pattern des logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===================================================================
# Configuration de la compression HTTP
# ===================================================================
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024

# ===================================================================
# Configuration de sécurité en production
# ===================================================================
# Session sécurisée
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.name=GEDAVOCAT_SESSION

# Headers de sécurité
server.servlet.session.tracking-modes=cookie

# ===================================================================
# Configuration des erreurs
# ===================================================================
server.error.include-message=never
server.error.include-exception=false
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.whitelabel.enabled=false

# ===================================================================
# Configuration de l'actuator (monitoring)
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true
management.health.diskspace.enabled=true

# ===================================================================
# Configuration de l'encodage
# ===================================================================
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# ===================================================================
# Configuration CORS (si nécessaire pour une API)
# ===================================================================
# Décommentez et adaptez si vous avez un frontend séparé
# app.cors.allowed-origins=https://VOTRE_DOMAINE.com
# app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
# app.cors.allowed-headers=*
# app.cors.allow-credentials=true

# ===================================================================
# Configuration du cache (si Redis est disponible sur O2Switch)
# ===================================================================
# spring.cache.type=redis
# spring.redis.host=localhost
# spring.redis.port=6379
# spring.redis.password=VOTRE_MOT_DE_PASSE_REDIS

# ===================================================================
# Configuration de la base de données de sauvegarde
# ===================================================================
# Activation des sauvegardes automatiques
app.backup.enabled=true
app.backup.schedule=0 0 2 * * ?
app.backup.retention-days=30
app.backup.dir=/home/VOTRE_UTILISATEUR/gedavocat/backups

# ===================================================================
# Configuration des notifications
# ===================================================================
app.notifications.enabled=true
app.notifications.admin-email=admin@VOTRE_DOMAINE.com

# ===================================================================
# Configuration du RGPD
# ===================================================================
app.gdpr.data-retention-days=2555
app.gdpr.deletion-warning-days=30

# ===================================================================
# Configuration de la facturation (si Stripe/PayPal)
# ===================================================================
# stripe.api.key=sk_live_VOTRE_CLE_STRIPE
# stripe.webhook.secret=whsec_VOTRE_SECRET_WEBHOOK

# ===================================================================
# NOTES IMPORTANTES POUR O2SWITCH:
# ===================================================================
# 1. Créez les répertoires nécessaires:
#    mkdir -p ~/gedavocat/{uploads/documents,uploads/signatures,logs,temp,backups}
#    chmod 755 ~/gedavocat
#    chmod 700 ~/gedavocat/uploads
#
# 2. Vérifiez la version de Java disponible:
#    java -version
#    (O2Switch supporte généralement Java 11+)
#
# 3. Configurez MySQL via cPanel:
#    - Créez la base de données
#    - Créez l'utilisateur MySQL
#    - Associez l'utilisateur ŕ la base
#    - Notez les identifiants
#
# 4. Importez le schéma de base de données:
#    mysql -u VOTRE_USER -p VOTRE_BASE < database-init.sql
#
# 5. Testez la connexion SSH et les permissions avant le déploiement
#
# 6. Utilisez systemd ou un script de démarrage pour lancer l'application
#    au démarrage du serveur
#
# 7. Configurez un reverse proxy (Apache/Nginx) via cPanel si nécessaire
#
# 8. Activez HTTPS via Let's Encrypt dans cPanel (gratuit avec O2Switch)
#
# 9. Vérifiez les logs aprčs le premier déploiement:
#    tail -f ~/gedavocat/logs/application.log
#
# 10. Configurez les tâches CRON pour les sauvegardes automatiques
# ===================================================================

# ===================================================================
# Profil actif
# ===================================================================
spring.profiles.active=prod
