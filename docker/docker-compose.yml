# ============================================================
# DocAvocat — Docker Compose Production
#
# L'image de l'app est récupérée depuis le GitLab Container Registry.
# Elle est construite et poussée par la CI (stage "package").
# La variable APP_IMAGE est injectée dans .env par le stage "deploy".
#
# Nginx reste sur le HOST (SSL Let's Encrypt géré par Certbot).
# Ce compose gère : Spring Boot App + MySQL 8 + Loki + Grafana + Promtail
#
# Logs : Grafana accessible sur http://localhost:3000 (tunnel SSH recommandé)
#   ssh -L 3000:localhost:3000 user@<SERVER_IP>
#
# Utilisation :
#   docker compose pull app
#   docker compose up -d --no-deps app
# ============================================================

services:

  # ── MySQL 8 ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: docavocat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: gedavocat
      MYSQL_USER: gedavocat
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      # Script d'initialisation complète de la BDD (structure + données)
      # Exécuté uniquement au premier démarrage (fresh install)
      - ./init/01-gedavocat-dump.sql:/docker-entrypoint-initdb.d/01-gedavocat-dump.sql:ro
    ports:
      # Accessible uniquement en local (pour les backups manuels via mysqldump)
      - "127.0.0.1:3307:3306"
    networks:
      - docavocat-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "gedavocat", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=Europe/Paris
      --max_connections=200
      --innodb_buffer_pool_size=256M
      --default_table_encryption=ON
      --require_secure_transport=ON
      --local_infile=OFF
      --skip-symbolic-links
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        tag: "docavocat-mysql"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'

  # ── Backup automatique MySQL ────────────────────────────────
  # Dump complet toutes les 4h → /opt/docavocat/backups
  # Rétention 30 jours. Prêt pour upload S3 (Phase 2 Scaleway).
  backup:
    image: mysql:8.0
    container_name: docavocat-backup
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - /opt/docavocat/backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: ["bash", "/backup.sh"]
    networks:
      - docavocat-net
    depends_on:
      mysql:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "docavocat-backup"

  # ── Application Spring Boot — Slot BLUE (actif par défaut) ────
  # Blue/Green deploy : blue=8080, green=8081
  # Le slot actif est déterminé par /etc/nginx/conf.d/upstream-app.conf
  # La CI bascule nginx vers le slot prêt (zero-downtime)
  app:
    image: ${APP_IMAGE}
    container_name: docavocat-app-blue
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    links:
      - mysql
    ports:
      # Slot BLUE — nginx pointe ici par défaut
      - "127.0.0.1:8080:8080"
    environment:
      SERVER_PORT: 8080

      # Base de données — SEC-HARDENED : useSSL=true, ddl-auto=validate
      # DB_HOST=mysql         → MySQL local Docker (défaut, développement)
      # DB_HOST=10.0.0.2      → VM dédiée Hetzner via vSwitch (production cible)
      SPRING_DATASOURCE_URL: "jdbc:mysql://${DB_HOST:-mysql}:${DB_PORT:-3306}/gedavocat?useSSL=true&requireSSL=true&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8"
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-gedavocat}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USERNAME: ${DB_USERNAME:-gedavocat}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      APP_BASE_URL: https://docavocat.fr

      # JWT — SEC-HARDENED : 15 min access + 4h refresh (OWASP)
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 14400000

      # SEC-HARDENED : Clé AES-256 pour chiffrement secrets MFA en BDD
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}

      # Email SMTP — o2switch : port 587 + STARTTLS
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST: ${MAIL_HOST}
      MAIL_FROM: ${MAIL_USERNAME:-noreply@docavocat.fr}

      # Application  
      APP_UPLOAD_DIR: /opt/docavocat/uploads/documents
      APP_SIGNATURE_DIR: /opt/docavocat/uploads/signatures
      APP_TEMP_DIR: /opt/docavocat/temp
      SPRING_PROFILES_ACTIVE: prod
      MAINTENANCE_ENABLED: ${MAINTENANCE_ENABLED:-false}

      # Ressources statiques externes (prioritaires sur celles du JAR)
      SPRING_WEB_RESOURCES_STATIC_LOCATIONS: "file:/opt/docavocat/static-override/,classpath:/static/"

      # Services externes (APIs)
      YOUSIGN_API_KEY: ${YOUSIGN_API_KEY} # gitleaks:allow - env var reference
      STRIPE_API_KEY: ${STRIPE_API_KEY:-} # gitleaks:allow - env var reference
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      
      # RPVA — Réseau Privé Virtuel Avocats (e-Barreau)
      RPVA_API_KEY: ${RPVA_API_KEY:-}
      RPVA_CERT_PATH: ${RPVA_CERT_PATH:-}
      RPVA_CERT_PASSWORD: ${RPVA_CERT_PASSWORD:-}

      # RGPD — DPO (requis par loi française)
      DPO_NAME: ${DPO_NAME}
      DPO_EMAIL: ${DPO_EMAIL}
      DPO_PHONE: ${DPO_PHONE:-}
      DPO_ADDRESS: ${DPO_ADDRESS:-}
      DPO_CERTIFICATION: ${DPO_CERTIFICATION:-}

      # PRA — Plan de Reprise d'Activité (ISO 27001)
      PRA_CONTACT: ${PRA_CONTACT}
      PRA_BACKUP_SITE: ${PRA_BACKUP_SITE:-}

      # Logs JSON structurés (lisibles par Loki/Promtail)
      LOGGING_STRUCTURED_FORMAT_CONSOLE_ENABLED: "false"

    volumes:
      - /opt/docavocat/uploads:/opt/docavocat/uploads
      - /opt/docavocat/logs:/opt/docavocat/logs
      - /opt/docavocat/temp:/opt/docavocat/temp
      - /opt/docavocat/backups:/opt/docavocat/backups
      - /opt/docavocat/static-override:/opt/docavocat/static-override:ro
      # Docker socket removed for security — DO NOT mount docker.sock in app container
    networks:
      - docavocat-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        tag: "docavocat-app"
    # SEC-HARDENED : non-root, no-new-privileges, capabilities minimales
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=100M
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
        reservations:
          memory: 384M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Application Spring Boot — Slot GREEN (déployé en alternance) ─
  # Ce slot est démarré par la CI lors d'un deploy, puis nginx bascule vers lui.
  # Il reste arrêté en temps normal (profiles: [green] = optionnel).
  app-green:
    image: ${APP_IMAGE}
    container_name: docavocat-app-green
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    links:
      - mysql
    ports:
      # Slot GREEN — port alternatif, invisible depuis l'extérieur tant que nginx ne pointe pas dessus
      - "127.0.0.1:8081:8080"
    environment:
      SERVER_PORT: 8080
      # Base de données — même config que blue
      SPRING_DATASOURCE_URL: "jdbc:mysql://${DB_HOST:-mysql}:${DB_PORT:-3306}/gedavocat?useSSL=true&requireSSL=true&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8"
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-gedavocat}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USERNAME: ${DB_USERNAME:-gedavocat}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      APP_BASE_URL: https://docavocat.fr
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 14400000
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST: ${MAIL_HOST}
      MAIL_FROM: ${MAIL_USERNAME:-noreply@docavocat.fr}
      APP_UPLOAD_DIR: /opt/docavocat/uploads/documents
      APP_SIGNATURE_DIR: /opt/docavocat/uploads/signatures
      APP_TEMP_DIR: /opt/docavocat/temp
      SPRING_PROFILES_ACTIVE: prod
      MAINTENANCE_ENABLED: ${MAINTENANCE_ENABLED:-false}
      SPRING_WEB_RESOURCES_STATIC_LOCATIONS: "file:/opt/docavocat/static-override/,classpath:/static/"
      YOUSIGN_API_KEY: ${YOUSIGN_API_KEY} # gitleaks:allow
      STRIPE_API_KEY: ${STRIPE_API_KEY:-} # gitleaks:allow
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      RPVA_API_KEY: ${RPVA_API_KEY:-}
      RPVA_CERT_PATH: ${RPVA_CERT_PATH:-}
      RPVA_CERT_PASSWORD: ${RPVA_CERT_PASSWORD:-}
      DPO_NAME: ${DPO_NAME}
      DPO_EMAIL: ${DPO_EMAIL}
      DPO_PHONE: ${DPO_PHONE:-}
      DPO_ADDRESS: ${DPO_ADDRESS:-}
      DPO_CERTIFICATION: ${DPO_CERTIFICATION:-}
      PRA_CONTACT: ${PRA_CONTACT}
      PRA_BACKUP_SITE: ${PRA_BACKUP_SITE:-}
      LOGGING_STRUCTURED_FORMAT_CONSOLE_ENABLED: "false"
    volumes:
      - /opt/docavocat/uploads:/opt/docavocat/uploads
      - /opt/docavocat/logs:/opt/docavocat/logs
      - /opt/docavocat/temp:/opt/docavocat/temp
      - /opt/docavocat/backups:/opt/docavocat/backups
      - /opt/docavocat/static-override:/opt/docavocat/static-override:ro
    networks:
      - docavocat-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        tag: "docavocat-app-green"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=100M
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
        reservations:
          memory: 384M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Loki (stockage et requêtes de logs) ─────────────────────
  loki:
    image: grafana/loki:2.9.8
    container_name: docavocat-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - /opt/docavocat/loki:/etc/loki:ro
    networks:
      - docavocat-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Promtail (collecte les logs Docker → Loki) ──────────────
  promtail:
    image: grafana/promtail:3.3.2
    container_name: docavocat-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/docavocat/promtail:/etc/promtail:ro
      - promtail_positions:/tmp/promtail
    networks:
      - docavocat-net
    depends_on:
      - loki
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Prometheus (métriques time-series) ──────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: docavocat-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus:/etc/prometheus:ro
    networks:
      - docavocat-net
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Node Exporter (métriques système) ───────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: docavocat-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    networks:
      - docavocat-net
    ports:
      - "127.0.0.1:9100:9100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── MySQL Exporter (métriques MySQL) ────────────────────────
  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: docavocat-mysql-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "gedavocat:${MYSQL_PASSWORD}@(mysql:3306)/"
    networks:
      - docavocat-net
    ports:
      - "127.0.0.1:9104:9104"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9104/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── cAdvisor (métriques Docker) ─────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: docavocat-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - docavocat-net
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Grafana (interface web de visualisation) ────────────────
  # Accès UNIQUEMENT via tunnel SSH :
  #   ssh -L 3000:localhost:3000 user@<SERVER_IP>
  # puis ouvrir http://localhost:3000
  #
  # Sécurité : read-only filesystem, non-root, caps drop ALL,
  #            no-new-privileges, limites mémoire/CPU, réseau interne.
  grafana:
    image: grafana/grafana:11.3.0
    container_name: docavocat-grafana
    restart: unless-stopped
    # ── Exécution non-root ──
    user: "472:472"
    # ── Sécurité Linux ──
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    # ── Ports (localhost uniquement — jamais exposer sur 0.0.0.0) ──
    ports:
      - "127.0.0.1:3000:3000"
    # ── Variables d'environnement ──
    environment:
      # Admin credentials via .env
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}
      # Désactiver toute inscription et télémétrie
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Paths internes (pour tmpfs)
      GF_PATHS_DATA: /var/lib/grafana
      GF_PATHS_LOGS: /var/log/grafana
      GF_PATHS_PLUGINS: /var/lib/grafana/plugins
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      # Installer aucun plugin (surface d'attaque minimale)
      GF_INSTALL_PLUGINS: ""
    volumes:
      # Données persistantes
      - grafana_data:/var/lib/grafana
      # Configuration de sécurité personnalisée (read-only)
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      # Provisioning (read-only)
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    # ── tmpfs pour les écritures temporaires (read-only rootfs) ──
    tmpfs:
      - /var/log/grafana:uid=472,gid=472
      - /tmp:uid=472,gid=472
    # ── Limites de ressources ──
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'
        reservations:
          memory: 128M
          cpus: '0.10'
    # ── Réseau interne uniquement ──
    networks:
      - docavocat-net
    depends_on:
      - loki
      - prometheus
    # ── Healthcheck ──
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # ── Logging ──
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "docavocat-grafana"

  # ── Alertmanager (routage des alertes Prometheus) ───────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: docavocat-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./alertmanager:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    networks:
      - docavocat-net
    ports:
      - "127.0.0.1:9093:9093"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Discord Webhook Relay (Alertmanager → Discord) ──────────
  discord-webhook:
    image: benjojo/alertmanager-discord:latest
    container_name: docavocat-discord-webhook
    restart: unless-stopped
    environment:
      DISCORD_WEBHOOK: ${DISCORD_WEBHOOK_URL}
    networks:
      - docavocat-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.10'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Réseau interne ──────────────────────────────────────────
networks:
  docavocat-net:
    name: docavocat-net
    driver: bridge

# ── Volumes persistants ─────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
  promtail_positions:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
