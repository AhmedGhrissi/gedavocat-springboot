# ============================================================
# DocAvocat — Docker Compose Production
#
# L'image de l'app est récupérée depuis le GitLab Container Registry.
# Elle est construite et poussée par la CI (stage "package").
# La variable APP_IMAGE est injectée dans .env par le stage "deploy".
#
# Nginx reste sur le HOST (SSL Let's Encrypt géré par Certbot).
# Ce compose gère : Spring Boot App + MySQL 8 + Loki + Grafana + Promtail
#
# Logs : Grafana accessible sur http://localhost:3000 (tunnel SSH recommandé)
#   ssh -L 3000:localhost:3000 user@<SERVER_IP>
#
# Utilisation :
#   docker compose pull app
#   docker compose up -d --no-deps app
# ============================================================

services:

  # ── MySQL 8 ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: docavocat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: gedavocat
      MYSQL_USER: gedavocat
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      # Note : le script init/01-schema.sql n'est exécuté qu'une seule fois
      # à la création du volume (fresh install). Décommenter si nécessaire.
      # - ./init/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      # Accessible uniquement en local (pour les backups manuels via mysqldump)
      - "127.0.0.1:3307:3306"
    networks:
      - docavocat-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "gedavocat", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=Europe/Paris
      --max_connections=200
      --innodb_buffer_pool_size=256M

  # ── Application Spring Boot ─────────────────────────────────
  # L'image est définie par APP_IMAGE dans .env (injecté par la CI)
  app:
    image: ${APP_IMAGE}
    container_name: docavocat-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      # Exposé uniquement sur localhost — nginx du host proxyfie vers ici
      - "127.0.0.1:8080:8080"
    environment:
      SERVER_PORT: 8080

      # Base de données — SEC-HARDENED : useSSL=true, ddl-auto=validate
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/gedavocat?useSSL=true&requireSSL=true&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8"
      SPRING_DATASOURCE_USERNAME: gedavocat
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate

      # JWT — SEC-HARDENED : 15 min access + 4h refresh (OWASP)
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 14400000

      # SEC-HARDENED : Clé AES-256 pour chiffrement secrets MFA en BDD
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}

      # Email SMTP — o2switch : port 587 + STARTTLS
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST: ${MAIL_HOST}
      MAIL_FROM: ${MAIL_USERNAME:-noreply@docavocat.fr}

      # Application
      APP_BASE-URL: https://docavocat.fr
      APP_UPLOAD_DIR: /opt/gedavocat/uploads/documents
      APP_SIGNATURE_DIR: /opt/gedavocat/uploads/signatures
      APP_TEMP_DIR: /opt/gedavocat/temp
      SPRING_PROFILES_ACTIVE: prod
      MAINTENANCE_ENABLED: ${MAINTENANCE_ENABLED:-false}

      # Ressources statiques externes (prioritaires sur celles du JAR)
      SPRING_WEB_RESOURCES_STATIC_LOCATIONS: "file:/opt/gedavocat/static-override/,classpath:/static/"

      # Services externes (APIs)
      YOUSIGN_API_KEY: ${YOUSIGN_API_KEY} # gitleaks:allow - env var reference
      STRIPE_API_KEY: ${STRIPE_API_KEY:-} # gitleaks:allow - env var reference
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}

      # Logs JSON structurés (lisibles par Loki/Promtail)
      LOGGING_STRUCTURED_FORMAT_CONSOLE_ENABLED: "false"

    volumes:
      - /opt/gedavocat/uploads:/opt/gedavocat/uploads
      - /opt/gedavocat/logs:/opt/gedavocat/logs
      - /opt/gedavocat/temp:/opt/gedavocat/temp
      - /opt/gedavocat/backups:/opt/gedavocat/backups
      - /opt/gedavocat/static-override:/opt/gedavocat/static-override:ro
      # Docker socket removed for security — DO NOT mount docker.sock in app container
    networks:
      - docavocat-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        tag: "docavocat-app"
    healthcheck:
      # SEC-HARDENED : actuator désactivé en prod, vérifier la page de login
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Loki (stockage et requêtes de logs) ─────────────────────
  loki:
    image: grafana/loki:2.9.8
    container_name: docavocat-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - /opt/gedavocat/loki:/etc/loki:ro
    networks:
      - docavocat-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── Promtail (collecte les logs Docker → Loki) ──────────────
  promtail:
    image: grafana/promtail:3.3.2
    container_name: docavocat-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/gedavocat/promtail:/etc/promtail:ro
      - promtail_positions:/tmp/promtail
    networks:
      - docavocat-net
    depends_on:
      - loki

  # ── Prometheus (métriques time-series) ──────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: docavocat-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus:/etc/prometheus:ro
    networks:
      - docavocat-net
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── Node Exporter (métriques système) ───────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: docavocat-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    networks:
      - docavocat-net
    ports:
      - "127.0.0.1:9100:9100"

  # ── MySQL Exporter (métriques MySQL) ────────────────────────
  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: docavocat-mysql-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "gedavocat:${MYSQL_PASSWORD}@(mysql:3306)/"
    networks:
      - docavocat-net
    ports:
      - "127.0.0.1:9104:9104"
    depends_on:
      mysql:
        condition: service_healthy

  # ── cAdvisor (métriques Docker) ─────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: docavocat-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - docavocat-net
    ports:
      - "127.0.0.1:8081:8080"

  # ── Grafana (interface web de visualisation) ────────────────
  # Accès UNIQUEMENT via tunnel SSH :
  #   ssh -L 3000:localhost:3000 user@<SERVER_IP>
  # puis ouvrir http://localhost:3000
  #
  # Sécurité : read-only filesystem, non-root, caps drop ALL,
  #            no-new-privileges, limites mémoire/CPU, réseau interne.
  grafana:
    image: grafana/grafana:11.3.0
    container_name: docavocat-grafana
    restart: unless-stopped
    # ── Exécution non-root ──
    user: "472:472"
    # ── Sécurité Linux ──
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    # ── Ports (localhost uniquement — jamais exposer sur 0.0.0.0) ──
    ports:
      - "127.0.0.1:3000:3000"
    # ── Variables d'environnement ──
    environment:
      # Admin credentials via .env
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}
      # Désactiver toute inscription et télémétrie
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Paths internes (pour tmpfs)
      GF_PATHS_DATA: /var/lib/grafana
      GF_PATHS_LOGS: /var/log/grafana
      GF_PATHS_PLUGINS: /var/lib/grafana/plugins
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      # Installer aucun plugin (surface d'attaque minimale)
      GF_INSTALL_PLUGINS: ""
    volumes:
      # Données persistantes
      - grafana_data:/var/lib/grafana
      # Configuration de sécurité personnalisée (read-only)
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      # Provisioning (read-only)
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    # ── tmpfs pour les écritures temporaires (read-only rootfs) ──
    tmpfs:
      - /var/log/grafana:uid=472,gid=472
      - /tmp:uid=472,gid=472
    # ── Limites de ressources ──
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.50'
        reservations:
          memory: 128M
          cpus: '0.10'
    # ── Réseau interne uniquement ──
    networks:
      - docavocat-net
    depends_on:
      - loki
      - prometheus
    # ── Healthcheck ──
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # ── Logging ──
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "docavocat-grafana"

# ── Réseau interne ──────────────────────────────────────────
networks:
  docavocat-net:
    driver: bridge

# ── Volumes persistants ─────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
  promtail_positions:
    driver: local
  prometheus_data:
    driver: local
