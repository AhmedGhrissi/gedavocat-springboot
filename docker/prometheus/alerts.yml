# ========================================
# PROMETHEUS ALERTS
# ========================================

groups:
  - name: gedavocat_alerts
    interval: 30s
    rules:
      # ==========================================
      # APPLICATION
      # ==========================================
      - alert: ApplicationDown
        expr: up{job="gedavocat-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "GedAvocat application is DOWN"
          description: "{{ $labels.instance }} has been down for more than 1 minute"

      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow response time (P95 > 1s)"
          description: "95th percentile response time is {{ $value }}s on {{ $labels.instance }}"

      # ==========================================
      # DATABASE
      # ==========================================
      - alert: MySQLDown
        expr: up{job="mysql"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL database is DOWN"
          description: "MySQL on {{ $labels.instance }} has been down for more than 1 minute"

      - alert: MySQLTooManyConnections
        expr: mysql_global_status_threads_connected > 150
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL too many connections"
          description: "MySQL has {{ $value }} connections (max 200)"

      - alert: MySQLSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL slow queries detected"
          description: "{{ $value }} slow queries per second"

      # ==========================================
      # SYSTEM (CPU, RAM, DISK)
      # ==========================================
      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low"
          description: "Disk space is {{ $value | humanizePercentage }} free on {{ $labels.instance }}"

      # ==========================================
      # DOCKER
      # ==========================================
      - alert: ContainerDown
        expr: absent(container_last_seen{name=~"gedavocat.*"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Docker container is down"
          description: "Container {{ $labels.name }} is not running"

      - alert: HighContainerCPU
        expr: rate(container_cpu_usage_seconds_total{name=~"gedavocat.*"}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High container CPU"
          description: "Container {{ $labels.name }} CPU is {{ $value }}%"

      - alert: HighContainerMemory
        expr: (container_memory_usage_bytes{name=~"gedavocat.*"} / container_spec_memory_limit_bytes{name=~"gedavocat.*"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High container memory"
          description: "Container {{ $labels.name }} memory is {{ $value }}%"

      # ==========================================
      # SSL CERTIFICATE
      # ==========================================
      - alert: SSLCertificateExpiringSoon
        expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 7
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate expires in {{ $value | humanizeDuration }}"
