; ============================================================
; DocAvocat — Grafana Security Hardening Configuration
; Niveau : Maximum (conformité militaire / ISO 27001)
;
; Ce fichier verrouille Grafana pour un usage interne uniquement.
; Accès exclusivement via tunnel SSH.
; ============================================================

; ── Instance ──────────────────────────────────────────────────
[instance]
instance_name = docavocat-grafana

; ── Server ────────────────────────────────────────────────────
[server]
; Bind uniquement sur l'interface interne du container
http_addr = 0.0.0.0
http_port = 3000
protocol = http
; Désactiver le mode développement
router_logging = false
; Empêcher le sniffing de version
enable_gzip = true
; URL racine (tunnel SSH)
root_url = https://grafana.docavocat.fr
; Empêcher l'accès direct sans proxy
serve_from_sub_path = false

; ── Sécurité ──────────────────────────────────────────────────
[security]
; Désactiver le compte admin par défaut après le premier login
disable_initial_admin_creation = false
; Mot de passe admin via variable d'environnement (jamais en clair ici)
admin_user = $__env{GF_SECURITY_ADMIN_USER}
admin_password = $__env{GF_SECURITY_ADMIN_PASSWORD}
; Empêcher le brute-force
login_remember_days = 1
; Clé secrète pour le chiffrement (via env)
secret_key = $__env{GF_SECURITY_SECRET_KEY}
; Anti-CSRF
cookie_secure = true
cookie_samesite = strict
; Interdire l'embedding dans des iframes (anti-clickjacking)
allow_embedding = false
; Vérification stricte de l'origine des cookies
cookie_httponly = true
; Durée de vie stricte des cookies (2h max)
login_maximum_inactive_lifetime_duration = 2h
login_maximum_lifetime_duration = 12h
; Politique de mot de passe stricte
password_policy = true
; Longueur minimale du mot de passe
minimum_password_length = 12

; ── Headers de sécurité HTTP ──────────────────────────────────
[security.headers]
; Content Security Policy stricte
content_security_policy = true
content_security_policy_template = """script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"""
; Strict Transport Security (même si HTTP derrière tunnel SSH)
strict_transport_security = false
; Anti-MIME sniffing
x_content_type_options = true
; Anti-clickjacking (double protection avec CSP frame-ancestors)
x_xss_protection = true

; ── Authentification ──────────────────────────────────────────
[auth]
; Désactiver toutes les méthodes d'auth sauf login/password
disable_login_form = false
disable_signout_menu = false
; Verrouiller le compte après 5 tentatives échouées
login_maximum_failed_attempts = 5
; Durée du blocage : 15 minutes
login_lock_duration = 15m
; Empêcher la connexion automatique
oauth_auto_login = false
; Pas d'authentification anonyme
signout_redirect_url =
; Cacher le formulaire de reset password (pas de SMTP configuré)
disable_login = false

; ── Authentification anonyme ──────────────────────────────────
[auth.anonymous]
; INTERDIT : jamais d'accès anonyme
enabled = false

; ── Auth basique (API) ────────────────────────────────────────
[auth.basic]
; Autoriser uniquement pour les requêtes API internes
enabled = true

; ── Utilisateurs ──────────────────────────────────────────────
[users]
; Interdire l'auto-inscription
allow_sign_up = false
; Interdire la création d'organisations
allow_org_create = false
; Rôle par défaut : Viewer (principe du moindre privilège)
auto_assign_org_role = Viewer
; Désactiver la modification du login/email par l'utilisateur
login_hint = admin
; Empêcher les viewers d'éditer les dashboards
viewers_can_edit = false
; Cacher la page d'accueil par défaut
default_theme = dark
; Empêcher les editors de devenir admin
editors_can_admin = false

; ── Snapshots ─────────────────────────────────────────────────
[snapshots]
; Désactiver les snapshots (fuite de données possible)
enabled = false
; Interdire les snapshots externes
external_enabled = false

; ── Dashboards ────────────────────────────────────────────────
[dashboards]
; Désactiver les versions provisionnées modifiables
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/docavocat.json
; Historique limité
versions_to_keep = 5
; Intervalle de sauvegarde minimal
min_refresh_interval = 10s

; ── Analytics & Reporting ─────────────────────────────────────
[analytics]
; Désactiver TOUTE télémétrie
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false
feedback_links_enabled = false
; Pas de Google Analytics
google_analytics_ua_id =
google_analytics_4_id =

; ── Logging ───────────────────────────────────────────────────
[log]
; Logs structurés pour Loki
mode = console
level = warn
; Format JSON pour ingestion par Promtail/Loki
filters = 

[log.console]
format = json

; ── Audit Log (traçabilité complète) ──────────────────────────
[auditing]
; Activer l'audit log (disponible en Grafana Enterprise, préparé ici)
; enabled = true
; log_dashboard_content = true

; ── Alerting ──────────────────────────────────────────────────
[alerting]
; Utiliser unified_alerting uniquement
enabled = false

[unified_alerting]
enabled = false

; ── Explore ───────────────────────────────────────────────────
[explore]
; Restreindre Explore aux admins uniquement
enabled = true

; ── Grafana Live (WebSocket) ──────────────────────────────────
[live]
; Désactiver le streaming en temps réel (surface d'attaque)
allowed_origins =
max_connections = 0

; ── Feature Toggles ───────────────────────────────────────────
[feature_toggles]
; Pas de features expérimentales en production
enable =

; ── Plugins ───────────────────────────────────────────────────
[plugins]
; Interdire les plugins non signés
allow_loading_unsigned_plugins =
; Désactiver le catalogue de plugins (pas d'installation depuis l'UI)
plugin_catalog_hidden_plugins = *
enable_alpha = false

; ── Data Proxy ────────────────────────────────────────────────
[dataproxy]
; Timeout strict pour les requêtes vers les datasources
timeout = 30
; Nombre max de connexions idle
max_idle_connections = 10
; Logging des requêtes lentes
logging = true
; Timeouts serrés
keep_alive_seconds = 30

; ── Quota (limites de ressources) ─────────────────────────────
[quota]
enabled = true
; Limiter le nombre de dashboards
org_dashboard = 50
; Limiter les datasources
org_data_source = 10
; Limiter les utilisateurs par org
org_user = 5
; Limiter les API keys
org_api_key = 3
; Limites globales
global_user = 10
global_org = 1
global_dashboard = 100
global_api_key = 5
global_session = 20

; ── SMTP (désactivé — pas de reset mail) ──────────────────────
[smtp]
enabled = false

; ── Annotations ───────────────────────────────────────────────
[annotations]
; Nettoyer les vieilles annotations
cleanupjob_batchsize = 100

[annotations.dashboard]
max_age = 30d
max_annotations_to_keep = 1000

[annotations.api]
max_age = 30d
max_annotations_to_keep = 500

; ── External Image Storage (désactivé) ────────────────────────
[external_image_storage]
provider =

; ── Rendering (désactivé — surface d'attaque) ─────────────────
[rendering]
server_url =
callback_url =

; ── Panels (restrictions) ─────────────────────────────────────
[panels]
disable_sanitize_html = false
enable_alpha = false
