# ============================================================
# DocAvocat — Nginx Reverse Proxy Configuration (Production)
#
# Fichier de référence à déployer sur le serveur Hetzner.
# Emplacement cible : /etc/nginx/sites-available/docavocat.conf
# Activer : ln -s /etc/nginx/sites-available/docavocat.conf /etc/nginx/sites-enabled/
#
# Pré-requis :
#   certbot certonly --nginx -d docavocat.fr -d www.docavocat.fr
#
# NOTE : Les security headers (CSP, X-Frame-Options, etc.) sont gérés
# par Spring Security. Nginx ne doit PAS les ajouter en double.
# Seul HSTS est ajouté ici car il doit être sur toutes les réponses
# (y compris les pages d'erreur Nginx).
# ============================================================

# ── Rate limiting global ──────────────────────────────────────
# 10 req/s par IP avec burst de 20 (absorbe les pics légitimes)
limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;

# Zone stricte pour login/API sensibles : 2 req/s
limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

# Zone upload : 5 req/s (évite le spam de fichiers)
limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;

# ── Redirect HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name docavocat.fr www.docavocat.fr;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://docavocat.fr$request_uri;
    }
}

# ── Redirect www → non-www (HTTPS) ────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.docavocat.fr;

    ssl_certificate /etc/letsencrypt/live/docavocat.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docavocat.fr/privkey.pem;

    return 301 https://docavocat.fr$request_uri;
}

# ── Serveur principal ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docavocat.fr;

    # ── TLS Configuration (Mozilla Modern) ─────────────────────
    ssl_certificate /etc/letsencrypt/live/docavocat.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docavocat.fr/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/docavocat.fr/chain.pem;

    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── HSTS (2 ans + preload) ─────────────────────────────────
    # HSTS est le SEUL header de sécurité ajouté par Nginx.
    # Tous les autres (CSP, X-Frame-Options, etc.) viennent de Spring Security.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Limites globales ───────────────────────────────────────
    client_max_body_size 25m;
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 30s;
    keepalive_timeout 65;

    # Désactiver l'affichage de la version Nginx
    server_tokens off;

    # ── Proxy vers Spring Boot ─────────────────────────────────
    location / {
        limit_req zone=global burst=20 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Headers proxy standards
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket support (si besoin futur)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # ── Rate limiting renforcé pour auth ───────────────────────
    location ~ ^/(login|api/auth|api/login|api/register|api/password) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Rate limiting upload ───────────────────────────────────
    location ~ ^/(documents/upload|api/documents) {
        limit_req zone=upload burst=10 nodelay;
        client_max_body_size 25m;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }

    # ── Bloquer l'accès à actuator depuis l'extérieur ──────────
    location /actuator {
        # Seul localhost (Docker healthcheck) y accède
        deny all;
        return 404;
    }

    # ── Bloquer les paths sensibles ────────────────────────────
    location ~ /\.(git|env|svn|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~ ^/(wp-admin|wp-login|xmlrpc|phpmyadmin|myadmin) {
        deny all;
        return 444;
    }

    # ── Fichiers statiques (cache long) ────────────────────────
    location ~* \.(css|js|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health check Nginx ─────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Logs ───────────────────────────────────────────────────
    access_log /var/log/nginx/docavocat-access.log combined buffer=16k flush=5s;
    error_log /var/log/nginx/docavocat-error.log warn;
}
