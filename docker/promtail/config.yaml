server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Logs de l'app Spring Boot ───────────────────────────────
  - job_name: docavocat-app
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: name
            values: ["docavocat-app"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - replacement: docavocat
        target_label: app
      - replacement: production
        target_label: env

  # ── Logs MySQL ──────────────────────────────────────────────
  - job_name: docavocat-mysql
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: name
            values: ["docavocat-mysql"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - replacement: mysql
        target_label: service
      - replacement: production
        target_label: env
