# ============================================================
# DocAvocat — Services infra (CX23 docavocat-services)
#
# Services :
#   - MinIO  : stockage S3 compatible (documents, signatures)
#   - Redis  : cache + queues async
#
# Variables d'environnement requises dans .env :
#   MINIO_ROOT_USER, MINIO_ROOT_PASSWORD
#   REDIS_PASSWORD
#
# Démarrage :
#   docker compose up -d
#
# Accès console MinIO (tunnel SSH) :
#   ssh -L 9001:localhost:9001 deploy@188.245.158.191
#   puis ouvrir http://localhost:9001
# ============================================================

services:

  # ── MinIO (stockage S3 compatible) ────────────────────────
  minio:
    image: minio/minio:latest
    container_name: docavocat-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "10.0.0.3:9000:9000"   # API S3 (réseau privé Hetzner uniquement)
      - "127.0.0.1:9001:9001"   # Console web (tunnel SSH uniquement)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ""
    volumes:
      - /opt/services/minio/data:/data
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
        tag: "docavocat-minio"

  # ── MinIO init (crée les buckets au démarrage) ────────────
  minio-init:
    image: minio/mc:latest
    container_name: docavocat-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/docavocat-documents;
        mc mb --ignore-existing local/docavocat-signatures;
        mc mb --ignore-existing local/docavocat-temp;
        echo 'Buckets créés';
      "
    networks:
      - services-net

  # ── Redis (cache + queues async) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: docavocat-redis
    user: "999:999"
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - "10.0.0.3:6379:6379"
    volumes:
      - /opt/services/redis/data:/data
    networks:
      - services-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 320M
          cpus: '0.3'
        reservations:
          memory: 64M
          cpus: '0.05'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "docavocat-redis"

# ── Réseau interne ───────────────────────────────────────
networks:
  services-net:
    name: services-net
    driver: bridge
