# ============================================================
# DocAvocat — GitHub Actions CI/CD
# Push main → Build Docker ARM64 → Deploy SSH (Blue/Green)
# ============================================================

name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      fast:
        description: 'Sauter les tests Maven'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write   # Push vers GHCR

env:
  IMAGE: ghcr.io/ahmedghrissi/gedavocat-springboot

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # ── Tests Maven (sautes si [fast] dans le message) ──────────────────
      - name: Setup Java 17
        if: ${{ !contains(github.event.head_commit.message, '[fast]') && github.event.inputs.fast != 'true' }}
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        if: ${{ !contains(github.event.head_commit.message, '[fast]') && github.event.inputs.fast != 'true' }}
        run: mvn test -q
        env:
          SPRING_PROFILES_ACTIVE: h2

      # ── Build & Push image Docker ARM64 vers GHCR ───────────────────────
      - name: Setup QEMU (ARM64)
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy Blue/Green Zero-Downtime ──────────────────────────────────
      - name: Deploy Blue/Green
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ${{ env.IMAGE }}:latest
          ENV_PROD: ${{ secrets.ENV_PROD }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          GIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: APP_IMAGE,ENV_PROD,GHCR_TOKEN,CLOUDFLARE_API_TOKEN,CLOUDFLARE_ZONE_ID,GIT_SHA
          command_timeout: 10m
          script: |
            set -e
            cd /opt/docavocat

            # Fetch latest docker-compose.yml from GitHub (repo public)
            curl -sL "https://raw.githubusercontent.com/AhmedGhrissi/gedavocat-springboot/${GIT_SHA}/docker/docker-compose.yml" \
              -o /opt/docavocat/docker-compose.yml

            echo "$ENV_PROD" > .env && chmod 600 .env
            sed -i '/^APP_IMAGE=/d' .env && echo "APP_IMAGE=$APP_IMAGE" >> .env

            echo "$GHCR_TOKEN" | docker login ghcr.io -u AhmedGhrissi --password-stdin

            UPSTREAM_FILE="/etc/nginx/conf.d/upstream-app.conf"
            [ -f "$UPSTREAM_FILE" ] || echo "upstream docavocat_app { server 127.0.0.1:8080; }" > "$UPSTREAM_FILE"

            CURRENT_PORT=$(grep -oP '127\.0\.0\.1:\K\d+' "$UPSTREAM_FILE" | head -1)
            if [ "$CURRENT_PORT" = "8080" ]; then
              ACTIVE_SLOT="blue";  IDLE_SLOT="green"; IDLE_PORT="8081"; ACTIVE_PORT="8080"
            else
              ACTIVE_SLOT="green"; IDLE_SLOT="blue";  IDLE_PORT="8080"; ACTIVE_PORT="8081"
            fi
            ACTIVE_SERVICE=$([ "$ACTIVE_SLOT" = "blue" ] && echo "app" || echo "app-green")
            IDLE_SERVICE=$([ "$IDLE_SLOT"   = "blue" ] && echo "app" || echo "app-green")
            echo ">> Deploy sur $IDLE_SLOT:$IDLE_PORT (actif=$ACTIVE_SLOT:$ACTIVE_PORT)"

            docker image prune -f || true
            docker compose pull $IDLE_SERVICE

            for i in $(seq 1 30); do
              docker compose exec -T mysql mysqladmin ping -h localhost --silent 2>/dev/null && break || true
              sleep 2
            done

            docker compose up -d --no-deps --force-recreate $IDLE_SERVICE

            READY=0
            for i in $(seq 1 60); do
              curl -sf "http://localhost:$IDLE_PORT/actuator/health" 2>/dev/null | grep -q '"status":"UP"' && READY=1 && break || true
              echo "Attente $((i*3))s..."
              sleep 3
            done

            if [ "$READY" != "1" ]; then
              echo "ERREUR: $IDLE_SLOT non pret — rollback"
              docker compose stop $IDLE_SERVICE || true
              exit 1
            fi

            echo "upstream docavocat_app { server 127.0.0.1:$IDLE_PORT; }" > "$UPSTREAM_FILE"
            nginx -t && nginx -s reload
            echo ">> Nginx -> $IDLE_SLOT:$IDLE_PORT"

            sleep 2
            HTTP=$(curl -so /dev/null -w "%{http_code}" https://docavocat.fr/ || echo "000")
            if [ "$HTTP" != "200" ] && [ "$HTTP" != "302" ]; then
              echo "ERREUR: HTTP $HTTP — rollback nginx"
              echo "upstream docavocat_app { server 127.0.0.1:$ACTIVE_PORT; }" > "$UPSTREAM_FILE"
              nginx -s reload
              docker compose stop $IDLE_SERVICE || true
              exit 1
            fi
            echo ">> Site OK HTTP $HTTP"

            curl -sf https://docavocat.fr/actuator/health | grep -q '"status":"UP"' && echo "Health OK" || true
            curl -sf https://docavocat.fr/login > /dev/null && echo "Login OK" || true

            sleep 30
            docker compose stop $ACTIVE_SERVICE || true
            docker image prune -f || true
            echo ">> Deploy OK : $IDLE_SLOT actif"

            if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ZONE_ID" ]; then
              curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"purge_everything":true}' && echo "Cloudflare purge OK" || echo "Cloudflare purge KO (non bloquant)"
            fi
