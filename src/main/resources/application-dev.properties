# ===================================================================
# Configuration DEV - Pour développement local avec Docker
# Usage: mvn spring-boot:run -Dspring-boot.run.profiles=dev
#        ou java -jar app.jar --spring.profiles.active=dev
# ===================================================================

# ── Base de données (Docker port 3307) ──────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3307/gedavocat?useSSL=false&serverTimezone=Europe/Paris&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:gedavocat}
spring.datasource.password=${DB_PASSWORD:DocAvocat2026!DevDB}

# ── JPA pour dev : création automatique du schéma ──────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Logs plus détaillés pour dev ────────────────────────────────────
logging.level.com.gedavocat=DEBUG
logging.level.org.springframework.security=DEBUG

# ── Désactiver les vérifications strictes pour dev ──────────────────
spring.mail.test-connection=false

# ── Mode dev ─────────────────────────────────────────────────────────
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ── Email (pas besoin pour démo) ─────────────────────────────────────
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:dev}
spring.mail.password=${MAIL_PASSWORD:dev}
