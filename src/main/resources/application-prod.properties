# ===================================================================
# GED Avocat — Configuration PRODUCTION
# Surcharge application.properties pour le profil "prod"
# ===================================================================

# ===================================================================
# Logging — niveaux de production (écrasent application.properties)
# ===================================================================
# En dev, org.springframework.web=DEBUG est utile.
# En prod, on passe tout à WARN sauf DispatcherServlet à INFO
# pour conserver les "Completed 200/404/500 OK" dans Grafana.
logging.level.root=INFO
logging.level.com.gedavocat=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
# DispatcherServlet en INFO en production (pas DEBUG — trop verbeux et risque de fuite d'infos)
logging.level.org.springframework.web.servlet.DispatcherServlet=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.catalina=WARN

# ===================================================================
# JPA — pas de SQL en clair en prod
# SEC-DDL FIX : validate au lieu de update en prod (pas de modification auto du schéma)
# ===================================================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate

# ===================================================================
# Reverse proxy (nginx) — respect des headers X-Forwarded-*
# Indispensable pour que Spring génère des URLs en https:// et non http://
# ===================================================================
server.forward-headers-strategy=NATIVE

# ===================================================================
# Thymeleaf — cache activé en prod
# ===================================================================
spring.thymeleaf.cache=true

# ===================================================================
# URL de base de l'application
# ===================================================================
app.base-url=https://docavocat.fr

# ===================================================================
# Yousign — Signature électronique
# ===================================================================
yousign.api.key=${YOUSIGN_API_KEY}
yousign.api.url=https://api.yousign.app
yousign.api.version=v3
