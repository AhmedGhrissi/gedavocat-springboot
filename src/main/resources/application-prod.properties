# ===================================================================
# GED Avocat — Configuration PRODUCTION
# Surcharge application.properties pour le profil "prod"
# ===================================================================

# ===================================================================
# Logging — niveaux de production (écrasent application.properties)
# ===================================================================
# En dev, org.springframework.web=DEBUG est utile.
# En prod, on passe tout à WARN sauf DispatcherServlet à INFO
# pour conserver les "Completed 200/404/500 OK" dans Grafana.
logging.level.root=INFO
logging.level.com.gedavocat=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
# DispatcherServlet en DEBUG : conserve "Completed 200/302/404/500 OK"
# nécessaire pour les panels Trafic HTTP de Grafana (|~ " 200 " etc.)
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.catalina=WARN

# ===================================================================
# JPA — pas de SQL en clair en prod
# ===================================================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===================================================================
# Thymeleaf — cache activé en prod
# ===================================================================
spring.thymeleaf.cache=true
