# Merged by copilot: keys from both OURS and THEIRS; OURS wins on duplicates
app.base-url=https://docavocat.fr
logging.level.com.gedavocat=INFO
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.root=INFO
management.endpoint.health.enabled=true
management.endpoint.health.show-details=never
management.endpoints.enabled-by-default=false
management.endpoints.web.exposure.include=health
management.server.port=
server.forward-headers-strategy=NATIVE
spring.h2.console.enabled=false
# SEC-HARDENED : validate en prod (schéma géré par Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
spring.thymeleaf.cache=true
yousign.api.key=${YOUSIGN_API_KEY}
yousign.api.url=https://api-sandbox.yousign.app
yousign.api.version=v3
