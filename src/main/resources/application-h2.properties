# ===================================================================
# GED Avocat - Configuration H2 (Base de données en mémoire)
# Aucun MySQL requis - Parfait pour les tests rapides
# ===================================================================
# Pour l'utiliser : --spring.profiles.active=h2

# ===================================================================
# Logging - MODE DEBUG
# ===================================================================
debug=false
logging.level.root=INFO
logging.level.com.gedavocat=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG

# ===================================================================
# Serveur
# ===================================================================
server.port=8081
# SEC-HARDENED : ne jamais exposer stacktraces même en dev/H2 (risque si profil activé par erreur)
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# ===================================================================
# H2 Database - EN MEMOIRE (aucune installation requise)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:gedavocat;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 accessible sur http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ===================================================================
# JPA / Hibernate
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Désactiver schema.sql (MySQL) — Hibernate gère le schéma avec ddl-auto
spring.sql.init.mode=never

# ===================================================================
# Thymeleaf
# ===================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ===================================================================
# Jackson
# ===================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ===================================================================
# Upload fichiers
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=./uploads/documents
app.signature.dir=./uploads/signatures

# ===================================================================
# JWT
# ===================================================================
jwt.secret=${JWT_SECRET:}
# SEC-HARDENED : 15 minutes même en H2
jwt.expiration=900000

# ===================================================================
# Actuator
# ===================================================================
# SEC-HARDENED : même en H2, limiter l'exposition actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoint.info.enabled=true

# ===================================================================
# Session
# ===================================================================
# SEC-HARDENED : 30 minutes même en H2
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=DOCAVOCAT_H2
# SEC-HARDENED : même en H2, forcer secure cookie (protège si accédé via HTTPS)
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=Strict

# ===================================================================
# Email
# ===================================================================
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=test@localhost
app.base-url=http://localhost:8081

# ===================================================================
# API externes
