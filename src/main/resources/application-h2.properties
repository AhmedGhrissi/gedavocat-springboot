# ===================================================================
# GED Avocat - Configuration H2 (Base de données en mémoire)
# Aucun MySQL requis - Parfait pour les tests rapides
# ===================================================================
# Pour l'utiliser : --spring.profiles.active=h2

# ===================================================================
# Logging - MODE DEBUG
# ===================================================================
debug=true
logging.level.root=INFO
logging.level.com.gedavocat=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG

# ===================================================================
# Serveur
# ===================================================================
server.port=8081
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-exception=true

# ===================================================================
# H2 Database - EN MEMOIRE (aucune installation requise)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:gedavocat;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 accessible sur http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===================================================================
# JPA / Hibernate
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================================================================
# Thymeleaf
# ===================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ===================================================================
# Jackson
# ===================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ===================================================================
# Upload fichiers
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=./uploads/documents
app.signature.dir=./uploads/signatures

# ===================================================================
# JWT
# ===================================================================
