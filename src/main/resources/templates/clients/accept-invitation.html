<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Créer votre compte - GedAvocat</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white text-center">
                        <h4 class="mb-0">
                            <i class="fas fa-user-plus"></i> Créer votre compte client
                        </h4>
                    </div>
                    <div class="card-body p-4">
                        <p class="text-muted text-center mb-4">
                            Vous avez été invité(e) à accéder au portail client GedAvocat.<br>
                            Créez votre mot de passe pour commencer.
                        </p>

                        <div th:if="${error}" class="alert alert-danger mb-3">
                            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Erreur</span>
                        </div>

                        <form th:action="@{/clients/accept-invitation}" method="post">
                            <input type="hidden" name="token" th:value="${token}"/>

                            <div class="mb-3">
                                <label class="form-label">Adresse email</label>
                                <input type="email" class="form-control" th:value="${email}" readonly>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Mot de passe *</label>
                                <input type="password" id="password" name="password"
                                       class="form-control" required minlength="8"
                                       placeholder="Minimum 8 caractères">
                            </div>

                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label">Confirmer le mot de passe *</label>
                                <input type="password" id="confirmPassword" name="confirmPassword"
                                       class="form-control" required minlength="8"
                                       placeholder="Répétez votre mot de passe">
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-check"></i> Créer mon compte
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
