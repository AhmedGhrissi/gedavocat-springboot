<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Lien expiré - GedAvocat</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 text-center">
                <div class="card animate-fade-in-up" style="border:none;border-radius:var(--radius-2xl);box-shadow:var(--shadow-lg)">
                    <div class="card-body p-5">
                        <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#fef3c7,#fde68a);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1.5rem">
                            <i class="fas fa-clock fa-2x" style="color:#f59e0b"></i>
                        </div>
                        <h3 style="font-weight:700;color:var(--text-primary)">Lien d'invitation expiré</h3>
                        <p style="color:var(--text-secondary)" th:text="${error}">Ce lien d'invitation est invalide ou a expiré.</p>
                        <p style="color:var(--text-secondary)">
                            Veuillez contacter votre avocat pour qu'il vous renvoie une invitation.
                        </p>
                        <a href="/login" class="btn btn-primary mt-3" style="border-radius:var(--radius-md);font-weight:600">
                            <i class="fas fa-sign-in-alt"></i> Aller à la connexion
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
