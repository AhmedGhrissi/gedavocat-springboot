<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    
    <style>
        /* Dark theme overrides for this page */
        :root { --bg:#080b14; --surface-1:#0f172a; --surface-2:#1e2d3d; --border:rgba(148,163,184,0.12); --text-primary:#f1f5f9; --text-secondary:#94a3b8; --primary:#667eea; --accent:#818cf8; }
        h1,h2,h3,h4,h5,h6 { color: var(--text-primary) !important; }
        p, label, span { color: inherit; }
        .card { background: rgba(255,255,255,0.04) !important; border-color: var(--border) !important; }
        .card-header { background: transparent !important; border-color: var(--border) !important; color: var(--text-primary) !important; }
        .text-muted { color: var(--text-secondary) !important; }
        a { color: var(--accent); }
    </style><title>Lien expiré - GedAvocat</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 text-center">
                <div class="card shadow-sm">
                    <div class="card-body p-5">
                        <i class="fas fa-clock fa-4x text-warning mb-4"></i>
                        <h3>Lien d'invitation expiré</h3>
                        <p class="text-muted" th:text="${error}">Ce lien d'invitation est invalide ou a expiré.</p>
                        <p class="text-muted">
                            Veuillez contacter votre avocat pour qu'il vous renvoie une invitation.
                        </p>
                        <a href="/login" class="btn btn-primary mt-3">
                            <i class="fas fa-sign-in-alt"></i> Aller à la connexion
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
