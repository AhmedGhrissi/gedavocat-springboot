<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Lien expiré - GedAvocat</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 text-center">
                <div class="card shadow-sm">
                    <div class="card-body p-5">
                        <i class="fas fa-clock fa-4x text-warning mb-4"></i>
                        <h3>Lien d'invitation expiré</h3>
                        <p class="text-muted" th:text="${error}">Ce lien d'invitation est invalide ou a expiré.</p>
                        <p class="text-muted">
                            Veuillez contacter votre avocat pour qu'il vous renvoie une invitation.
                        </p>
                        <a href="/login" class="btn btn-primary mt-3">
                            <i class="fas fa-sign-in-alt"></i> Aller à la connexion
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
