<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    
    <style>
        /* Dark theme overrides for this page */
        :root { --bg:#080b14; --surface-1:#0f172a; --surface-2:#1e2d3d; --border:rgba(148,163,184,0.12); --text-primary:#f1f5f9; --text-secondary:#94a3b8; --primary:#667eea; --accent:#818cf8; }
        h1,h2,h3,h4,h5,h6 { color: var(--text-primary) !important; }
        p, label, span { color: inherit; }
        .card { background: rgba(255,255,255,0.04) !important; border-color: var(--border) !important; }
        .card-header { background: transparent !important; border-color: var(--border) !important; color: var(--text-primary) !important; }
        .text-muted { color: var(--text-secondary) !important; }
        a { color: var(--accent); }
    </style><title>Détails client</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mt-3 mb-3">
                <h1><i class="fas fa-user"></i> <span th:text="${client.name}">Client</span></h1>
                <div>
                    <a th:href="@{/clients/{id}/edit(id=${client.id})}" class="btn btn-warning">
                        <i class="fas fa-edit"></i> Modifier
                    </a>
                    <form th:action="@{/clients/{id}/delete(id=${client.id})}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-danger" 
                                onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce client ?')">
                            <i class="fas fa-trash"></i> Supprimer
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-info-circle"></i> Informations</h5>
                        </div>
                        <div class="card-body">
                            <table class="table">
                                <tr>
                                    <th>Nom :</th>
                                    <td th:text="${client.name}">Nom</td>
                                </tr>
                                <tr>
                                    <th>Email :</th>
                                    <td>
                                        <a th:href="'mailto:' + ${client.email}" th:text="${client.email}">Email</a>
                                    </td>
                                </tr>
                                <tr>
                                    <th>Téléphone :</th>
                                    <td th:text="${client.phone ?: '-'}">Téléphone</td>
                                </tr>
                                <tr>
                                    <th>Adresse :</th>
                                    <td th:text="${client.address ?: '-'}">Adresse</td>
                                </tr>
                                <tr>
                                    <th>Date création :</th>
                                    <td th:text="${#temporals.format(client.createdAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                                </tr>
                                <tr>
                                    <th>Dernière modification :</th>
                                    <td th:text="${#temporals.format(client.updatedAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                                </tr>
                                <tr th:if="${client.accessEndsAt}">
                                    <th>Fin d'accès :</th>
                                    <td th:text="${#temporals.format(client.accessEndsAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-folder-open"></i> Dossiers</h5>
                        </div>
                        <div class="card-body">
                            <div th:if="${client.cases != null && !client.cases.empty}">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th>Nom</th>
                                            <th>Statut</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="case : ${client.cases}">
                                            <td>
                                                <a th:href="@{/cases/{id}(id=${case.id})}" th:text="${case.name}">Dossier</a>
                                            </td>
                                            <td>
                                                <span class="badge" 
                                                      th:classappend="${case.status.name() == 'OPEN' ? 'bg-success' : (case.status.name() == 'CLOSED' ? 'bg-warning' : 'bg-secondary')}"
                                                      th:text="${case.status.displayName}">Statut</span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div th:if="${client.cases == null || client.cases.empty}" class="text-center p-3">
                                <p>Aucun dossier pour ce client</p>
                            </div>
                            <a th:href="@{/cases/new?clientId={clientId}(clientId=${client.id})}" class="btn btn-primary btn-sm">
                                <i class="fas fa-folder-plus"></i> Créer un dossier
                            </a>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-3">
                <a th:href="@{/clients}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Retour à la liste
                </a>
            </div>
        </div>
    </div>
</body>
</html>
