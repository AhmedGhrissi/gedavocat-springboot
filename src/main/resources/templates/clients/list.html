<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<div layout:fragment="content">

    <th:block layout:fragment="extra-css">
        <style>
            /* FIX URGENT - Boutons actions toujours visibles */
            .btn {
                display: inline-flex !important;
                align-items: center;
                gap: 0.25rem;
                padding: 0.375rem 0.75rem;
                border-radius: 6px;
                text-decoration: none;
                transition: all 0.2s;
                white-space: nowrap;
            }
            .btn-ghost {
                background: #F8FAFC !important;
                border: 2px solid #0F172A !important;
                color: #0F172A !important;
                font-weight: 600 !important;
            }
            .btn-ghost:hover {
                background: #0F172A !important;
                color: #FFFFFF !important;
                border-color: #0F172A !important;
                transform: translateY(-1px);
            }
            .btn-sm {
                padding: 0.5rem 0.75rem !important;
                font-size: 0.875rem;
            }
            .btn i {
                color: inherit !important;
                font-size: 1rem;
            }
            .action-buttons {
                display: flex !important;
                gap: 0.5rem;
                justify-content: flex-start;
            }
            .table-modern td {
                padding: 1rem !important;
                vertical-align: middle;
            }
            .table-modern thead th {
                padding: 1rem !important;
                background: #F8FAFC;
                font-weight: 600;
                color: #0F172A;
            }
            .card-body {
                padding: 0 !important;
            }
            /* Avatar styling */
            .avatar {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                background: #0F172A;
                color: #FFFFFF;
                font-weight: 600;
            }
            .avatar-sm {
                width: 40px;
                height: 40px;
                font-size: 0.875rem;
            }

            /* Tooltip styles: position tooltip text above the button on hover */
            .tooltip {
                position: relative;
                display: inline-flex; /* keeps button sizing intact */
                align-items: center;
            }
            .tooltip .tooltip-text {
                visibility: hidden;
                opacity: 0;
                pointer-events: none;
                position: absolute;
                bottom: calc(100% + 8px);
                left: 50%;
                transform: translateX(-50%);
                background: rgba(15, 23, 42, 0.95);
                color: #fff;
                padding: 6px 8px;
                border-radius: 6px;
                font-size: 0.8125rem;
                white-space: nowrap;
                z-index: 9999;
                transition: opacity 150ms ease, transform 150ms ease;
            }
            .tooltip:hover .tooltip-text,
            .tooltip:focus-within .tooltip-text {
                visibility: visible;
                opacity: 1;
                transform: translateX(-50%) translateY(-4px);
                pointer-events: auto;
            }
            /* Small arrow under tooltip */
            .tooltip .tooltip-text::after {
                content: '';
                position: absolute;
                top: 100%;
                left: 50%;
                transform: translateX(-50%);
                border-width: 6px;
                border-style: solid;
                border-color: rgba(15, 23, 42, 0.95) transparent transparent transparent;
            }

            /* Ensure icon-only buttons remain square and visible */
            .btn.btn-ghost.btn-sm {
                min-width: 40px;
                height: 36px;
                justify-content: center;
                padding: 0.375rem;
            }

            /* Accessible focus state */
            .btn:focus {
                outline: 2px solid rgba(99, 102, 241, 0.6);
                outline-offset: 2px;
            }

            /* Responsive adjustments */
            @media (max-width: 480px) {
                .tooltip .tooltip-text { font-size: 0.75rem; }
                .btn.btn-ghost.btn-sm { min-width: 36px; height: 34px; }
            }
        </style>
    </th:block>

    <!-- Toast notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
        <div th:if="${message}" id="toastSuccess" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${message}"></span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Fermer"></button>
            </div>
        </div>
        <div th:if="${warning}" id="toastWarning" class="toast align-items-center text-bg-warning border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${warning}"></span>
                </div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Fermer"></button>
            </div>
        </div>
        <div th:if="${error}" id="toastError" class="toast align-items-center text-bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="fas fa-times-circle me-2"></i><span th:text="${error}"></span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Fermer"></button>
            </div>
        </div>
    </div>

    <!-- Page Header -->
    <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
        <div>
            <h1 class="page-title" style="font-size: 1.75rem; font-weight: 700; color: #0F172A; margin-bottom: 0.5rem;">
                <i class="fas fa-users" style="color: #C6A75E; margin-right: 0.75rem;"></i>
                Mes clients
            </h1>
            <p class="page-subtitle">
                <span th:text="${totalClients} + ' client(s) enregistré(s)'">0 clients</span>
            </p>
        </div>
        <div style="display: flex; gap: 0.75rem;">
            <a th:href="@{/clients/new}" class="btn btn-primary">
                <i class="fas fa-user-plus"></i>
                Nouveau client
            </a>
            <button class="btn btn-secondary" onclick="window.print()">
                <i class="fas fa-print"></i>
                Imprimer
            </button>
        </div>
    </div>

    <!-- Search & Filters -->
    <div class="card" style="margin-bottom: 1.5rem;">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <div class="search-bar">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="search-input" placeholder="Rechercher un client..." 
                               id="searchClients" onkeyup="filterClients()">
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="filterClientType" onchange="filterClients()">
                        <option value="">Tous les types</option>
                        <option value="INDIVIDUAL">Particulier</option>
                        <option value="COMPANY">Entreprise</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="sortClients" onchange="filterClients()">
                        <option value="name-asc">Nom (A-Z)</option>
                        <option value="name-desc">Nom (Z-A)</option>
                        <option value="date-desc">Plus récents</option>
                        <option value="date-asc">Plus anciens</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Clients List -->
    <div class="card card-elevated">
        <div class="card-header">
            <h3>
                <i class="fas fa-list"></i>
                Liste des clients
            </h3>
        </div>
        <div class="card-body p-0">
            <div th:if="${!clients.empty}">
                <table class="table-modern" id="clientsTable">
                    <thead>
                        <tr>
                            <th><i class="fas fa-user"></i> Client</th>
                            <th><i class="fas fa-envelope"></i> Email</th>
                            <th><i class="fas fa-phone"></i> Téléphone</th>
                            <th><i class="fas fa-folder"></i> Dossiers</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="client : ${clients}">
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <div class="avatar avatar-sm" th:text="${client.name != null and client.name.length() > 0 ? client.name.substring(0, 1).toUpperCase() : 'C'}">C</div>
                                    <a th:href="@{/clients/{id}(id=${client.id})}" 
                                       class="case-name-link"
                                       th:text="${client.name}">Client</a>
                                </div>
                            </td>
                            <td>
                                <a th:href="'mailto:' + ${client.email}" class="client-link"
                                   th:text="${client.email}">email@example.com</a>
                            </td>
                            <td>
                                <span th:if="${client.phone != null}" th:text="${client.phone}">-</span>
                                <span th:if="${client.phone == null}" class="text-muted">-</span>
                            </td>
                            <td>
                                <span class="badge badge-info" 
                                      th:text="${client.cases != null ? client.cases.size() + ' dossier(s)' : '0 dossier'}">0 dossiers</span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a th:href="@{/clients/{id}(id=${client.id})}" 
                                       class="btn btn-ghost btn-sm tooltip" data-tooltip="Voir détails">
                                        <i class="fas fa-eye"></i>
                                        <span class="tooltip-text">Voir détails</span>
                                    </a>
                                    <a th:href="@{/clients/{id}/edit(id=${client.id})}" 
                                       class="btn btn-ghost btn-sm tooltip" data-tooltip="Modifier">
                                        <i class="fas fa-edit"></i>
                                        <span class="tooltip-text">Modifier</span>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:if="${clients.empty}" class="empty-state">
                <i class="fas fa-users empty-state-icon"></i>
                <h3 class="empty-state-title">Aucun client</h3>
                <p class="empty-state-message">Commencez par ajouter votre premier client</p>
                <a th:href="@{/clients/new}" class="btn btn-primary mt-3">
                    <i class="fas fa-user-plus"></i> Ajouter un client
                </a>
            </div>
        </div>
    </div>

    <script th:attr="nonce=${cspNonce}">
    document.addEventListener('DOMContentLoaded', function () {
        ['toastSuccess', 'toastWarning', 'toastError'].forEach(function (id) {
            const el = document.getElementById(id);
            if (el) {
                const toast = new bootstrap.Toast(el, { delay: 5000 });
                toast.show();
            }
        });
    });

    function filterClients() {
        const input = document.getElementById('searchClients');
        const filter = input.value.toLowerCase();
        const table = document.getElementById('clientsTable');
        const rows = table.getElementsByTagName('tr');
        
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            const text = row.textContent || row.innerText;
            row.style.display = text.toLowerCase().indexOf(filter) > -1 ? '' : 'none';
        }
    }
    </script>
</div>
</html>
