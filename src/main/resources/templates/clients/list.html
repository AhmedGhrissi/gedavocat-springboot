<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Clients</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container-fluid">
            <!-- Messages -->
            <div th:if="${message}" class="alert alert-success alert-dismissible fade show mt-3" role="alert">
                <i class="fas fa-check-circle me-2"></i> <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- En-tête -->
            <div class="hero-banner mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div style="position:relative;z-index:1">
                        <h1 style="font-size:1.5rem;font-weight:800;letter-spacing:-0.025em;margin-bottom:4px;color:#fff">
                            <i class="fas fa-users me-2"></i>Clients
                        </h1>
                        <p style="font-size:0.875rem;margin:0;color:rgba(255,255,255,0.8)"
                           th:text="${totalClients + ' client(s)'}">0 client(s)</p>
                    </div>
                    <a th:href="@{/clients/new}" class="btn" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius-lg);font-weight:600;backdrop-filter:blur(8px);padding:8px 18px">
                        <i class="fas fa-user-plus me-1"></i> Nouveau client
                    </a>
                </div>
            </div>

            <!-- Recherche -->
            <div class="card mb-3">
                <div class="card-body py-3">
                    <form th:action="@{/clients}" method="get" class="d-flex gap-2">
                        <input type="text" name="search" th:value="${search}"
                               class="form-control form-control-sm" placeholder="Rechercher par nom, email ou nom de dossier...">
                        <button type="submit" class="btn btn-sm btn-primary">
                            <i class="fas fa-search"></i>
                        </button>
                        <a th:if="${search != null and !search.isEmpty()}" th:href="@{/clients}" class="btn btn-sm btn-outline-secondary">
                            <i class="fas fa-times"></i>
                        </a>
                    </form>
                </div>
            </div>

            <!-- Liste -->
            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive" th:if="${!clients.empty}">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th style="padding-left:20px">Client</th>
                                    <th>Type</th>
                                    <th>Email</th>
                                    <th>Téléphone</th>
                                    <th>Portail</th>
                                    <th>Créé le</th>
                                    <th style="width:220px">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="client : ${clients}">
                                    <td style="padding-left:20px">
                                        <a th:href="@{/clients/{id}(id=${client.id})}" 
                                           th:text="${client.name}" 
                                           class="text-decoration-none fw-semibold">Nom</a>
                                        <div th:if="${client.companyName != null and !client.companyName.isEmpty()}"
                                             class="text-muted" style="font-size:12px"
                                             th:text="${client.companyName}">Société</div>
                                    </td>
                                    <td>
                                        <span th:if="${client.clientType != null and client.clientType.name() == 'PROFESSIONAL'}"
                                              class="badge bg-info" style="font-size:11px">
                                            <i class="fas fa-building"></i> Pro
                                        </span>
                                        <span th:if="${client.clientType == null or client.clientType.name() == 'INDIVIDUAL'}"
                                              class="badge bg-secondary" style="font-size:11px">
                                            <i class="fas fa-user"></i> Particulier
                                        </span>
                                    </td>
                                    <td style="font-size:13px" th:text="${client.email}">Email</td>
                                    <td style="font-size:13px" th:text="${client.phone ?: '—'}">—</td>
                                    <td>
                                        <span th:if="${client.invitationStatus == 'VALIDATED'}" class="badge bg-success">
                                            <i class="fas fa-check-circle"></i> Actif
                                        </span>
                                        <span th:if="${client.invitationStatus == 'PENDING'}" class="badge bg-warning text-dark">
                                            <i class="fas fa-clock"></i> En attente
                                        </span>
                                        <span th:if="${client.invitationStatus == 'EXPIRED'}" class="badge bg-danger">
                                            <i class="fas fa-times-circle"></i> Expiré
                                        </span>
                                        <span th:if="${client.invitationStatus == 'NOT_INVITED'}" class="badge bg-secondary">
                                            Non invité
                                        </span>
                                    </td>
                                    <td style="font-size:13px" th:text="${#temporals.format(client.createdAt, 'dd/MM/yyyy')}">Date</td>
                                    <td>
                                        <div class="d-flex gap-1">
                                            <a th:href="@{/clients/{id}(id=${client.id})}" class="btn btn-sm btn-outline-info" title="Voir">
                                                <i class="fas fa-eye"></i>
                                            </a>
                                            <a th:href="@{/clients/{id}/edit(id=${client.id})}" class="btn btn-sm btn-outline-warning" title="Modifier">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <a th:href="@{/cases/new?clientId={cid}(cid=${client.id})}" class="btn btn-sm btn-outline-primary" title="Nouveau dossier">
                                                <i class="fas fa-folder-plus"></i>
                                            </a>
                                            <form th:action="@{/clients/{id}/delete(id=${client.id})}" method="post" style="display:inline">
                                                <button type="submit" class="btn btn-sm btn-outline-danger" title="Supprimer"
                                                        onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce client et tous ses dossiers ?')">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div th:if="${clients.empty}" class="text-center py-5">
                        <div style="width:64px;height:64px;border-radius:var(--radius-xl);background:var(--bg-tertiary);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem">
                            <i class="fas fa-users fa-2x" style="color:var(--text-tertiary)"></i>
                        </div>
                        <h5 style="color:var(--text-primary);font-weight:600">Aucun client trouvé</h5>
                        <p style="color:var(--text-secondary)" th:if="${search != null and !search.isEmpty()}">
                            Aucun résultat pour « <span th:text="${search}"></span> »
                        </p>
                        <p style="color:var(--text-secondary)" th:if="${search == null or search.isEmpty()}">
                            Commencez par créer votre premier client
                        </p>
                        <a th:href="@{/clients/new}" class="btn btn-primary mt-2" style="border-radius:var(--radius-lg);font-weight:600">
                            <i class="fas fa-user-plus"></i> Créer un client
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
