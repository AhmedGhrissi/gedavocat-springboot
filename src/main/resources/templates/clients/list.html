<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Clients</title>
</head>
<body>
    <div layout:fragment="content">
        <!-- Flash messages -->
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show mx-3 mt-3" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mx-3 mt-3" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="container">
            <div class="d-flex justify-content-between align-items-center mt-3 mb-3">
                <h1><i class="fas fa-users"></i> Mes clients</h1>
                <a th:href="@{/clients/new}" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i> Nouveau client
                </a>
            </div>
            
            <!-- Recherche -->
            <div class="card mb-3">
                <div class="card-body">
                    <form th:action="@{/clients}" method="get" class="row">
                        <div class="col-md-10">
                            <input type="text" name="search" th:value="${search}" 
                                   class="form-control" placeholder="Rechercher un client (nom ou email)...">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-search"></i> Rechercher
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Statistiques -->
            <div class="mb-3">
                <p><strong th:text="${totalClients}">0</strong> client(s) au total</p>
            </div>
            
            <!-- Liste des clients -->
            <div class="card">
                <div class="card-body">
                    <table class="table table-hover" th:if="${!clients.empty}">
                        <thead>
                            <tr>
                                <th>Nom</th>
                                <th>Email</th>
                                <th>Téléphone</th>
                                <th>Date création</th>
                                <th>Portail client</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="client : ${clients}">
                                <td>
                                    <a th:href="@{/clients/{id}(id=${client.id})}" th:text="${client.name}">Nom</a>
                                </td>
                                <td th:text="${client.email}">Email</td>
                                <td th:text="${client.phone ?: '-'}">Téléphone</td>
                                <td th:text="${#temporals.format(client.createdAt, 'dd/MM/yyyy')}">Date</td>
                                <td>
                                    <span th:if="${client.invitationStatus == 'VALIDATED'}" class="badge bg-success">
                                        <i class="fas fa-check-circle"></i> Validé
                                    </span>
                                    <span th:if="${client.invitationStatus == 'PENDING'}" class="badge bg-warning text-dark">
                                        <i class="fas fa-clock"></i> En attente
                                    </span>
                                    <span th:if="${client.invitationStatus == 'EXPIRED'}" class="badge bg-danger">
                                        <i class="fas fa-times-circle"></i> Expiré
                                    </span>
                                    <span th:if="${client.invitationStatus == 'NOT_INVITED'}" class="badge bg-secondary">
                                        <i class="fas fa-minus-circle"></i> Non invité
                                    </span>
                                </td>
                                <td>
                                    <a th:href="@{/clients/{id}(id=${client.id})}" class="btn btn-sm btn-info">
                                        <i class="fas fa-eye"></i> Voir
                                    </a>
                                    <a th:href="@{/clients/{id}/edit(id=${client.id})}" class="btn btn-sm btn-warning">
                                        <i class="fas fa-edit"></i> Modifier
                                    </a>
                                    <form th:action="@{/clients/{id}/delete(id=${client.id})}" method="post" style="display: inline;">
                                        <button type="submit" class="btn btn-sm btn-danger" 
                                                onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce client ?')">
                                            <i class="fas fa-trash"></i> Supprimer
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <div th:if="${clients.empty}" class="text-center p-4">
                        <i class="fas fa-users fa-4x text-muted mb-3"></i>
                        <p>Aucun client trouvé</p>
                        <a th:href="@{/clients/new}" class="btn btn-primary">
                            <i class="fas fa-user-plus"></i> Créer votre premier client
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
