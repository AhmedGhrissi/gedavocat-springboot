<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<th:block layout:fragment="extra-css">
    <link rel="stylesheet" th:href="@{/css/pages/collaborator-portal.css}">
</th:block>

<head>
    <link rel="stylesheet" th:href="@{/css/pages/client-portal.css}">
<title>Documents - Collaborateur</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="collab-page">
        <div class="container-fluid">
            <div class="d-flex align-items-center gap-3 mb-3">
                <a th:href="@{/my-cases-collab}" class="btn btn-light">
                    <i class="fas fa-arrow-left"></i> Retour
                </a>
            </div>
            <h3>Documents du dossier: <span th:text="${case.name}"></span></h3>

            <div th:if="${documents != null and !documents.empty}">
                <div th:each="doc : ${documents}" class="document-item">
                    <div class="doc-icon"><i class="fas fa-file-pdf"></i></div>
                    <div class="flex-grow-1">
                        <div class="fw-bold" th:text="${doc.originalName}">Document.pdf</div>
                        <small class="text-muted">Ajouté le <span th:text="${#temporals.format(doc.createdAt, 'dd/MM/yyyy')}"></span></small>
                    </div>
                    <div class="d-flex gap-1">
                        <a th:if="${doc.mimetype != null and (doc.mimetype.startsWith('application/pdf') or doc.mimetype.startsWith('image/'))}" 
                           th:href="@{/my-cases-collab/documents/{id}/preview(id=${doc.id})}" 
                           class="btn btn-sm btn-outline-primary" target="_blank"><i class="fas fa-eye"></i></a>
                        <a th:href="@{/my-cases-collab/documents/{id}/download(id=${doc.id})}" class="btn btn-sm btn-primary"><i class="fas fa-download"></i></a>
                    </div>
                </div>
            </div>
            <div th:if="${documents == null or documents.empty}" class="text-center py-4 text-muted">
                <i class="fas fa-file fa-2x mb-2"></i>
                <p>Aucun document disponible pour le moment</p>
            </div>
        </div>
        </div>
    </div>
</body>
</html>
