<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <link rel="stylesheet" th:href="@{/css/calendar-modern.css}">
    <title>Calendrier – Collaborateur</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">

        <!-- En-tête -->
        <div class="d-flex justify-content-between align-items-center mb-4 page-header">
            <div>
                <h2 class="mb-1 animate-fade-in-up"><i class="fas fa-calendar-alt"></i> Calendrier</h2>
                <p class="text-muted">Rendez-vous des dossiers qui vous sont partagés</p>
            </div>
        </div>

        <!-- Messages flash -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle"></i> <span th:text="${success}">Succès</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row">
            <!-- Calendrier principal -->
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-calendar"></i> Calendrier</h5>
                    </div>
                    <div class="card-body">
                        <div id="calendar"></div>
                    </div>
                </div>
            </div>

            <!-- Rendez-vous à venir -->
            <div class="col-lg-4">
                <!-- Aujourd'hui -->
                <div class="card mb-3">
                    <div class="card-header bg-success text-white">
                        <h6 class="mb-0"><i class="fas fa-calendar-day"></i> Aujourd'hui</h6>
                    </div>
                    <div class="card-body p-2" style="max-height: 300px; overflow-y: auto;">
                        <div th:if="${todayAppointments.empty}" class="text-center text-muted py-3">
                            <i class="fas fa-calendar-check fa-2x mb-2"></i>
                            <p class="mb-0">Aucun rendez-vous aujourd'hui</p>
                        </div>
                        <div th:each="appointment : ${todayAppointments}" class="card mb-2">
                            <div class="card-body p-2">
                                <h6 class="mb-1" th:text="${appointment.title}">Titre</h6>
                                <small class="text-muted">
                                    <i class="fas fa-clock"></i>
                                    <span th:text="${#temporals.format(appointment.appointmentDate, 'HH:mm')}">10:00</span>
                                </small>
                                <br>
                                <span class="badge" th:classappend="${appointment.type.name() == 'COURT_HEARING' ? 'bg-danger' : 'bg-info'}"
                                      th:text="${appointment.type.displayName}">Type</span>
                                <div th:if="${appointment.relatedCase != null}" class="small text-muted mt-1">
                                    <i class="fas fa-folder"></i> <span th:text="${appointment.relatedCase.name}">Dossier</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- À venir -->
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h6 class="mb-0"><i class="fas fa-calendar-alt"></i> À venir</h6>
                    </div>
                    <div class="card-body p-2" style="max-height: 400px; overflow-y: auto;">
                        <div th:if="${upcomingAppointments.empty}" class="text-center text-muted py-3">
                            <i class="fas fa-calendar fa-2x mb-2"></i>
                            <p class="mb-0">Aucun rendez-vous à venir</p>
                        </div>
                        <div th:each="appointment : ${upcomingAppointments}" class="card mb-2">
                            <div class="card-body p-2">
                                <h6 class="mb-1" th:text="${appointment.title}">Titre</h6>
                                <small class="text-muted">
                                    <i class="fas fa-calendar"></i>
                                    <span th:text="${#temporals.format(appointment.appointmentDate, 'dd/MM/yyyy HH:mm')}">19/02 10:00</span>
                                </small>
                                <br>
                                <span th:if="${appointment.client != null}" class="badge bg-secondary">
                                    <i class="fas fa-user"></i> <span th:text="${appointment.client.name}">Client</span>
                                </span>
                                <span class="badge" th:classappend="${appointment.type.name() == 'COURT_HEARING' ? 'bg-danger' : 'bg-info'}"
                                      th:text="${appointment.type.displayName}">Type</span>
                                <div th:if="${appointment.relatedCase != null}" class="small text-muted mt-1">
                                    <i class="fas fa-folder"></i> <span th:text="${appointment.relatedCase.name}">Dossier</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script th:inline="javascript" th:attr="nonce=${cspNonce}">
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        if (!calendarEl) return;

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'fr',
            firstDay: 1,
            height: 'auto',
            aspectRatio: 1.8,
            headerToolbar: {
                left: 'prev',
                center: 'title',
                right: 'next today dayGridMonth,timeGridWeek,timeGridDay,listWeek'
            },
            buttonText: {
                today: "Aujourd'hui",
                month: 'Mois',
                week: 'Semaine',
                day: 'Jour',
                list: 'Liste'
            },
            navLinks: true,
            editable: false,
            dayMaxEvents: true,
            nowIndicator: true,
            slotMinTime: '07:00:00',
            slotMaxTime: '20:00:00',
            allDaySlot: false,
            displayEventTime: true,
            displayEventEnd: true,
            eventTimeFormat: {
                hour: '2-digit',
                minute: '2-digit',
                meridiem: false,
                hour12: false
            },
            events: function(info, successCallback, failureCallback) {
                var startDate = info.start.toISOString().split('T')[0];
                var endDate = info.end.toISOString().split('T')[0];
                fetch('/my-cases-collab/calendar/api/events?start=' + startDate + '&end=' + endDate)
                    .then(function(response) { return response.json(); })
                    .then(function(data) { successCallback(data); })
                    .catch(function(error) {
                        console.error('Erreur chargement calendrier:', error);
                        failureCallback(error);
                    });
            },
            eventDidMount: function(info) {
                info.el.title = info.event.title +
                    (info.event.extendedProps.type ? '\nType: ' + info.event.extendedProps.type : '') +
                    (info.event.extendedProps.status ? '\nStatut: ' + info.event.extendedProps.status : '');
            },
            loading: function(isLoading) {
                calendarEl.style.opacity = isLoading ? '0.5' : '1';
            }
        });
        calendar.render();
    });
    </script>
</div>
</body>
</html>
