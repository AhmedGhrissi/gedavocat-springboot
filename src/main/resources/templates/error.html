<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Erreur — DocAvocat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/global-unified-theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #FAFBFC;
            color: #1A202C;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            max-width: 480px;
            padding: 3rem 2rem;
        }
        .error-icon {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: #fef2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .error-icon i { font-size: 2rem; color: #ef4444; }
        .error-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }
        .error-message {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .error-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
            color: #fff;
        }
        .btn-primary:hover {
            box-shadow: 0 4px 15px rgba(30,58,95,0.3);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: #fff;
            color: var(--text-secondary);
            border: 1px solid #e2e8f0;
        }
        .btn-outline:hover {
            background: #f8fafc;
            color: var(--text-primary);
        }
        .brand {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: var(--text-tertiary);
        }
        .brand a { color: var(--brand-500); text-decoration: none; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1 class="error-title animate-fade-in-up" th:text="${status != null && status.toString().matches('\\d+') ?
            (status == 404 ? '404 — Page non trouvée' :
             status == 403 ? '403 — Accès refusé' :
             status == 500 ? '500 — Erreur interne' :
             status == 200 ? 'Erreur de chargement' :
             'Erreur ' + status) : (status != null ? status : 'Erreur')}">Erreur</h1>
        <p class="error-message" th:text="${message != null && !message.isEmpty() ? message : 'Une erreur inattendue est survenue. Veuillez réessayer ou retourner au tableau de bord.'}">
            Une erreur inattendue est survenue.
        </p>
        <div class="error-actions">
            <a th:href="@{/dashboard}" class="btn btn-primary">
                <i class="fas fa-home"></i> Retour au tableau de bord
            </a>
            <a href="javascript:history.back()" class="btn btn-outline">
                <i class="fas fa-arrow-left"></i> Page précédente
            </a>
        </div>
        <div class="brand">
            <a href="/">DocAvocat</a>
        </div>
    </div>
</body>
</html>
