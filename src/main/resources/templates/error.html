<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Erreur</title></head>
<body>
<div layout:fragment="content">
    <div class="container py-5 text-center">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="mb-4">
                    <i class="fas fa-exclamation-triangle" style="font-size:4rem; color:#e74c3c;"></i>
                </div>
                <h1 class="mb-3" th:text="${status != null ? status : 'Erreur'}">Erreur</h1>
                <p class="text-muted mb-4" th:text="${message != null ? message : 'Une erreur inattendue est survenue.'}">
                    Une erreur inattendue est survenue.
                </p>
                <div class="d-flex gap-2 justify-content-center">
                    <a th:href="@{/dashboard}" class="btn btn-primary">
                        <i class="fas fa-home me-1"></i> Retour au tableau de bord
                    </a>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">
                        <i class="fas fa-arrow-left me-1"></i> Page précédente
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
