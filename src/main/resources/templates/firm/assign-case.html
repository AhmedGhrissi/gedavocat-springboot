<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Assigner un dossier</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-header">
        <div class="page-header-content">
            <h1 class="page-title">
                <i class="fas fa-folder-open me-2"></i>Assigner un dossier
            </h1>
            <p class="page-subtitle">Déléguer un dossier à un membre du cabinet</p>
        </div>
    </div>

    <div class="content-wrapper">
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span th:text="${error}">Erreur</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-share me-2"></i>Assigner un dossier à un collaborateur</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/firm/cases/assign}" method="post"
                      th:object="${assignRequest}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="mb-4">
                        <label for="caseId" class="form-label fw-600">
                            Dossier <span class="text-danger">*</span>
                        </label>
                        <select id="caseId" name="caseId" class="form-select" required>
                            <option value="">-- Sélectionner un dossier --</option>
                            <option th:each="c : ${cases}"
                                    th:value="${c.id}"
                                    th:text="${c.title ?: c.reference}">Dossier</option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('caseId')}"
                             th:errors="*{caseId}">Erreur</div>
                    </div>

                    <div class="mb-4">
                        <label for="memberId" class="form-label fw-600">
                            Collaborateur <span class="text-danger">*</span>
                        </label>
                        <select id="memberId" name="memberId" class="form-select" required>
                            <option value="">-- Sélectionner un collaborateur --</option>
                            <option th:each="m : ${members}"
                                    th:value="${m.userId}"
                                    th:text="${m.userFirstName + ' ' + m.userLastName + ' (' + m.role + ')'}">Collaborateur</option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('memberId')}"
                             th:errors="*{memberId}">Erreur</div>
                    </div>

                    <div class="mb-4">
                        <label for="assignmentRole" class="form-label fw-600">
                            Rôle dans le dossier <span class="text-danger">*</span>
                        </label>
                        <select id="assignmentRole" name="assignmentRole" class="form-select" required>
                            <option value="COLLABORATEUR">Collaborateur (lecture + écriture)</option>
                            <option value="RESPONSABLE">Responsable (tous les droits)</option>
                            <option value="OBSERVATEUR">Observateur (lecture seule)</option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary rounded-md fw-600">
                            <i class="fas fa-check"></i> Assigner le dossier
                        </button>
                        <a href="/firm/members" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left"></i> Retour
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
