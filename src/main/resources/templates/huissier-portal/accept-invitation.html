<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer votre compte huissier - GedAvocat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            padding: 20px;
        }
        .invite-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.15);
            padding: 48px;
            width: 100%; max-width: 480px;
        }
        .invite-header {
            text-align: center; margin-bottom: 32px;
        }
        .invite-header .logo {
            font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 24px; display: block;
        }
        .invite-header .icon-circle {
            width: 72px; height: 72px; margin: 0 auto 20px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: #fff;
        }
        .invite-header h2 {
            font-size: 24px; font-weight: 700; color: #1e293b; margin-bottom: 8px;
        }
        .invite-header p {
            color: #64748b; font-size: 14px; line-height: 1.6;
        }
        .alert {
            padding: 14px 16px; border-radius: 10px;
            margin-bottom: 20px; font-size: 14px;
            display: flex; align-items: center; gap: 10px;
        }
        .alert-danger { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .form-label {
            display: block; font-size: 13px; font-weight: 600;
            color: #475569; margin-bottom: 6px;
        }
        .form-control {
            width: 100%;
            background: #f8fafc; border: 1px solid #e2e8f0;
            border-radius: 10px; padding: 12px 16px;
            font-size: 15px; color: #1e293b;
            font-family: inherit; transition: all 0.2s; outline: none;
        }
        .form-control::placeholder { color: #94a3b8; }
        .form-control:focus {
            border-color: #f59e0b; background: #fff;
            box-shadow: 0 0 0 3px rgba(245,158,11,0.12);
        }
        .form-control[readonly] {
            background: #f1f5f9; color: #64748b; cursor: not-allowed;
        }
        .mb-3 { margin-bottom: 20px; }
        .mb-4 { margin-bottom: 28px; }
        .btn-create {
            width: 100%;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white; border: none;
            padding: 14px; border-radius: 10px;
            font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-create:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(245,158,11,0.4);
        }
        @media (max-width: 520px) {
            .invite-card { padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <div class="invite-card">
        <div class="invite-header">
            <span class="logo">GedAvocat</span>
            <div class="icon-circle">
                <i class="fas fa-gavel"></i>
            </div>
            <h2>Créer votre compte huissier</h2>
            <p>Vous avez été invité(e) à consulter un dossier sur GedAvocat.<br>
               Créez un mot de passe pour accéder aux documents partagés.</p>
        </div>

        <div th:if="${caseName}" style="text-align:center; margin-bottom:20px;">
            <span style="background:#fffbeb; border:1px solid #fde68a; border-radius:8px; padding:8px 14px; font-size:13px; color:#92400e;">
                <i class="fas fa-folder-open"></i> Dossier : <strong th:text="${caseName}">Dossier</strong>
            </span>
        </div>

        <div th:if="${error}" class="alert alert-danger" id="serverError">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Erreur</span>
        </div>

        <div id="clientError" class="alert alert-danger" style="display:none;">
            <i class="fas fa-exclamation-circle"></i> <span id="clientErrorText"></span>
        </div>

        <form id="inviteForm" th:action="@{/huissiers/accept-invitation}" method="post">
            <input type="hidden" name="token" th:value="${token}"/>

            <div class="mb-3">
                <label class="form-label">Adresse email</label>
                <div th:if="${email != null}">
                    <input type="email" class="form-control" th:value="${email}" readonly>
                </div>
                <div th:unless="${email != null}">
                    <input type="email" name="email" class="form-control" placeholder="votre@email.com" required>
                    <small class="text-muted">Renseignez votre adresse email pour créer le compte</small>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Prénom</label>
                <input type="text" name="firstName" class="form-control" placeholder="Prénom" th:value="${firstName}">
            </div>

            <div class="mb-3">
                <label class="form-label">Nom</label>
                <input type="text" name="lastName" class="form-control" placeholder="Nom" th:value="${lastName}">
            </div>

            <div class="mb-3">
                <label class="form-label">Numéro d'étude <span style="color:#94a3b8; font-weight:400;">(optionnel)</span></label>
                <input type="text" name="officeNumber" class="form-control" placeholder="Ex : 75-001">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Mot de passe *</label>
                <input type="password" id="password" name="password"
                       class="form-control" required minlength="8"
                       placeholder="Minimum 8 caractères">
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label">Confirmer le mot de passe *</label>
                <input type="password" id="confirmPassword" name="confirmPassword"
                       class="form-control" required minlength="8"
                       placeholder="Répétez votre mot de passe">
            </div>

            <button type="submit" class="btn-create">
                <i class="fas fa-check"></i> Créer mon compte
            </button>
        </form>
    </div>

    <script>
        (function() {
            var form = document.getElementById('inviteForm');
            var password = document.getElementById('password');
            var confirm = document.getElementById('confirmPassword');
            var clientError = document.getElementById('clientError');
            var clientErrorText = document.getElementById('clientErrorText');
            var serverError = document.getElementById('serverError');

            function showClientError(msg) {
                if (serverError) serverError.style.display = 'none';
                clientErrorText.textContent = msg;
                clientError.style.display = 'flex';
            }

            function hideClientError() {
                clientError.style.display = 'none';
                clientErrorText.textContent = '';
                if (serverError) serverError.style.display = '';
            }

            form.addEventListener('submit', function(e) {
                hideClientError();
                if (password.value.length < 8) {
                    e.preventDefault();
                    showClientError('Le mot de passe doit contenir au moins 8 caractères.');
                    password.focus();
                    return false;
                }
                if (password.value !== confirm.value) {
                    e.preventDefault();
                    showClientError('Les mots de passe ne correspondent pas.');
                    confirm.focus();
                    return false;
                }
            });

            [password, confirm].forEach(function(el) {
                el.addEventListener('input', function() { hideClientError(); });
            });
        })();
    </script>
</body>
</html>
