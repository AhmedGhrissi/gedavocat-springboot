<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1E3A5F">
    <title>Créer votre compte huissier - GedAvocat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #0F172A;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; right: 0;
            height: 2px;
            background: #C6A75E;
            opacity: 0.6;
            z-index: 10;
        }
        .invite-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 24px 56px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04);
            padding: 44px;
            width: 100%; max-width: 480px;
            position: relative;
            overflow: hidden;
        }
        .invite-card::before {
            content: '';
            position: absolute;
            top: 0; left: 20px; right: 20px;
            height: 2px;
            background: #C6A75E;
            opacity: 0.5;
        }
        .invite-header {
            text-align: center; margin-bottom: 28px;
        }
        .invite-header .logo {
            font-size: 20px; font-weight: 800;
            color: #1E3A5F;
            margin-bottom: 20px; display: block;
            letter-spacing: -0.01em;
        }
        .invite-header .icon-circle {
            width: 64px; height: 64px; margin: 0 auto 18px;
            background: #EEF2F7;
            border: 1px solid rgba(30,58,95,0.15);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; color: #1E3A5F;
        }
        .invite-header h2 {
            font-size: 22px; font-weight: 700; color: #0F172A;
            margin-bottom: 8px; letter-spacing: -0.02em;
        }
        .invite-header p {
            color: #475569; font-size: 14px; line-height: 1.6;
        }
        .alert {
            padding: 12px 14px; border-radius: 8px;
            margin-bottom: 18px; font-size: 14px; font-weight: 500;
            display: flex; align-items: center; gap: 10px;
            border-left: 3px solid transparent;
        }
        .alert-danger { background: #fef2f2; color: #dc2626; border: 1px solid rgba(239,68,68,0.12); border-left-color: #ef4444; }
        .form-label {
            display: block; font-size: 12px; font-weight: 600;
            color: #475569; margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .form-control {
            width: 100%;
            background: #F8FAFC; border: 1.5px solid #E2E8F0;
            border-radius: 8px; padding: 11px 14px;
            font-size: 14px; color: #0F172A;
            font-family: inherit; transition: all 0.2s; outline: none;
        }
        .form-control::placeholder { color: #94A3B8; }
        .form-control:focus {
            border-color: #C6A75E; background: #fff;
            box-shadow: 0 0 0 3px rgba(198,167,94,0.15);
        }
        .form-control[readonly] {
            background: #F1F5F9; color: #64748B; cursor: not-allowed;
        }
        .mb-3 { margin-bottom: 18px; }
        .mb-4 { margin-bottom: 24px; }
        .case-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: #EEF2F7; border: 1px solid rgba(30,58,95,0.12);
            border-radius: 8px; padding: 8px 14px;
            font-size: 13px; color: #1E3A5F; font-weight: 500;
        }
        .btn-create {
            width: 100%;
            background: #1E3A5F;
            color: white; border: none;
            padding: 13px; border-radius: 8px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.25s;
            font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-create:hover {
            background: #172D4A;
            box-shadow: 0 4px 16px rgba(30,58,95,0.3);
        }
        .btn-create:active {
            background: #112237;
        }
        small { color: #94A3B8; font-size: 12px; display: block; margin-top: 5px; }
        @media (max-width: 520px) {
            .invite-card { padding: 28px 20px; }
        }
    </style>
</head>
<body>
    <div class="invite-card">
        <div class="invite-header">
            <span class="logo">GedAvocat</span>
            <div class="icon-circle">
                <i class="fas fa-gavel"></i>
            </div>
            <h2>Créer votre compte huissier</h2>
            <p>Vous avez été invité(e) à consulter un dossier sur GedAvocat.<br>
               Créez un mot de passe pour accéder aux documents partagés.</p>
        </div>

        <div th:if="${caseName}" style="text-align:center; margin-bottom:18px;">
            <span class="case-badge">
                <i class="fas fa-folder-open"></i>
                Dossier : <strong th:text="${caseName}">Dossier</strong>
            </span>
        </div>

        <div th:if="${error}" class="alert alert-danger" id="serverError">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Erreur</span>
        </div>
        <div id="clientError" class="alert alert-danger" style="display:none;">
            <i class="fas fa-exclamation-circle"></i> <span id="clientErrorText"></span>
        </div>

        <form id="inviteForm" th:action="@{/huissiers/accept-invitation}" method="post">
            <input type="hidden" name="token" th:value="${token}"/>

            <div class="mb-3">
                <label class="form-label">Adresse email</label>
                <div th:if="${email != null}">
                    <input type="email" class="form-control" th:value="${email}" readonly>
                </div>
                <div th:unless="${email != null}">
                    <input type="email" name="email" class="form-control" placeholder="votre@email.com" required>
                    <small>Renseignez votre adresse email pour créer le compte</small>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Prénom</label>
                <input type="text" name="firstName" class="form-control" placeholder="Prénom" th:value="${firstName}">
            </div>

            <div class="mb-3">
                <label class="form-label">Nom</label>
                <input type="text" name="lastName" class="form-control" placeholder="Nom" th:value="${lastName}">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Numéro d'étude
                    <span style="color:#94A3B8; font-weight:400; text-transform:none;">(optionnel)</span>
                </label>
                <input type="text" name="officeNumber" class="form-control" placeholder="Ex : 75-001">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Mot de passe *</label>
                <input type="password" id="password" name="password"
                       class="form-control" required minlength="8"
                       placeholder="Minimum 8 caractères">
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label">Confirmer le mot de passe *</label>
                <input type="password" id="confirmPassword" name="confirmPassword"
                       class="form-control" required minlength="8"
                       placeholder="Répétez votre mot de passe">
            </div>

            <button type="submit" class="btn-create">
                <i class="fas fa-check"></i> Créer mon compte
            </button>
        </form>
    </div>

    <script>
        (function() {
            var form = document.getElementById('inviteForm');
            var password = document.getElementById('password');
            var confirm = document.getElementById('confirmPassword');
            var clientError = document.getElementById('clientError');
            var clientErrorText = document.getElementById('clientErrorText');
            var serverError = document.getElementById('serverError');

            function showClientError(msg) {
                if (serverError) serverError.style.display = 'none';
                clientErrorText.textContent = msg;
                clientError.style.display = 'flex';
            }

            function hideClientError() {
                clientError.style.display = 'none';
                clientErrorText.textContent = '';
                if (serverError) serverError.style.display = '';
            }

            form.addEventListener('submit', function(e) {
                hideClientError();
                if (password.value.length < 8) {
                    e.preventDefault();
                    showClientError('Le mot de passe doit contenir au moins 8 caractères.');
                    password.focus();
                    return false;
                }
                if (password.value !== confirm.value) {
                    e.preventDefault();
                    showClientError('Les mots de passe ne correspondent pas.');
                    confirm.focus();
                    return false;
                }
            });

            [password, confirm].forEach(function(el) {
                el.addEventListener('input', function() { hideClientError(); });
            });
        })();
    </script>
</body>
</html>
