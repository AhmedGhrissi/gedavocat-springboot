<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<th:block layout:fragment="extra-css">
    <link rel="stylesheet" th:href="@{/css/pages/collaborator-portal.css}">
</th:block>

<head>
    <link rel="stylesheet" th:href="@{/css/pages/client-portal.css}">
<title>Profil Huissier</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="collab-page">
        <div class="container-fluid">
            <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle"></i> <span th:text="${message}">Succès</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Erreur</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <h1>Mon profil</h1>
            <div class="card p-3">
                <form th:action="@{/my-cases-huissier/profile}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Nom</label>
                        <input class="form-control" type="text" th:value="${user.name}" readonly/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" th:value="${user.email}" readonly/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Téléphone</label>
                        <input class="form-control" name="phone" type="text" th:value="${user?.phone}" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Numéro d'étude</label>
                        <input class="form-control" name="officeNumber" type="text" th:value="${user?.barNumber}" />
                    </div>
                    <div>
                        <button class="btn btn-primary" type="submit">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
        </div>
    </div>
</body>
</html>
