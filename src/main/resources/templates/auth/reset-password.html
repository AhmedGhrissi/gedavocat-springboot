<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe - DocAvocat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #080b14; color: #f1f5f9; }
        .form-control, .input-group-text {
            background: rgba(255,255,255,0.06) !important;
            border-color: rgba(148,163,184,0.2) !important;
            color: #f1f5f9 !important;
        }
        .form-control::placeholder { color: #64748b !important; }
        .form-control:focus { background: rgba(255,255,255,0.08) !important; box-shadow: 0 0 0 3px rgba(102,126,234,.25) !important; }
        .btn-outline-secondary { border-color: rgba(148,163,184,0.3) !important; color: #94a3b8 !important; background: transparent !important; }
        label { color: #cbd5e1 !important; }
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .auth-box {
            background: rgba(255,255,255,0.04);
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,.3);
            padding: 40px;
            width: 100%;
            max-width: 460px;
        }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { color: #f1f5f9; font-weight: 700; }
        .brand-icon { font-size: 48px; color: #667eea; margin-bottom: 15px; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; }
        .btn-primary:hover { background: linear-gradient(135deg, #5a6fd8, #6a3f92); }
        .password-strength { height: 4px; border-radius: 2px; transition: all .3s; }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <div class="brand-icon"><i class="fas fa-lock-open"></i></div>
            <h2>Nouveau mot de passe</h2>
            <p class="text-muted">Choisissez un mot de passe sécurisé d'au moins 8 caractères.</p>
        </div>

        <!-- Erreur (token invalide ou mots de passe différents) -->
        <div th:if="${error}" class="alert alert-danger">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Formulaire (affiché uniquement si le token est valide) -->
        <form th:if="${token}" th:action="@{/reset-password}" method="post" id="resetForm">
            <input type="hidden" name="token" th:value="${token}">

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Nouveau mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           minlength="8" required autofocus oninput="checkStrength(this.value)">
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="mt-1">
                    <div id="strengthBar" class="password-strength bg-secondary" style="width:0%;"></div>
                </div>
                <div class="form-text" id="strengthText"></div>
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-semibold">Confirmer le mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                           minlength="8" required>
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('confirmPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-check me-2"></i> Enregistrer le mot de passe
                </button>
            </div>
        </form>

        <!-- Lien si token invalide -->
        <div th:unless="${token}" class="text-center mt-3">
            <a th:href="@{/forgot-password}" class="btn btn-outline-primary">
                <i class="fas fa-redo me-1"></i> Demander un nouveau lien
            </a>
        </div>

        <div class="text-center mt-3">
            <a th:href="@{/login}" class="text-muted text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i> Retour à la connexion
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
}
function checkStrength(val) {
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const bar = document.getElementById('strengthBar');
    const txt = document.getElementById('strengthText');
    const labels = ['Très faible','Faible','Moyen','Fort','Très fort'];
    const colors = ['#dc3545','#fd7e14','#ffc107','#20c997','#198754'];
    bar.style.width = (score * 25) + '%';
    bar.style.backgroundColor = colors[score];
    txt.textContent = labels[score];
    txt.style.color = colors[score];
}
document.getElementById('resetForm') && document.getElementById('resetForm').addEventListener('submit', function(e) {
    const p = document.getElementById('password').value;
    const c = document.getElementById('confirmPassword').value;
    if (p !== c) {
        e.preventDefault();
        alert('Les mots de passe ne correspondent pas.');
    }
});
</script>
</body>
</html>
