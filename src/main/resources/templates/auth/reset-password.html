<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="/css/pages/auth.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe - DocAvocat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <div class="brand-icon"><i class="fas fa-lock-open"></i></div>
            <h2>Nouveau mot de passe</h2>
            <p class="text-muted">Choisissez un mot de passe sécurisé d'au moins 8 caractères.</p>
        </div>

        <!-- Erreur (token invalide ou mots de passe différents) -->
        <div th:if="${error}" class="alert alert-danger">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Formulaire (affiché uniquement si le token est valide) -->
        <form th:if="${token}" th:action="@{/reset-password}" method="post" id="resetForm">
            <input type="hidden" name="token" th:value="${token}">

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Nouveau mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           minlength="8" required autofocus oninput="checkStrength(this.value)">
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="mt-1">
                    <div id="strengthBar" class="password-strength bg-secondary" style="width:0%;"></div>
                </div>
                <div class="form-text" id="strengthText"></div>
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-semibold">Confirmer le mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                           minlength="8" required>
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('confirmPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-check me-2"></i> Enregistrer le mot de passe
                </button>
            </div>
        </form>

        <!-- Lien si token invalide -->
        <div th:unless="${token}" class="text-center mt-3">
            <a th:href="@{/forgot-password}" class="btn btn-outline-primary">
                <i class="fas fa-redo me-1"></i> Demander un nouveau lien
            </a>
        </div>

        <div class="text-center mt-3">
            <a th:href="@{/login}" class="text-muted text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i> Retour à la connexion
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
}
function checkStrength(val) {
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const bar = document.getElementById('strengthBar');
    const txt = document.getElementById('strengthText');
    const labels = ['Très faible','Faible','Moyen','Fort','Très fort'];
    const colors = ['#dc3545','#fd7e14','#ffc107','#20c997','#198754'];
    bar.style.width = (score * 25) + '%';
    bar.style.backgroundColor = colors[score];
    txt.textContent = labels[score];
    txt.style.color = colors[score];
}
document.getElementById('resetForm') && document.getElementById('resetForm').addEventListener('submit', function(e) {
    const p = document.getElementById('password').value;
    const c = document.getElementById('confirmPassword').value;
    if (p !== c) {
        e.preventDefault();
        alert('Les mots de passe ne correspondent pas.');
    }
});
</script>
</body>
</html>
