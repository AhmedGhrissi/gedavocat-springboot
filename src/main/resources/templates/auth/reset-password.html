<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe — DocAvocat</title>
    <meta name="theme-color" content="#1E3A5F">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/pages/auth.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <div class="brand-icon"><i class="fas fa-lock-open"></i></div>
            <h2>Nouveau mot de passe</h2>
            <p class="text-muted">Choisissez un mot de passe sécurisé d'au moins 8 caractères.</p>
        </div>

        <!-- Erreur (token invalide ou mots de passe différents) -->
        <div th:if="${error}" class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Formulaire (affiché uniquement si le token est valide) -->
        <form th:if="${token}" th:action="@{/reset-password}" method="post" id="resetForm">
            <input type="hidden" name="token" th:value="${token}">

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Nouveau mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           minlength="8" required autofocus oninput="checkStrength(this.value)" autocomplete="new-password">
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="mt-2" style="height: 3px; background: var(--border-default); border-radius: 2px; overflow: hidden;">
                    <div id="strengthBar" class="password-strength" style="width: 0%; height: 100%;"></div>
                </div>
                <div class="form-text" id="strengthText" style="font-size: 12px; margin-top: 4px;"></div>
            </div>

            <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-semibold">Confirmer le mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                           minlength="8" required autocomplete="new-password">
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('confirmPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-check me-2"></i> Enregistrer le mot de passe
                </button>
            </div>
        </form>

        <!-- Lien si token invalide -->
        <div th:unless="${token}" class="text-center mt-3">
            <a th:href="@{/forgot-password}" class="btn btn-outline-primary">
                <i class="fas fa-redo me-1"></i> Demander un nouveau lien
            </a>
        </div>

        <div class="text-center mt-3">
            <a th:href="@{/login}" class="text-muted text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i> Retour à la connexion
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd(id) {
    const inp = document.getElementById(id);
    const btn = inp.nextElementSibling;
    const icon = btn.querySelector('i');
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        inp.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
function checkStrength(val) {
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const bar = document.getElementById('strengthBar');
    const txt = document.getElementById('strengthText');
    const labels = ['Très faible','Faible','Moyen','Fort','Très fort'];
    const colors = ['#ef4444','#f59e0b','#eab308','#22c55e','#16a34a'];
    bar.style.width = (score * 25) + '%';
    bar.style.backgroundColor = colors[score];
    bar.style.transition = 'all 0.3s ease';
    txt.textContent = labels[score];
    txt.style.color = colors[score];
}
document.getElementById('resetForm') && document.getElementById('resetForm').addEventListener('submit', function(e) {
    const p = document.getElementById('password').value;
    const c = document.getElementById('confirmPassword').value;
    if (p !== c) {
        e.preventDefault();
        // Inline styled alert for standalone page
        var exist = document.getElementById('_pwdMismatchAlert');
        if (exist) exist.remove();
        var div = document.createElement('div');
        div.id = '_pwdMismatchAlert';
        div.style.cssText = 'background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:16px 20px;margin-bottom:16px;color:#dc2626;font-weight:600;display:flex;align-items:center;gap:10px;animation:fadeIn .3s ease;';
        div.innerHTML = '<i class="fas fa-exclamation-circle"></i> Les mots de passe ne correspondent pas.';
        var form = document.getElementById('resetForm');
        form.parentNode.insertBefore(div, form);
        setTimeout(function(){ if(div.parentNode) div.remove(); }, 5000);
    }
});

(function() {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }
})();
</script>
</body>
</html>
