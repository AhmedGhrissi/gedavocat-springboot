<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès au portail — DocAvocat</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/img/icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0F172A">
    <!-- Font Awesome -->
    <link th:href="@{/webjars/font-awesome/6.4.0/css/all.min.css}" rel="stylesheet">
    <link th:href="@{/css/global-unified-theme.css}" rel="stylesheet">
    <link th:href="@{/css/pages/auth-institutional.css}" rel="stylesheet">
    <link th:href="@{/css/responsive-mobile.css}" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- ══════════════════════════════════════════════════════════
            COLONNE GAUCHE (40%) - Bleu nuit uni
        ══════════════════════════════════════════════════════════ -->
        <div class="auth-left">
            <div class="auth-left-content">
                <div class="auth-brand">
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <i class="fas fa-scale-balanced" style="font-size: 4rem; color: var(--color-accent-gold);"></i>
                    </div>
                    <h1 style="margin-top: 0;">DocAvocat</h1>
                    <p class="auth-brand-subtitle">Portail professionnel sécurisé</p>
                    <p class="auth-brand-description">Gestion documentaire et signature électronique</p>
                </div>
            </div>
        </div>

        <!-- ══════════════════════════════════════════════════════════
            COLONNE DROITE (60%) - Fond blanc
        ══════════════════════════════════════════════════════════ -->
        <div class="auth-right">
            <div class="auth-form-container">
                <div class="auth-header">
                    <h2>Accès au portail cabinet</h2>
                    <p>Veuillez vous identifier pour accéder à votre espace sécurisé.</p>
                </div>

                <!-- Alerts -->
                <div th:if="${param.error}" class="auth-alert auth-alert-danger">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error} ?: 'Email ou mot de passe incorrect'"></span>
                </div>

                <div th:if="${message}" class="auth-alert auth-alert-success">
                    <i class="fas fa-check-circle"></i>
                    <span th:text="${message}"></span>
                </div>

                <!-- Formulaire -->
                <form class="auth-form" th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    
                    <div class="form-group">
                        <label for="email">Adresse e-mail</label>
                        <input 
                            type="email"
                            id="email"
                            name="email"
                            placeholder="votre@email.com"
                            required
                            autofocus
                            autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input 
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Votre mot de passe"
                            required
                            autocomplete="current-password">
                    </div>

                    <button type="submit" class="auth-submit-btn">
                        Se connecter
                    </button>
                </form>

                <div style="margin-top: var(--spacing-3); text-align: center;">
                    <a href="/forgot-password" style="color: var(--text-secondary); font-size: 14px; text-decoration: none;">Mot de passe oublié ?</a>
                    <span style="color: var(--text-tertiary); margin: 0 8px;">•</span>
                    <a th:href="@{/}" style="color: var(--text-secondary); font-size: 14px; text-decoration: none;">
                        <i class="fas fa-home"></i> Retour à l'accueil
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
