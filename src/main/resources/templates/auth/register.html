<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — DocAvocat | Créer votre compte cabinet d'avocat</title>
    <meta name="description" content="Créez votre compte GED Avocat et commencez à gérer vos dossiers, documents et clients juridiques. Essai gratuit 14 jours, sans engagement, sans carte bancaire.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://docavocat.fr/register">
    <meta name="theme-color" content="#667eea">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #080b14;
            color: #f1f5f9;
            min-height: 100vh;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        .auth-container::before {
            content: '';
            position: fixed;
            top: -150px; left: -150px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(102,126,234,0.18) 0%, transparent 65%);
            pointer-events: none;
        }

        .auth-container::after {
            content: '';
            position: fixed;
            bottom: -100px; right: -100px;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(118,75,162,0.15) 0%, transparent 65%);
            pointer-events: none;
        }

        .auth-box {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(148,163,184,0.12);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: white;
            margin: 0 auto 16px;
        }

        .auth-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 0;
        }

        .plan-badge {
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.15));
            border: 1px solid rgba(129,140,248,0.3);
            color: #c7d2fe;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 12px;
            display: inline-block;
        }

        .form-floating { margin-bottom: 16px; }

        .form-floating > .form-control,
        .form-floating > .form-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(148,163,184,0.12);
            border-radius: 12px;
            color: #f1f5f9;
        }

        .form-floating > .form-control:focus,
        .form-floating > .form-select:focus {
            background: rgba(102,126,234,0.05);
            border-color: rgba(102,126,234,0.5);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
            color: #f1f5f9;
        }

        .form-floating > label { color: #64748b; }

        .form-floating > .form-control::placeholder { color: transparent; }

        .form-check-input {
            background-color: rgba(255,255,255,0.07);
            border-color: rgba(148,163,184,0.2);
        }
        .form-check-input:checked {
            background-color: #667eea;
            border-color: #667eea;
        }
        .form-check-label { color: #94a3b8; font-size: 14px; }
        .form-check-label a { color: #818cf8; text-decoration: none; }
        .form-check-label a:hover { color: #a5b4fc; text-decoration: underline; }

        .btn-auth {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 13px 30px;
            font-weight: 600;
            color: white;
            width: 100%;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s ease;
            cursor: pointer;
            letter-spacing: 0.02em;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.4);
            color: white;
        }

        .alert {
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px;
        }
        .alert-danger {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(16,185,129,0.12);
            border: 1px solid rgba(16,185,129,0.25);
            color: #6ee7b7;
        }

        .invalid-feedback { color: #fca5a5; font-size: 12px; }

        .text-muted { color: #64748b !important; font-size: 12px; }

        .auth-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(148,163,184,0.1);
            color: #64748b;
        }
        .auth-footer a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover { color: #a5b4fc; text-decoration: underline; }

        @media (max-width: 480px) {
            .auth-box { padding: 28px 20px; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <div class="auth-icon"><i class="fas fa-user-plus"></i></div>
                <h1>Créer un compte</h1>
                <p>Rejoignez DocAvocat pour gérer vos dossiers</p>
                <div th:if="${selectedPlan != null}" class="plan-badge">
                    Plan sélectionné : <span th:text="${selectedPlan}">STARTER</span>
                    <span th:if="${selectedBilling == 'yearly'}"> — Annuel (-20%)</span>
                    <span th:if="${selectedBilling == 'monthly'}"> — Mensuel</span>
                </div>
            </div>

            <!-- Messages -->
            <div th:if="${error}" class="alert alert-danger" role="alert">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <div th:if="${message}" class="alert alert-success" role="alert">
                <i class="fas fa-check-circle"></i>
                <span th:text="${message}"></span>
            </div>

            <!-- Formulaire d'inscription -->
            <form th:action="@{/register}" method="post" th:object="${registerRequest}">
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" id="firstName" th:field="*{firstName}" 
                                   class="form-control" placeholder="Prénom" required>
                            <label for="firstName">Prénom *</label>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" 
                                 th:errors="*{firstName}"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input type="text" id="lastName" th:field="*{lastName}" 
                                   class="form-control" placeholder="Nom" required>
                            <label for="lastName">Nom *</label>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" 
                                 th:errors="*{lastName}"></div>
                        </div>
                    </div>
                </div>

                <div class="form-floating">
                    <input type="email" id="email" th:field="*{email}" 
                           class="form-control" placeholder="Email" required>
                    <label for="email">Adresse email *</label>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" 
                         th:errors="*{email}"></div>
                </div>

                <div class="form-floating">
                    <input type="password" id="password" th:field="*{password}" 
                           class="form-control" placeholder="Mot de passe" required>
                    <label for="password">Mot de passe *</label>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" 
                         th:errors="*{password}"></div>
                    <small class="text-muted">Au moins 6 caractères</small>
                </div>

                <div class="form-floating">
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" 
                           class="form-control" placeholder="Confirmer le mot de passe" required>
                    <label for="confirmPassword">Confirmer le mot de passe *</label>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" 
                         th:errors="*{confirmPassword}"></div>
                </div>

                <div class="form-floating">
                    <input type="text" id="phone" th:field="*{phone}" 
                           class="form-control" placeholder="Téléphone">
                    <label for="phone">Téléphone</label>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" 
                         th:errors="*{phone}"></div>
                </div>

                <div class="form-floating">
                    <input type="text" id="barNumber" th:field="*{barNumber}" 
                           class="form-control" placeholder="Numéro au barreau">
                    <label for="barNumber">Numéro au barreau</label>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('barNumber')}" 
                         th:errors="*{barNumber}"></div>
                </div>

                <!-- Plan d'abonnement caché si sélectionné -->
                <input type="hidden" th:field="*{subscriptionPlan}" th:if="${selectedPlan != null}">

                <!-- Sélection du plan si pas pré-sélectionné -->
                <div th:if="${selectedPlan == null}" class="form-floating">
                    <select id="subscriptionPlan" th:field="*{subscriptionPlan}" class="form-control" required>
                        <option value="">-- Choisir un plan --</option>
                        <option value="FREE">Gratuit (5 clients max)</option>
                        <option value="STARTER">Starter - 19€/mois (50 clients)</option>
                        <option value="PROFESSIONAL">Professional - 39€/mois (200 clients)</option>
                        <option value="ENTERPRISE">Enterprise - 79€/mois (clients illimités)</option>
                    </select>
                    <label for="subscriptionPlan">Plan d'abonnement *</label>
                </div>

                <div class="form-check mb-3">
                    <input type="checkbox" id="termsAccepted" th:field="*{termsAccepted}" class="form-check-input" required>
                    <label for="termsAccepted" class="form-check-label">
                        J'accepte les <a href="#" class="text-decoration-none">conditions d'utilisation</a> 
                        et la <a href="#" class="text-decoration-none">politique de confidentialité</a> *
                    </label>
                </div>

                <div class="form-check mb-3">
                    <input type="checkbox" id="gdprConsent" th:field="*{gdprConsent}" class="form-check-input" required>
                    <label for="gdprConsent" class="form-check-label">
                        J'accepte le traitement de mes données personnelles conformément au RGPD *
                    </label>
                </div>

                <button type="submit" class="btn btn-auth">
                    <i class="fas fa-user-plus"></i> Créer mon compte
                </button>
            </form>

            <div class="auth-footer">
                <p class="mb-0">Vous avez déjà un compte ?</p>
                <a th:href="@{/login}">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
