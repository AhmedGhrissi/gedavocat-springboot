<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site en maintenance — DocAvocat</title>
    <link rel="stylesheet" href="/css/global-unified-theme.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--text-primary) 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
        }

        .icon-wrapper {
            width: 120px;
            height: 120px;
            background: rgba(30,58,95,0.15);
            border: 2px solid rgba(30,58,95,0.35);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
        }
            50%       { transform: scale(1.05); opacity: 0.8; }
        }

        .icon-wrapper svg {
            width: 56px;
            height: 56px;
            color: #EEF2F7;
            fill: currentColor;
        }

        .badge {
            display: inline-block;
            background: rgba(234, 179, 8, 0.2);
            border: 1px solid rgba(234, 179, 8, 0.5);
            color: #fbbf24;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            color: #EEF2F7;
        }

        p {
            font-size: 17px;
            color: var(--text-tertiary);
            line-height: 1.7;
            margin-bottom: 12px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(135deg, #0F172A, #172D4A);
            border-radius: 2px;
            margin: 28px auto;
        }

        .info-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            margin-top: 32px;
        }

        .info-box p {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
        }

        .brand {
            margin-top: 40px;
            font-size: 13px;
            color: #334155;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Progress bar animée */
        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 32px;
        }
        .progress-fill {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #0F172A, #172D4A, #0F172A);
            background-size: 200% 100%;
            border-radius: 2px;
        }
            100% { background-position: -200% center; }
        }
    </style>
    <link rel="stylesheet" href="/css/responsive-mobile.css">
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <!-- Wrench icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
            </svg>
        </div>

        <div class="badge">Maintenance en cours</div>

        <h1 class="animate-fade-in-up">Site temporairement<br>indisponible</h1>

        <p>Notre équipe effectue des opérations de maintenance<br>pour améliorer votre expérience.</p>
        <p>Nous serons de retour très prochainement.</p>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="divider"></div>

        <div class="info-box">
            <p>Pour toute urgence, contactez directement votre avocat.</p>
        </div>

        <div class="brand">DOCAVOCAT</div>
    </div>
</body>
</html>
