<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>RPVA – Envoyer une communication</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4 page-header">
            <h2 class="animate-fade-in-up"><i class="fas fa-paper-plane"></i> Envoyer une communication (RPVA)</h2>
            <a th:href="@{/rpva}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> Retour
            </a>
        </div>

        <div class="alert alert-warning">
            <i class="fas fa-exclamation-triangle"></i>
            <strong>Service non disponible :</strong>
            L'envoi de communications via le réseau e-Barreau (RPVA) nécessite une infrastructure dédiée.
            Cette fonctionnalité n'est pas disponible dans la version actuelle.
        </div>

        <!-- Formulaire (structure prête pour activation future) -->
        <div class="card" style="border: 2px solid var(--color-border); box-shadow: var(--shadow-md); margin-bottom: 2rem;">
            <div class="card-header" style="background: var(--color-background); border-bottom: 1px solid var(--color-border);">
                <h5 class="mb-0" style="font-weight: 600; color: var(--color-primary);"><i class="fas fa-edit"></i> Nouvelle communication</h5>
            </div>
            <div class="card-body" style="padding: 1.5rem;">
                <form th:action="@{/rpva/send}" method="post" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Juridiction destinataire</label>
                            <select name="jurisdictionCode" class="form-select" disabled>
                                <option value="">-- Sélectionner une juridiction --</option>
                                <option th:each="j : ${jurisdictions}" th:value="${j.code}" th:text="${j.name}">TJ Paris</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Dossier associé (optionnel)</label>
                            <select name="caseReference" class="form-select" disabled>
                                <option value="">Aucun dossier</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Objet</label>
                        <input type="text" name="subject" class="form-control" placeholder="Objet de la communication" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Message</label>
                        <textarea name="message" class="form-control" rows="6" placeholder="Contenu du message..." disabled></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Pièces jointes</label>
                        <input type="file" name="attachments" class="form-control" multiple accept=".pdf" disabled>
                        <small class="text-muted">Fichiers PDF uniquement</small>
                    </div>
                    <button type="submit" class="btn btn-primary" style="font-weight: 600; padding: 0.625rem 1.5rem; border-radius: 8px;" disabled>
                        <i class="fas fa-paper-plane"></i> Envoyer
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
