<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>RPVA – Détail de la communication</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-envelope-open"></i> Détail de la communication</h2>
            <div>
                <a th:href="@{/rpva/download-receipt/{id}(id=${communication?.id})}" class="btn btn-outline-secondary me-2"
                   th:if="${communication != null}">
                    <i class="fas fa-download"></i> Télécharger l'AR
                </a>
                <a th:href="@{/rpva}" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left"></i> Retour
                </a>
            </div>
        </div>

        <div th:if="${communication == null}" class="alert alert-warning">
            <i class="fas fa-exclamation-triangle"></i> Communication introuvable.
        </div>

        <div th:if="${communication != null}" class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0" th:text="${communication.subject}">Objet</h5>
            </div>
            <div class="card-body">
                <dl class="row">
                    <dt class="col-sm-3">Date</dt>
                    <dd class="col-sm-9" th:text="${#temporals.format(communication.sentAt, 'dd/MM/yyyy HH:mm')}">-</dd>

                    <dt class="col-sm-3">Juridiction</dt>
                    <dd class="col-sm-9" th:text="${communication.jurisdictionCode}">-</dd>

                    <dt class="col-sm-3">Statut</dt>
                    <dd class="col-sm-9">
                        <span class="badge"
                              th:classappend="${communication.status == 'SENT'} ? 'bg-success' : (${communication.status == 'FAILED'} ? 'bg-danger' : 'bg-secondary')"
                              th:text="${communication.status}">-</span>
                    </dd>

                    <dt class="col-sm-3">Message RPVA ID</dt>
                    <dd class="col-sm-9" th:text="${communication.rpvaMessageId ?: '-'}">-</dd>
                </dl>

                <hr>

                <h6 class="fw-bold">Contenu du message</h6>
                <div class="bg-light p-3 rounded" th:text="${communication.content ?: 'Aucun contenu disponible.'}">-</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
