<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout-standalone}">
<head>
    <title>Paiement réussi</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container text-center py-5">
            <div style="width:64px;height:64px;border-radius:var(--radius-xl);background:var(--bg-tertiary);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem">
                <i class="fas fa-check-circle" style="font-size:28px;color:var(--success)"></i>
            </div>
            <h1 class="mb-3 animate-fade-in-up">Paiement réussi !</h1>
            <p class="lead">Votre abonnement est maintenant actif. Merci pour votre confiance.</p>

            <div style="background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); padding: 20px; border-radius: 12px; margin: 24px auto; max-width: 500px;">
                <p style="margin: 0; color: var(--success);">
                    <i class="fas fa-info-circle"></i>
                    Vous pouvez gérer votre abonnement à tout moment depuis vos paramètres.
                </p>
            </div>

            <div class="mt-4">
                <a th:href="@{/login}" class="btn btn-primary btn-lg rounded-md fw-600">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </a>
            </div>
        </div>
    </div>
</body>
</html>
