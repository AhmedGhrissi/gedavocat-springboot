<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Paiement réussi</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container text-center py-5">
            <div style="font-size: 80px; color: #22c55e;">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1 class="mb-3">Paiement réussi !</h1>
            <p class="lead">Votre abonnement est maintenant actif. Merci pour votre confiance.</p>

            <div style="background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); padding: 20px; border-radius: 12px; margin: 24px auto; max-width: 500px;">
                <p style="margin: 0; color: #16a34a;">
                    <i class="fas fa-info-circle"></i>
                    Vous pouvez gérer votre abonnement à tout moment depuis vos paramètres.
                </p>
            </div>

            <div class="mt-4">
                <a th:href="@{/dashboard}" class="btn btn-primary btn-lg me-2">
                    <i class="fas fa-home"></i> Tableau de bord
                </a>
                <a th:href="@{/cases}" class="btn btn-outline-primary btn-lg">
                    <i class="fas fa-folder"></i> Mes dossiers
                </a>
            </div>
        </div>
    </div>
</body>
</html>
