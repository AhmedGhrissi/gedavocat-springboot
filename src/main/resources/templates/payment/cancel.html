<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <link rel="stylesheet" th:href="@{/css/pages/payment-success.css}">
<title>Paiement annulé</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container text-center py-5">
            <div style="width:64px;height:64px;border-radius:var(--radius-xl);background:var(--bg-tertiary);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem">
                <i class="fas fa-times-circle" style="font-size:28px;color:var(--warning)"></i>
            </div>
            <h1 class="mb-3 animate-fade-in-up">Paiement annulé</h1>
            <p class="lead">Vous pouvez réessayer à tout moment.</p>
            <a th:href="@{/subscription/pricing}" class="btn btn-primary btn-lg mt-3 rounded-md fw-600">
                <i class="fas fa-arrow-left"></i> Retour aux plans
            </a>
        </div>
    </div>
</body>
</html>
