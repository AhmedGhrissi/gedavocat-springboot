<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Détail de la signature</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-center mb-4 page-header">
            <h2 class="animate-fade-in-up"><i class="fas fa-file-signature"></i> Détail de la signature électronique</h2>
            <a th:href="@{/signatures}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> Retour
            </a>
        </div>

        <!-- Messages flash -->
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
            <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${signature == null}" class="alert alert-warning">
            <i class="fas fa-exclamation-triangle"></i> Signature introuvable.
        </div>

        <div th:if="${signature != null}" class="row">
            <!-- Informations principales -->
            <div class="col-md-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="fas fa-info-circle"></i> Informations</h5>
                        <span class="badge"
                              th:classappend="${signature.status.name() == 'SIGNED'} ? 'bg-success' :
                                             (${signature.status.name() == 'REJECTED'} ? 'bg-danger' :
                                             (${signature.status.name() == 'EXPIRED'} ? 'bg-warning text-dark' : 'bg-primary'))"
                              th:text="${signature.status.displayName}">-</span>
                    </div>
                    <div class="card-body">
                        <dl class="row">
                            <dt class="col-sm-4">Titre / Document</dt>
                            <dd class="col-sm-8" th:text="${signature.documentName ?: '-'}">-</dd>

                            <dt class="col-sm-4">Signataire</dt>
                            <dd class="col-sm-8" th:text="${signature.signerName + ' &lt;' + signature.signerEmail + '&gt;'}">-</dd>

                            <dt class="col-sm-4">Niveau de signature</dt>
                            <dd class="col-sm-8" th:text="${signature.level == 'simple' ? 'Simple' : (signature.level == 'advanced' ? 'Avancée (eIDAS)' : (signature.level == 'qualified' ? 'Qualifiée (eIDAS)' : (signature.level ?: 'Avancée (eIDAS)')))}">-</dd>

                            <dt class="col-sm-4">Dossier</dt>
                            <dd class="col-sm-8">
                                <a th:if="${signature.caseEntity != null}"
                                   th:href="@{/cases/{id}(id=${signature.caseEntity.id})}"
                                   th:text="${signature.caseEntity.name}">-</a>
                                <span th:if="${signature.caseEntity == null}">Aucun</span>
                            </dd>

                            <dt class="col-sm-4">Créée le</dt>
                            <dd class="col-sm-8" th:text="${signature.createdAt != null ? #temporals.format(signature.createdAt, 'dd/MM/yyyy HH:mm') : '-'}">-</dd>

                            <dt class="col-sm-4">Signée le</dt>
                            <dd class="col-sm-8" th:text="${signature.signedAt != null ? #temporals.format(signature.signedAt, 'dd/MM/yyyy HH:mm') : '-'}">-</dd>

                            <dt class="col-sm-4">ID Yousign</dt>
                            <dd class="col-sm-8">
                                <code th:text="${signature.yousignSignatureRequestId ?: '-'}">-</code>
                            </dd>
                        </dl>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0"><i class="fas fa-bolt"></i> Actions</h5>
                    </div>
                    <div class="card-body d-grid gap-2">

                        <!-- Télécharger le document signé (si complété) -->
                        <a th:if="${signature.status.name() == 'SIGNED'}"
                           th:href="@{/signatures/{id}/download(id=${signature.id})}"
                           class="btn btn-success" style="border-radius:var(--radius-lg);font-weight:600">
                            <i class="fas fa-download"></i> Télécharger le document signé
                        </a>

                        <!-- Relancer le signataire (si en attente) -->
                        <form th:if="${signature.status.name() == 'PENDING'}"
                              th:action="@{/signatures/{id}/remind(id=${signature.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-warning w-100" style="border-radius:var(--radius-lg);font-weight:600">
                                <i class="fas fa-bell"></i> Relancer le signataire
                            </button>
                        </form>

                        <!-- Annuler (si en attente) -->
                        <form th:if="${signature.status.name() == 'PENDING'}"
                              th:action="@{/signatures/{id}/cancel(id=${signature.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-outline-danger w-100" style="border-radius:var(--radius-lg);font-weight:600"
                                    data-confirm="Voulez-vous vraiment annuler cette demande de signature ?">
                                <i class="fas fa-times"></i> Annuler la demande
                            </button>
                        </form>

                        <a th:href="@{/signatures}" class="btn btn-outline-secondary">
                            <i class="fas fa-list"></i> Toutes les signatures
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
