<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#1E3A5F">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.svg">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">DocAvocat</title>

    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/font-awesome/6.4.0/css/all.min.css}" rel="stylesheet">
    <link th:href="@{/css/global-unified-theme.css}" rel="stylesheet">

    <th:block layout:fragment="extra-css"></th:block>
</head>
<body class="standalone-body">

    <header class="standalone-header">
        <a href="/" class="standalone-logo-link">
            <i class="fas fa-scale-balanced standalone-logo-icon"></i>
            <span class="standalone-logo-text">DocAvocat</span>
        </a>
    </header>

    <main id="main-content">
        <div layout:fragment="content"></div>
    </main>

    <footer class="standalone-footer">
        &copy; 2026 DocAvocat &mdash;
        <a th:href="@{/legal/terms}" class="standalone-footer-link">CGU</a> &middot;
        <a th:href="@{/legal/privacy}" class="standalone-footer-link">Confidentialité</a>
    </footer>

    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <th:block layout:fragment="extra-js"></th:block>
</body>
</html>
