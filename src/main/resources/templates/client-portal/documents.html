<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Mes Documents</title>
    <style>
        .documents-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 40px;
            color: white;
            margin-bottom: 30px;
        }
        
        .document-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .doc-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="container-fluid">
            <!-- En-tête -->
            <div class="documents-header">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <a th:href="@{/my-cases/{id}(id=${case.id})}" class="btn btn-light">
                        <i class="fas fa-arrow-left"></i> Retour au dossier
                    </a>
                </div>
                <h1><i class="fas fa-file-pdf"></i> Documents</h1>
                <p style="font-size: 16px; opacity: 0.95;">
                    Documents du dossier : <span th:text="${case.name}"></span>
                </p>
            </div>

            <!-- Liste des documents -->
            <div th:if="${documents != null and !documents.empty}">
                <div th:each="doc : ${documents}" class="document-card">
                    <div class="doc-icon">
                        <i class="fas fa-file-pdf"></i>
                    </div>
                    <div class="flex-grow-1">
                        <h5 class="mb-1" th:text="${doc.originalName}">Document.pdf</h5>
                        <small class="text-muted">
                            <span th:text="${doc.fileSize != null ? #numbers.formatDecimal(doc.fileSize / 1024.0, 1, 2) + ' KB' : ''}"></span>
                            • Version <span th:text="${doc.version}">1</span>
                            • Ajouté le <span th:text="${#temporals.format(doc.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                        </small>
                    </div>
                    <a th:href="@{/documents/{id}/download(id=${doc.id})}" 
                       class="btn btn-primary">
                        <i class="fas fa-download"></i> Télécharger
                    </a>
                </div>
            </div>

            <!-- État vide -->
            <div th:if="${documents == null or documents.empty}" class="text-center py-5">
                <i class="fas fa-file-pdf fa-4x text-muted mb-3"></i>
                <h3>Aucun document</h3>
                <p class="text-muted">Ce dossier ne contient aucun document pour le moment</p>
            </div>
        </div>
    </div>
</body>
</html>
