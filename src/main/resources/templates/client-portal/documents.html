<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <link rel="stylesheet" th:href="@{/css/pages/client-portal.css}">
<title>Mes Documents</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container-fluid">
            <!-- En-tête -->
            <div class="documents-header">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <a th:href="@{/my-cases/{id}(id=${case.id})}" class="btn btn-light">
                        <i class="fas fa-arrow-left"></i> Retour au dossier
                    </a>
                </div>
                <h1><i class="fas fa-file-pdf"></i> Documents</h1>
                <p style="font-size: 16px; opacity: 0.95;">
                    Documents du dossier : <span th:text="${case.name}"></span>
                </p>
            </div>

            <!-- Liste des documents -->
            <div th:if="${documents != null and !documents.empty}">
                <div th:each="doc : ${documents}" class="document-card">
                    <div class="doc-icon">
                        <i class="fas fa-file-pdf"></i>
                    </div>
                    <div class="flex-grow-1">
                        <h5 class="mb-1" th:text="${doc.originalName}">Document.pdf</h5>
                        <small class="text-muted">
                            <span th:text="${doc.fileSize != null ? #numbers.formatDecimal(doc.fileSize / 1024.0, 1, 2) + ' KB' : ''}"></span>
                            • Version <span th:text="${doc.version}">1</span>
                            • Ajouté le <span th:text="${#temporals.format(doc.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                            <span th:if="${doc.uploaderRole != null}" class="badge bg-light text-dark ms-1" 
                                  th:text="${doc.uploaderRole == 'CLIENT' ? 'Par vous' : 'Par l''avocat'}"></span>
                        </small>
                    </div>
                    <div class="d-flex gap-1">
                        <!-- Bouton Prévisualiser (PDF et images seulement) -->
                        <a th:if="${doc.mimetype != null and (doc.mimetype.startsWith('application/pdf') or doc.mimetype.startsWith('image/'))}" 
                           th:href="@{/my-cases/documents/{id}/preview(id=${doc.id})}" 
                           class="btn btn-outline-primary" target="_blank" title="Prévisualiser">
                            <i class="fas fa-eye"></i>
                        </a>
                        <!-- Route portail client : filigrane appliqué selon le rôle du déposant -->
                        <a th:href="@{/my-cases/documents/{id}/download(id=${doc.id})}" 
                           class="btn btn-primary">
                            <i class="fas fa-download"></i> Télécharger
                        </a>
                    </div>
                </div>
            </div>

            <!-- État vide -->
            <div th:if="${documents == null or documents.empty}" class="text-center py-5">
                <i class="fas fa-file-pdf fa-4x text-muted mb-3"></i>
                <h3>Aucun document</h3>
                <p class="text-muted">Ce dossier ne contient aucun document pour le moment</p>
            </div>
        </div>
    </div>
</body>
</html>
