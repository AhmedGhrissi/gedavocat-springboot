<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <link rel="stylesheet" th:href="@{/css/pages/cases.css}">
    <title>Dossiers</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container-fluid">
            <!-- Messages -->
            <div th:if="${message}" class="alert alert-success alert-dismissible fade show mt-3" role="alert">
                <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- En-tête -->
            <div class="hero-banner mb-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div style="position:relative;z-index:1">
                        <h1 style="font-size:1.5rem;font-weight:800;letter-spacing:-0.025em;margin-bottom:4px;color:#fff">
                            <i class="fas fa-folder-open me-2"></i>Dossiers
                        </h1>
                        <p style="font-size:0.875rem;margin:0;color:rgba(255,255,255,0.8)"
                           th:text="${cases != null ? cases.size() + ' dossier(s)' : '0 dossier(s)'}">0 dossier(s)</p>
                    </div>
                    <a th:href="@{/cases/new}" class="btn" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius-lg);font-weight:600;backdrop-filter:blur(8px);padding:8px 18px">
                        <i class="fas fa-folder-plus me-1"></i> Nouveau dossier
                    </a>
                </div>
            </div>

            <!-- Filtres par statut (boutons) + recherche -->
            <div class="filter-card card mb-3 animate-fade-in-up">
                <div class="card-body py-3">
                    <div class="d-flex flex-wrap align-items-center gap-3">
                        <!-- Boutons filtres statut -->
                        <div class="btn-group" role="group">
                            <a th:href="@{/cases}" 
                               class="btn btn-sm btn-outline-primary"
                               th:classappend="${selectedStatus == null ? 'active' : ''}">
                                Tous
                            </a>
                            <a th:each="stat : ${statuses}" 
                               th:href="@{/cases(status=${stat})}"
                               class="btn btn-sm btn-outline-primary"
                               th:classappend="${selectedStatus != null and selectedStatus == stat ? 'active' : ''}"
                               th:text="${stat.displayName}">Statut</a>
                        </div>
                        <!-- Barre de recherche -->
                        <form th:action="@{/cases}" method="get" class="d-flex gap-2 ms-auto" style="max-width:400px;flex:1">
                            <input type="text" name="search" th:value="${search}" 
                                   class="form-control form-control-sm" placeholder="Rechercher un dossier...">
                            <button type="submit" class="btn btn-sm btn-primary">
                                <i class="fas fa-search"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Liste des dossiers -->
            <div class="card animate-fade-in-up">
                <div class="card-body p-0">
                    <div class="table-responsive" th:if="${cases != null and !cases.empty}">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th style="padding-left:20px">Dossier</th>
                                    <th>Client</th>
                                    <th>Statut</th>
                                    <th>Créé le</th>
                                    <th style="width:200px">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="case : ${cases}">
                                    <td style="padding-left:20px">
                                        <a th:href="@{/cases/{id}(id=${case.id})}" 
                                           th:text="${case.name}" 
                                           class="text-decoration-none fw-semibold" style="color:var(--brand-600)">Dossier</a>
                                        <div th:if="${case.description}" 
                                             style="font-size:0.75rem;max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-tertiary)"
                                             th:text="${case.description}">Description</div>
                                    </td>
                                    <td>
                                        <span th:if="${case.client != null}">
                                            <a th:href="@{/clients/{id}(id=${case.client.id})}" 
                                               th:text="${case.client.name}" 
                                               class="text-decoration-none" style="color:var(--text-primary)">Client</a>
                                        </span>
                                        <span th:if="${case.client == null}" style="color:var(--text-tertiary)">—</span>
                                    </td>
                                    <td>
                                        <span class="case-status"
                                              th:classappend="${case.status.name() == 'OPEN' ? 'open' : (case.status.name() == 'IN_PROGRESS' ? 'in-progress' : (case.status.name() == 'CLOSED' ? 'closed' : 'archived'))}"
                                              th:text="${case.status.displayName}">Statut</span>
                                    </td>
                                    <td style="font-size:0.8125rem;color:var(--text-secondary)" th:text="${case.createdAt != null ? #temporals.format(case.createdAt, 'dd/MM/yyyy') : '-'}">Date</td>
                                    <td>
                                        <div class="d-flex gap-1">
                                            <a th:href="@{/cases/{id}(id=${case.id})}" class="btn btn-sm btn-outline-info" title="Voir" style="border-radius:var(--radius-md)">
                                                <i class="fas fa-eye"></i>
                                            </a>
                                            <a th:href="@{/cases/{id}/edit(id=${case.id})}" class="btn btn-sm btn-outline-warning" title="Modifier" style="border-radius:var(--radius-md)">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <a th:href="@{/cases/{id}(id=${case.id})}" class="btn btn-sm btn-outline-primary" title="Documents" style="border-radius:var(--radius-md)">
                                                <i class="fas fa-file-alt"></i>
                                            </a>
                                            <form th:action="@{/cases/{id}/delete(id=${case.id})}" method="post" style="display:inline">
                                                <button type="submit" class="btn btn-sm btn-outline-danger" title="Supprimer" style="border-radius:var(--radius-md)"
                                                        data-confirm="Êtes-vous sûr de vouloir supprimer ce dossier ?" data-confirm-type="danger">
                                                    <i class="fas fa-trash"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div th:if="${cases == null or cases.empty}" class="text-center py-5">
                        <div style="width:64px;height:64px;border-radius:var(--radius-xl);background:var(--bg-tertiary);display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem">
                            <i class="fas fa-folder-open fa-2x" style="color:var(--text-tertiary)"></i>
                        </div>
                        <h5 style="color:var(--text-primary);font-weight:600">Aucun dossier trouvé</h5>
                        <p style="color:var(--text-secondary)" th:if="${search != null and !search.isEmpty()}">
                            Aucun résultat pour « <span th:text="${search}"></span> »
                        </p>
                        <p style="color:var(--text-secondary)" th:if="${search == null or search.isEmpty()}">
                            Vous n'avez pas encore créé de dossier
                        </p>
                        <a th:href="@{/cases/new}" class="btn btn-primary mt-2" style="border-radius:var(--radius-lg);font-weight:600">
                            <i class="fas fa-folder-plus"></i> Créer votre premier dossier
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
