<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Dossiers</title>
</head>
<body>
    <div layout:fragment="content">

        <th:block layout:fragment="extra-css">
            <style>
                /* FIX URGENT - Boutons actions toujours visibles */
                .btn {
                    display: inline-flex !important;
                    align-items: center;
                    gap: 0.25rem;
                    padding: 0.375rem 0.75rem;
                    border-radius: 6px;
                    text-decoration: none;
                    transition: all 0.2s;
                    white-space: nowrap;
                }
                .btn-ghost {
                    background: #F8FAFC !important;
                    border: 2px solid #0F172A !important;
                    color: #0F172A !important;
                    font-weight: 600 !important;
                }
                .btn-ghost:hover {
                    background: #0F172A !important;
                    color: #FFFFFF !important;
                    border-color: #0F172A !important;
                    transform: translateY(-1px);
                }
                .btn-sm {
                    padding: 0.5rem 0.75rem !important;
                    font-size: 0.875rem;
                }
                .btn i {
                    color: inherit !important;
                    font-size: 1rem;
                }

                /* Tooltip styles: position tooltip text above the button on hover */
                .tooltip {
                    position: relative;
                    display: inline-flex; /* keeps button sizing intact */
                    align-items: center;
                }
                .tooltip .tooltip-text {
                    visibility: hidden;
                    opacity: 0;
                    pointer-events: none;
                    position: absolute;
                    bottom: calc(100% + 8px);
                    left: 50%;
                    transform: translateX(-50%);
                    background: rgba(15, 23, 42, 0.95);
                    color: #fff;
                    padding: 6px 8px;
                    border-radius: 6px;
                    font-size: 0.8125rem;
                    white-space: nowrap;
                    z-index: 9999;
                    transition: opacity 150ms ease, transform 150ms ease;
                }
                .tooltip:hover .tooltip-text,
                .tooltip:focus-within .tooltip-text {
                    visibility: visible;
                    opacity: 1;
                    transform: translateX(-50%) translateY(-4px);
                    pointer-events: auto;
                }
                /* Small arrow under tooltip */
                .tooltip .tooltip-text::after {
                    content: '';
                    position: absolute;
                    top: 100%;
                    left: 50%;
                    transform: translateX(-50%);
                    border-width: 6px;
                    border-style: solid;
                    border-color: rgba(15, 23, 42, 0.95) transparent transparent transparent;
                }

                /* Ensure icon-only buttons remain square and visible */
                .btn.btn-ghost.btn-sm {
                    min-width: 40px;
                    height: 36px;
                    justify-content: center;
                    padding: 0.375rem;
                }

                .btn i { color: inherit !important; }

                /* Accessible focus state */
                .btn:focus {
                    outline: 2px solid rgba(99, 102, 241, 0.6);
                    outline-offset: 2px;
                }

                /* Responsive adjustments */
                @media (max-width: 480px) {
                    .tooltip .tooltip-text { font-size: 0.75rem; }
                    .btn.btn-ghost.btn-sm { min-width: 36px; height: 34px; }
                }
            </style>
        </th:block>

        <!-- Messages -->
        <div th:if="${message}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
        </div>

        <!-- Page Header -->
        <div class="page-header" style="margin-bottom: 2.5rem;">
            <div>
                <h1 class="page-title" style="font-size: 1.75rem; font-weight: 700; color: #0F172A; margin-bottom: 0.5rem;">
                    <i class="fas fa-folder-open" style="color: #C6A75E; margin-right: 0.75rem;"></i>
                    Mes dossiers
                </h1>
                <p class="page-subtitle" th:text="${cases != null ? cases.size() + ' dossier(s)' : '0 dossier'}">0 dossiers</p>
            </div>
            <div class="d-flex gap-3">
                <a th:href="@{/cases/new}" class="btn btn-primary" style="margin-right: 0.5rem;">
                    <i class="fas fa-folder-plus"></i>
                    Nouveau dossier
                </a>
                <button class="btn btn-secondary" onclick="window.print()">
                    <i class="fas fa-file-export"></i>
                    Exporter
                </button>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="stats-grid" style="margin-bottom: 1.5rem;">
            <div class="card stat-filter-card" onclick="filterByStatus('')">
                <div class="card-body">
                    <div class="stat-filter-label">Total</div>
                    <div class="stat-filter-value" th:text="${cases != null ? cases.size() : 0}">0</div>
                </div>
            </div>
            <div class="card stat-filter-card" onclick="filterByStatus('OPEN')">
                <div class="card-body">
                    <div class="stat-filter-label">
                        <i class="fas fa-folder-open"></i> En cours
                    </div>
                    <div class="stat-filter-value" style="color: #16A34A;"
                         th:text="${openCount != null ? openCount : 0}">0</div>
                </div>
            </div>
            <div class="card stat-filter-card" onclick="filterByStatus('CLOSED')">
                <div class="card-body">
                    <div class="stat-filter-label">
                        <i class="fas fa-folder"></i> Clôturés
                    </div>
                    <div class="stat-filter-value" style="color: #D97706;"
                         th:text="${closedCount != null ? closedCount : 0}">0</div>
                </div>
            </div>
            <div class="card stat-filter-card" onclick="filterByStatus('ARCHIVED')">
                <div class="card-body">
                    <div class="stat-filter-label">
                        <i class="fas fa-archive"></i> Archivés
                    </div>
                    <div class="stat-filter-value" style="color: #64748B;"
                         th:text="${archivedCount != null ? archivedCount : 0}">0</div>
                </div>
            </div>
        </div>

        <!-- Search & Filters -->
        <div class="card" style="margin-bottom: 1.5rem;">
            <div class="card-body">
                <div class="search-bar">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" placeholder="Rechercher un dossier..." 
                           id="searchCases" onkeyup="filterCases()">
                </div>
            </div>
        </div>

        <!-- Cases List -->
        <div class="card card-elevated animate-fade-in">
            <div class="card-header">
                <h3 style="font-size: 1.125rem; margin: 0;">
                    <i class="fas fa-list" style="color: var(--success);"></i>
                    Liste des dossiers
                </h3>
            </div>
            <div class="card-body" style="padding: 0;">
                <div th:if="${cases != null and !cases.empty}">
                    <table class="table-modern" id="casesTable" data-search-results>
                        <thead>
                            <tr>
                                <th style="width: 30%;"><i class="fas fa-folder"></i> Dossier</th>
                                <th style="width: 20%;"><i class="fas fa-user"></i> Client</th>
                                <th style="width: 15%;"><i class="fas fa-tag"></i> Statut</th>
                                <th style="width: 15%;"><i class="fas fa-file-alt"></i> Documents</th>
                                <th style="width: 10%;"><i class="fas fa-calendar"></i> Créé le</th>
                                <th style="width: 10%;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="case : ${cases}" data-search-item th:attr="data-status=${case.status.name()}">
                                <td>
                                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                                        <div style="width: 2.5rem; height: 2.5rem; border-radius: var(--radius-md); background: var(--success-light); display: flex; align-items: center; justify-content: center; color: var(--success);">
                                            <i class="fas fa-briefcase"></i>
                                        </div>
                                        <div>
                                            <a th:href="@{/cases/{id}(id=${case.id})}" 
                                               style="font-weight: 600; color: var(--gray-900); text-decoration: none;"
                                               th:text="${case.name}">Dossier</a>
                                            <div style="font-size: 0.8125rem; color: var(--gray-600);" th:if="${case.reference}">
                                                Réf: <span th:text="${case.reference}"></span>
                                            </div>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <a th:if="${case.client != null}" th:href="@{/clients/{id}(id=${case.client.id})}" 
                                       style="color: var(--primary); text-decoration: none;" th:text="${case.client.name}">Client</a>
                                    <span th:if="${case.client == null}" style="color: var(--gray-400);">-</span>
                                </td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${case.status.name() == 'OPEN' ? 'badge-success' : (case.status.name() == 'CLOSED' ? 'badge-warning' : 'badge-info')}"
                                          th:text="${case.status.displayName}">Statut</span>
                                </td>
                                <td>
                                    <span class="badge badge-info" 
                                          th:text="${case.documents != null ? case.documents.size() : 0}">0</span>
                                </td>
                                <td style="font-size: 0.875rem; color: var(--gray-600);" th:text="${#temporals.format(case.createdAt, 'dd/MM/yyyy')}">Date</td>
                                <td>
                                    <div style="display: flex; gap: 0.5rem;">
                                        <a th:href="@{/cases/{id}(id=${case.id})}" class="btn btn-ghost btn-sm tooltip" data-tooltip="Voir">
                                            <i class="fas fa-eye"></i>
                                            <span class="tooltip-text">Voir</span>
                                        </a>
                                        <a th:href="@{/cases/{id}/edit(id=${case.id})}" class="btn btn-ghost btn-sm tooltip" data-tooltip="Modifier">
                                            <i class="fas fa-edit"></i>
                                            <span class="tooltip-text">Modifier</span>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${cases == null or cases.empty}" class="empty-state">
                    <i class="fas fa-folder-open empty-state-icon"></i>
                    <h3 class="empty-state-title">Aucun dossier</h3>
                    <p class="empty-state-message">Créez votre premier dossier</p>
                    <a th:href="@{/cases/new}" class="btn btn-primary" style="margin-top: 1rem;">
                        <i class="fas fa-folder-plus"></i> Créer un dossier
                    </a>
                </div>
            </div>
        </div>

        <script th:attr="nonce=${cspNonce}">
        function filterCases() {
            const input = document.getElementById('searchCases');
            const filter = input.value.toLowerCase();
            const table = document.getElementById('casesTable');
            const rows = table.getElementsByTagName('tr');
            
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const text = row.textContent || row.innerText;
                row.style.display = text.toLowerCase().indexOf(filter) > -1 ? '' : 'none';
            }
        }

        function filterByStatus(status) {
            const url = new URL(window.location);
            if (status) {
                url.searchParams.set('status', status);
            } else {
                url.searchParams.delete('status');
            }
            window.location.href = url.toString();
        }
        </script>
    </div>
</body>
</html>
