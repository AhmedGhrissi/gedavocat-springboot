<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    
    <style>
        /* Dark theme overrides for this page */
        :root { --bg:#080b14; --surface-1:#0f172a; --surface-2:#1e2d3d; --border:rgba(148,163,184,0.12); --text-primary:#f1f5f9; --text-secondary:#94a3b8; --primary:#667eea; --accent:#818cf8; }
        h1,h2,h3,h4,h5,h6 { color: var(--text-primary) !important; }
        p, label, span { color: inherit; }
        .card { background: rgba(255,255,255,0.04) !important; border-color: var(--border) !important; }
        .card-header { background: transparent !important; border-color: var(--border) !important; color: var(--text-primary) !important; }
        .text-muted { color: var(--text-secondary) !important; }
        a { color: var(--accent); }
    </style><title>Dossiers</title>
    <style>
        .page-title { font-size: 22px; font-weight: 700; color: #f1f5f9; display: flex; align-items: center; gap: 10px; }
        .table a.text-decoration-none { color: #c7d2fe; font-weight: 500; }
        .table a.text-decoration-none:hover { color: #a5b4fc; }
        .btn-group .btn-sm { border-radius: 8px !important; padding: 5px 9px; }
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state i { color: #374151; }
        .empty-state h4 { color: #6b7280; margin: 16px 0 8px; }
        .empty-state p { color: #4b5563; }
        .filter-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border, rgba(148,163,184,0.12)); border-radius: 16px; }
    </style>
</head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <!-- Messages -->
            <div th:if="${message}" class="alert alert-success alert-dismissible fade show mt-3" role="alert">
                <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3 mb-3">
                <h1><i class="fas fa-folder-open"></i> Mes dossiers</h1>
                <a th:href="@{/cases/new}" class="btn btn-primary">
                    <i class="fas fa-folder-plus"></i> Nouveau dossier
                </a>
            </div>
            
            <!-- Recherche et filtres -->
            <div class="card mb-3">
                <div class="card-body">
                    <form th:action="@{/cases}" method="get" class="row g-3">
                        <div class="col-md-6">
                            <input type="text" name="search" th:value="${search}" 
                                   class="form-control" placeholder="Rechercher un dossier...">
                        </div>
                        <div class="col-md-4">
                            <select name="status" class="form-select">
                                <option value="">Tous les statuts</option>
                                <option th:each="stat : ${statuses}" 
                                        th:value="${stat}" 
                                        th:text="${stat.displayName}"
                                        th:selected="${stat == selectedStatus}">Statut</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-search"></i> Filtrer
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Liste des dossiers -->
            <div class="card">
                <div class="card-body">
                    <table class="table table-hover" th:if="${cases != null and !cases.empty}">
                        <thead>
                            <tr>
                                <th>Nom du dossier</th>
                                <th>Client</th>
                                <th>Statut</th>
                                <th>Date création</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="case : ${cases}">
                                <td>
                                    <a th:href="@{/cases/{id}(id=${case.id})}" th:text="${case.name}" class="text-decoration-none">Dossier</a>
                                </td>
                                <td>
                                    <span th:if="${case.client != null}">
                                        <a th:href="@{/clients/{id}(id=${case.client.id})}" 
                                           th:text="${case.client.name}" 
                                           class="text-decoration-none">Client</a>
                                    </span>
                                    <span th:if="${case.client == null}" class="text-muted">Aucun client</span>
                                </td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${case.status.name() == 'OPEN' ? 'bg-success' : (case.status.name() == 'IN_PROGRESS' ? 'bg-primary' : (case.status.name() == 'CLOSED' ? 'bg-warning text-dark' : (case.status.name() == 'ARCHIVED' ? 'bg-secondary' : 'bg-secondary')))}"
                                          th:text="${case.status.displayName}">Statut</span>
                                </td>
                                <td th:text="${case.createdAt != null ? #temporals.format(case.createdAt, 'dd/MM/yyyy') : '-'}">Date</td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/cases/{id}(id=${case.id})}" class="btn btn-sm btn-outline-info" title="Voir">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                        <a th:href="@{/cases/{id}/edit(id=${case.id})}" class="btn btn-sm btn-outline-warning" title="Modifier">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <a th:href="@{/documents/case/{id}(id=${case.id})}" class="btn btn-sm btn-outline-primary" title="Documents">
                                            <i class="fas fa-file"></i>
                                        </a>
                                        <form th:action="@{/cases/{id}/delete(id=${case.id})}" method="post" style="display: inline;">
                                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Supprimer"
                                                    onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce dossier ?')">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                    
                    <div th:if="${cases == null or cases.empty}" class="empty-state">
                        <i class="fas fa-folder-open fa-3x"></i>
                        <h4>Aucun dossier trouvé</h4>
                        <p th:if="${search != null and !search.isEmpty()}">
                            Aucun résultat pour "<span th:text="${search}"></span>"
                        </p>
                        <p th:if="${search == null or search.isEmpty()}">
                            Vous n'avez pas encore créé de dossier
                        </p>
                        <a th:href="@{/cases/new}" class="btn btn-primary mt-2">
                            <i class="fas fa-folder-plus"></i> Créer votre premier dossier
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
