<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lien expiré — GedAvocat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; }
        .expired-card { border: none; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); overflow: hidden; }
        .expired-card .card-body { padding: 3rem; }
        .icon-circle { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #fef3c7, #fde68a); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
        .icon-circle i { font-size: 2rem; color: #f59e0b; }
        h3 { font-weight: 700; color: #0f172a; letter-spacing: -0.02em; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="expired-card card">
                <div class="card-body">
                    <div class="icon-circle">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <h3>Lien de partage indisponible</h3>
                    <p class="text-muted mt-3" th:text="${error}">Ce lien est expiré ou révoqué.</p>
                    <p class="text-muted">Veuillez contacter l'avocat qui vous a partagé ce lien.</p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
