<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <link rel="stylesheet" th:href="@{/css/pages/cases.css}">
    <title th:text="${isEdit ? 'Modifier le dossier' : 'Nouveau dossier'}">Dossier</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container">
            <div class="row justify-content-center mt-4">
                <div class="col-md-8">
                    <div class="case-form-card card animate-fade-in-up">
                        <div class="card-header" style="background:var(--bg-secondary);border-bottom:1px solid var(--border-light)">
                            <h3 class="mb-0" style="font-size:1.25rem;font-weight:700;color:var(--text-primary)">
                                <i class="fas fa-folder-plus" style="color:var(--brand-500)"></i>
                                <span th:text="${isEdit ? 'Modifier le dossier' : 'Nouveau dossier'}">Dossier</span>
                            </h3>
                        </div>
                        <div class="card-body">
                            <!-- Affichage des erreurs globales -->
                            <div class="alert alert-danger" th:if="${error}">
                                <i class="fas fa-exclamation-triangle"></i>
                                <span th:text="${error}">Erreur</span>
                            </div>
                            
<form th:action="${isEdit} ? @{/cases/{id}(id=${case.id})} : @{/cases}" 
                                  method="post" 
                                  th:object="${case}">
                                
                                <!-- Champ caché pour l'ID en mode édition -->
                                <input type="hidden" th:if="${isEdit}" th:field="*{id}" />
                                
                                <!-- Nom du dossier -->
                                <div class="mb-3">
                                    <label for="name" class="form-label">Nom du dossier <span class="text-danger">*</span></label>
                                    <input type="text" 
                                           class="form-control" 
                                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                                           id="name" 
                                           th:field="*{name}"
                                           required
                                           placeholder="Ex: Divorce Dupont">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                </div>

                                <!-- Client -->
                                <div class="mb-3">
                                    <label for="clientId" class="form-label">Client <span class="text-danger">*</span></label>
                                    <select class="form-select" 
                                            id="clientId" 
                                            name="clientId"
                                            th:classappend="${#fields.hasErrors('client')} ? 'is-invalid' : ''"
                                            required>
                                        <option value="">Sélectionnez un client</option>
                                        <option th:each="c : ${clients}" 
                                                th:value="${c.id}" 
                                                th:text="${c.name}"
                                                th:selected="${selectedClientId != null and c.id == selectedClientId}">
                                            Client
                                        </option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('client')}" th:errors="*{client}">
                                        Veuillez sélectionner un client
                                    </div>
                                    <div class="form-text">
                                        <button type="button" class="btn btn-link p-0 text-decoration-none" data-bs-toggle="modal" data-bs-target="#quickCreateClientModal">
                                            <i class="fas fa-plus-circle"></i> Créer un nouveau client
                                        </button>
                                    </div>
                                </div>

                                <!-- Description -->
                                <div class="mb-3">
                                    <label for="description" class="form-label">Description</label>
                                    <textarea class="form-control" 
                                              th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"
                                              id="description" 
                                              th:field="*{description}"
                                              rows="4"
                                              placeholder="Description du dossier..."></textarea>
                                </div>

                                <!-- Statut (uniquement en modification) -->
                                <div class="mb-3" th:if="${isEdit}">
                                    <label for="status" class="form-label">Statut</label>
                                    <select class="form-select" id="status" th:field="*{status}">
                                        <option th:each="stat : ${caseStatuses}"
                                                th:value="${stat}"
                                                th:text="${stat.displayName}">
                                            Statut
                                        </option>
                                    </select>
                                </div>

                                <!-- Boutons -->
                                <div class="d-flex justify-content-between mt-4">
                                    <a th:href="@{/cases}" class="btn btn-secondary">
                                        <i class="fas fa-arrow-left"></i> Annuler
                                    </a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save"></i>
                                        <span th:text="${isEdit ? 'Modifier' : 'Créer'}">Enregistrer</span>
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal création rapide de client -->
    <div class="modal fade" id="quickCreateClientModal" tabindex="-1" aria-labelledby="quickCreateClientModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="quickCreateClientModalLabel">
                        <i class="fas fa-user-plus me-2"></i>Créer un nouveau client
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
                </div>
                <div class="modal-body">
                    <div id="quickCreateAlert" class="alert d-none" role="alert"></div>
                    <div class="row g-3">
                        <div class="col-6">
                            <label for="qcFirstName" class="form-label">Prénom <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="qcFirstName" placeholder="Jean" required>
                        </div>
                        <div class="col-6">
                            <label for="qcLastName" class="form-label">Nom <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="qcLastName" placeholder="Dupont" required>
                        </div>
                        <div class="col-12">
                            <label for="qcEmail" class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="qcEmail" placeholder="jean.dupont@exemple.fr" required>
                        </div>
                        <div class="col-6">
                            <label for="qcClientType" class="form-label">Type</label>
                            <select class="form-select" id="qcClientType">
                                <option value="INDIVIDUAL">Particulier</option>
                                <option value="COMPANY">Société</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label for="qcPhone" class="form-label">Téléphone</label>
                            <input type="tel" class="form-control" id="qcPhone" placeholder="06 00 00 00 00">
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="qcSendInvitation" checked>
                                <label class="form-check-label" for="qcSendInvitation">
                                    Envoyer une invitation par email
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" id="quickCreateSubmitBtn">
                        <i class="fas fa-save me-1"></i>Créer le client
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script th:attr="nonce=${cspNonce}">
    (function () {
        const submitBtn = document.getElementById('quickCreateSubmitBtn');
        if (!submitBtn) return;

        submitBtn.addEventListener('click', function () {
            const firstName = document.getElementById('qcFirstName').value.trim();
            const lastName  = document.getElementById('qcLastName').value.trim();
            const email     = document.getElementById('qcEmail').value.trim();
            const clientType = document.getElementById('qcClientType').value;
            const phone     = document.getElementById('qcPhone').value.trim();
            const sendInv   = document.getElementById('qcSendInvitation').checked;
            const alertBox  = document.getElementById('quickCreateAlert');

            if (!firstName || !lastName || !email) {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = 'Prénom, nom et email sont obligatoires.';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Création…';

            const csrfToken  = document.querySelector('meta[name="_csrf"]')?.content;
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content || 'X-CSRF-TOKEN';

            fetch('/api/clients/quick-create', {
                method: 'POST',
                credentials: 'same-origin',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                },
                body: JSON.stringify({ firstName, lastName, email, clientType, phone, sendInvitation: sendInv })
            })
            .then(function (res) {
                return res.json().then(function (data) {
                    return { status: res.status, data };
                });
            })
            .then(function ({ status, data }) {
                if (status === 201) {
                    const select = document.getElementById('clientId');
                    const option = new Option(data.name + ' (' + data.email + ')', data.id, true, true);
                    select.add(option);
                    select.value = data.id;

                    bootstrap.Modal.getInstance(document.getElementById('quickCreateClientModal')).hide();

                    // Reset modal
                    ['qcFirstName','qcLastName','qcEmail','qcPhone'].forEach(function(id) {
                        document.getElementById(id).value = '';
                    });
                    document.getElementById('qcClientType').value = 'INDIVIDUAL';
                    document.getElementById('qcSendInvitation').checked = true;
                    alertBox.className = 'alert d-none';

                    if (data.emailWarning) {
                        showAlert('Client créé mais l\'email d\'invitation n\'a pas pu être envoyé.', 'warning');
                    } else if (sendInv) {
                        showAlert('Client créé et invitation envoyée à ' + data.email + '.', 'success');
                    } else {
                        showAlert('Client créé avec succès.', 'success');
                    }
                } else {
                    alertBox.className = 'alert alert-danger';
                    alertBox.textContent = data.message || data.error || 'Erreur lors de la création du client.';
                }
            })
            .catch(function (err) {
                alertBox.className = 'alert alert-danger';
                alertBox.textContent = 'Erreur réseau. Veuillez réessayer.';
            })
            .finally(function () {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save me-1"></i>Créer le client';
            });
        });

        function showAlert(msg, type) {
            const div = document.createElement('div');
            div.className = 'alert alert-' + type + ' alert-dismissible fade show position-fixed bottom-0 end-0 m-3';
            div.style.zIndex = '1100';
            div.innerHTML = msg + '<button type="button" class="btn-close" data-bs-dismiss="alert"></button>';
            document.body.appendChild(div);
            setTimeout(function() { div.remove(); }, 5000);
        }
    })();
    </script>
</div>
</body>
</html>
