<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Partager le dossier</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container">
        <div class="d-flex align-items-center mb-4 mt-3">
            <a th:href="@{/cases/{id}(id=${case.id})}" class="btn btn-outline-secondary me-3">
                <i class="fas fa-arrow-left"></i> Retour au dossier
            </a>
            <h2 class="mb-0">
                <i class="fas fa-share-alt text-primary"></i>
                Partager — <span th:text="${case.name}">Dossier</span>
            </h2>
        </div>

        <!-- Messages -->
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show">
            <i class="fas fa-check-circle"></i> <span th:text="${message}">OK</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Erreur</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Lien généré -->
        <div th:if="${shareFullUrl != null or shareUrl != null}" class="alert alert-primary">
            <strong><i class="fas fa-link"></i> Lien de partage :</strong>
            <div class="input-group mt-2">
                <input type="text" class="form-control" id="generatedLink"
                       th:value="${shareFullUrl != null ? shareFullUrl : (@environment.getProperty('app.base-url', 'https://docavocat.fr') + shareUrl)}"
                       readonly>
                <button class="btn btn-outline-primary" type="button" onclick="copyLink()">
                    <i class="fas fa-copy"></i> Copier
                </button>
            </div>
        </div>

        <div class="row">
            <!-- Formulaire de création -->
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="fas fa-plus-circle text-primary"></i> Créer un nouveau lien</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/cases/{id}/share(id=${case.id})}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Type de destinataire</label>
                                <div class="d-flex gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="recipientRole" value="LAWYER_SECONDARY" id="roleCollab" checked>
                                        <label class="form-check-label" for="roleCollab">
                                            <i class="fas fa-user-friends text-info"></i> Collaborateur
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="recipientRole" value="HUISSIER" id="roleHuissier">
                                        <label class="form-check-label" for="roleHuissier">
                                            <i class="fas fa-gavel text-warning"></i> Huissier
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Destinataire (email, optionnel)</label>
                                <input type="email" name="emailTo" class="form-control"
                                       placeholder="confrere@cabinet.fr">
                                <small class="text-muted">Si renseigné, le lien sera envoyé automatiquement par email</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Note / Objet</label>
                                <input type="text" name="description" class="form-control"
                                       placeholder="Ex: Cabinet Martin — expertise comptable">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Expiration</label>
                                <input type="datetime-local" name="expiresAt" class="form-control">
                                <small class="text-muted">Laissez vide pour un lien sans expiration</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Nombre maximum d'accès (optionnel)</label>
                                <input type="number" name="maxAccessCount" class="form-control"
                                       min="1" placeholder="Illimité si vide">
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-link"></i> Générer le lien
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Liens existants -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="fas fa-history"></i> Liens existants</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${existingLinks == null or existingLinks.empty}" class="text-center text-muted py-3">
                            <i class="fas fa-link fa-2x mb-2"></i>
                            <p>Aucun lien de partage créé</p>
                        </div>
                        <div th:each="link : ${existingLinks}" class="border rounded p-3 mb-3"
                             th:classappend="${!link.valid ? 'opacity-50' : ''}">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <span class="badge" th:classappend="${link.valid ? 'bg-success' : 'bg-secondary'}">
                                        <span th:text="${link.valid ? 'Actif' : (link.revoked ? 'Révoqué' : 'Expiré')}">Statut</span>
                                    </span>
                                    <span class="badge bg-info ms-1" th:if="${link.recipientRole != null and link.recipientRole.name() == 'LAWYER_SECONDARY'}">Collab</span>
                                    <span class="badge bg-warning text-dark ms-1" th:if="${link.recipientRole != null and link.recipientRole.name() == 'HUISSIER'}">Huissier</span>
                                    <div class="mt-1">
                                        <small class="text-muted" th:if="${link.description}" th:text="${link.description}">Note</small>
                                    </div>
                                    <div>
                                        <small class="text-muted">
                                            <i class="fas fa-eye"></i> <span th:text="${link.accessCount}">0</span> accès
                                            <span th:if="${link.expiresAt}">
                                                —  expire le <span th:text="${#temporals.format(link.expiresAt, 'dd/MM/yyyy HH:mm')}">date</span>
                                            </span>
                                        </small>
                                    </div>
                                    <div th:if="${link.valid}">
                                        <input type="text" class="form-control form-control-sm mt-1"
                                               th:value="${linkPublicUrls != null && linkPublicUrls.containsKey(link.id) ? linkPublicUrls[link.id] : @environment.getProperty('app.base-url', 'https://docavocat.fr') + '/cases/shared?token=' + link.token}"
                                               readonly onclick="this.select()">
                                    </div>
                                </div>
                                <form th:if="${link.valid}"
                                      th:action="@{/cases/{id}/share/{linkId}/revoke(id=${case.id}, linkId=${link.id})}"
                                      method="post" class="ms-2">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            data-confirm="Révoquer ce lien ?" data-confirm-type="danger">
                                        <i class="fas fa-ban"></i> Révoquer
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyLink() {
            const input = document.getElementById('generatedLink');
            input.select();
            document.execCommand('copy');
            appAlert('Lien copié dans le presse-papiers !', 'success');
        }
    </script>
</div>
</body>
</html>
