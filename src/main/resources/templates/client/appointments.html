<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Mes rendez-vous</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div class="container">
    <h1>Mes rendez-vous</h1>

    <div th:if="${appointments == null or #lists.isEmpty(appointments)}">
        <p>Aucun rendez-vous.</p>
    </div>

    <div th:each="appt : ${appointments}" class="appointment-card" style="border:1px solid #ddd;padding:12px;margin-bottom:10px;">
        <h3 th:text="${appt.title}"></h3>
        <p>
            <strong>Date:</strong>
            <span th:text="${#dates.format(appt.appointmentDate, 'dd/MM/yyyy HH:mm')}"></span>
            <span th:if="${appt.location != null}"> - <strong>Lieu:</strong> <span th:text="${appt.location}"></span></span>
        </p>
        <p th:if="${appt.description != null}" th:text="${appt.description}"></p>
        <p><strong>Statut:</strong> <span th:text="${appt.status}"></span></p>

        <div class="actions">
            <!-- Confirmer -->
            <form th:action="@{'/client/appointments/' + ${appt.id} + '/confirm'}" th:method="post" style="display:inline-block;margin-right:6px;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit">Confirmer</button>
            </form>

            <!-- Refuser (ouvre un champ de motif simple) -->
            <form th:action="@{'/client/appointments/' + ${appt.id} + '/refuse'}" th:method="post" style="display:inline-block;margin-right:6px;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="text" name="reason" placeholder="Motif (obligatoire)" required />
                <button type="submit">Refuser</button>
            </form>

            <!-- Proposer nouvelle date -->
            <form th:action="@{'/client/appointments/' + ${appt.id} + '/propose-date'}" th:method="post" style="display:inline-block;margin-right:6px;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="datetime-local" name="proposedDate" required />
                <input type="text" name="message" placeholder="Message (optionnel)" />
                <button type="submit">Proposer une date</button>
            </form>
        </div>

        <div th:if="${appt.status == T(com.gedavocat.model.Appointment.AppointmentStatus).RESCHEDULED}">
            <p style="color:orange;"><strong>Proposition ou refus en cours:</strong></p>
            <p th:if="${appt.rescheduleRequestedBy != null}" th:text="${'Demandé par: ' + appt.rescheduleRequestedBy}"></p>
            <p th:if="${appt.proposedDate != null}"><strong>Date proposée:</strong> <span th:text="${#dates.format(appt.proposedDate, 'dd/MM/yyyy HH:mm')}"></span></p>
            <p th:if="${appt.rescheduleMessage != null}"><strong>Motif / message:</strong> <span th:text="${appt.rescheduleMessage}"></span></p>
        </div>
    </div>
</div>
</body>
</html>
