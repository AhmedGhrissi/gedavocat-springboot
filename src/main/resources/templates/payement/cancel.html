<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Paiement annulé</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container text-center py-5">
            <div style="font-size: 80px; color: #f59e0b;">
                <i class="fas fa-times-circle"></i>
            </div>
            <h1 class="mb-3">Paiement annulé</h1>
            <p class="lead">Vous pouvez réessayer à tout moment.</p>
            <a th:href="@{/subscription/pricing}" class="btn btn-primary btn-lg mt-3">
                <i class="fas fa-arrow-left"></i> Retour aux plans
            </a>
        </div>
    </div>
</body>
</html>
