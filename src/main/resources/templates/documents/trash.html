<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <link rel="stylesheet" th:href="@{/css/pages/documents.css}">
<title>Corbeille - Documents supprimés</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container-fluid">
            <!-- Messages -->
            <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- En-tête de la corbeille -->
            <div class="trash-header page-header">
                <h1 class="animate-fade-in-up"><i class="fas fa-trash"></i> Corbeille</h1>
                <p style="font-size: 16px; opacity: 0.95;">Documents supprimés - Restauration possible</p>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <span class="text-muted">
                        <i class="fas fa-info-circle"></i> 
                        Les documents sont conservés 30 jours avant suppression définitive
                    </span>
                </div>
                <div class="d-flex gap-2">
                    <a th:href="@{/documents/case/{caseId}(caseId=${caseId})}" class="btn btn-outline-primary">
                        <i class="fas fa-arrow-left"></i> Retour aux documents
                    </a>
                    <a th:href="@{/cases/{id}(id=${caseId})}" class="btn btn-outline-secondary">
                        <i class="fas fa-folder"></i> Retour au dossier
                    </a>
                </div>
            </div>

            <!-- Liste des documents supprimés -->
            <div th:if="${documents != null and !documents.empty}">
                <div th:each="doc : ${documents}" class="file-card">
                    <div class="file-icon"
                         th:classappend="${#strings.endsWith(doc.originalName, '.pdf') ? 'pdf' :
                                         (#strings.endsWith(doc.originalName, '.doc') or #strings.endsWith(doc.originalName, '.docx')) ? 'doc' :
                                         (#strings.endsWith(doc.originalName, '.jpg') or #strings.endsWith(doc.originalName, '.png')) ? 'img' : 'default'}">
                        <i class="fas"
                           th:classappend="${#strings.endsWith(doc.originalName, '.pdf') ? 'fa-file-pdf' :
                                           (#strings.endsWith(doc.originalName, '.doc') or #strings.endsWith(doc.originalName, '.docx')) ? 'fa-file-word' :
                                           (#strings.endsWith(doc.originalName, '.jpg') or #strings.endsWith(doc.originalName, '.png')) ? 'fa-file-image' : 'fa-file'}"></i>
                    </div>
                    <div class="file-info">
                        <div class="file-name" th:text="${doc.originalName}">document.pdf</div>
                        <div class="file-meta">
                            <span class="deleted-badge">Supprimé</span>
                            <span th:text="${doc.fileSize != null ? #numbers.formatDecimal(doc.fileSize / 1024.0, 1, 2) + ' KB' : '-'}">1.2 MB</span>
                            • Supprimé le <span th:text="${#temporals.format(doc.deletedAt, 'dd/MM/yyyy HH:mm')}">01/01/2024</span>
                        </div>
                    </div>
                    <div class="file-actions">
                        <form th:action="@{/documents/{id}/restore(id=${doc.id})}" method="post" style="display: inline;">
                            <button type="submit" class="btn-icon btn-restore" title="Restaurer">
                                <i class="fas fa-undo"></i>
                            </button>
                        </form>
                        <form th:action="@{/documents/{id}/delete-permanent(id=${doc.id})}" method="post" style="display: inline;">
                            <button type="submit" class="btn-icon btn-delete" title="Supprimer définitivement"
                                    data-confirm="ATTENTION : Cette action est irréversible !

Voulez-vous vraiment supprimer définitivement ce document ?" data-confirm-type="danger">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- État vide -->
            <div th:if="${documents == null or documents.empty}" class="empty-state">
                <div style="border-radius:var(--radius-xl);background:var(--bg-tertiary);display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;margin-bottom:1rem;">
                    <i class="fas fa-check-circle fa-2x" style="color:var(--success);"></i>
                </div>
                <h3>La corbeille est vide</h3>
                <p>Aucun document supprimé</p>
                <a th:href="@{/documents/case/{caseId}(caseId=${caseId})}" class="btn btn-primary mt-3" style="font-weight:600;border-radius:var(--radius-lg);">
                    <i class="fas fa-arrow-left"></i> Retour aux documents
                </a>
            </div>
        </div>
    </div>
</body>
</html>
