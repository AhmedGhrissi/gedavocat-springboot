<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#667eea"/>
  <!-- Poteau central -->
  <rect x="47" y="28" width="6" height="44" rx="3" fill="white"/>
  <!-- Socle -->
  <rect x="28" y="68" width="44" height="6" rx="3" fill="white"/>
  <!-- Bras de balance -->
  <rect x="18" y="31" width="64" height="5" rx="2.5" fill="white"/>
  <!-- Plateau gauche -->
  <ellipse cx="28" cy="50" rx="13" ry="4" fill="white" opacity="0.9"/>
  <line x1="18" y1="36" x2="28" y2="50" stroke="white" stroke-width="2.5"/>
  <line x1="38" y1="36" x2="28" y2="50" stroke="white" stroke-width="2.5"/>
  <!-- Plateau droit (légèrement incliné pour symboliser la justice) -->
  <ellipse cx="72" cy="48" rx="13" ry="4" fill="white" opacity="0.9"/>
  <line x1="62" y1="36" x2="72" y2="48" stroke="white" stroke-width="2.5"/>
  <line x1="82" y1="36" x2="72" y2="48" stroke="white" stroke-width="2.5"/>
</svg>
