# Configuration Sécurisée DocAvocat - Production
# Fichier de propriétés sécurisé remplaçant application.properties

# =================================================================
# CONFIGURATION BASE DE DONNÉES SÉCURISÉE
# =================================================================

# Utilisateur dédié avec privilèges minimums (non-root)
spring.datasource.url=jdbc:mysql://localhost:3306/gedavocat?useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false&verifyServerCertificate=true
spring.datasource.username=${DB_USERNAME:gedavocat_app}
spring.datasource.password=${DB_PASSWORD:}

# Protection contre les injections SQL
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=60000

# Chiffrement connexions DB
spring.datasource.hikari.data-source-properties.useSSL=true
spring.datasource.hikari.data-source-properties.requireSSL=true
spring.datasource.hikari.data-source-properties.verifyServerCertificate=true

# =================================================================
# CONFIGURATION SÉCURITÉ RENFORCÉE  
# =================================================================

# JWT avec clés RSA-4096 (non plus secrets partagés)
security.jwt.rsa.private-key=${JWT_RSA_PRIVATE_KEY:}
security.jwt.rsa.public-key=${JWT_RSA_PUBLIC_KEY:}
security.jwt.expiration=900000
security.jwt.refresh-expiration=86400000

# Multi-Factor Authentication
security.mfa.enabled=true
security.mfa.issuer=DocAvocat-Secure
security.mfa.backup-codes.count=10
security.mfa.required-roles=ADMIN,DPO,AUDITOR

# Rate Limiting et Protection DDoS
security.rate-limiting.enabled=true
security.rate-limiting.requests-per-minute=60
security.rate-limiting.burst-capacity=100
security.rate-limiting.login-attempts-max=5
security.rate-limiting.lockout-duration=300

# =================================================================
# CHIFFREMENT ET CRYPTOGRAPHIE
# =================================================================

# Algorithmes cryptographiques renforcés
security.crypto.algorithm=AES-256-GCM
security.crypto.key-length=256
security.crypto.rsa-key-length=4096
security.crypto.signature-algorithm=SHA256withRSAandMGF1

# Gestion des clés sécurisée
security.crypto.keys-path=${CRYPTO_KEYS_PATH:./config/keys}
security.crypto.rotation-days=90
security.crypto.hsm.enabled=false
security.crypto.hsm.provider=${HSM_PROVIDER:}

# Hash des mots de passe renforcé
security.password.encoder=bcrypt
security.password.bcrypt.rounds=12
security.password.min-length=12
security.password.require-mixed-case=true
security.password.require-numbers=true
security.password.require-symbols=true

# =================================================================
# MONITORING ET ALERTES SÉCURITÉ
# =================================================================

# Monitoring temps réel
security.monitoring.enabled=true
security.monitoring.real-time-alerts=true
security.monitoring.log-all-access=true

# Configuration alertes
security.alerts.email=${SECURITY_ALERT_EMAIL:admin@gedavocat.com}
security.alerts.webhook=${SECURITY_WEBHOOK:}
security.alerts.retention-days=90

# Seuils de détection
security.thresholds.failed-logins=5
security.thresholds.suspicious-requests=20
security.thresholds.data-access-anomaly=10

# =================================================================
# HEADERS DE SÉCURITÉ HTTP
# =================================================================

# HSTS (HTTP Strict Transport Security)
security.headers.hsts.enabled=true
security.headers.hsts.max-age=63072000
security.headers.hsts.include-subdomains=true
security.headers.hsts.preload=true

# Content Security Policy restrictive
security.headers.csp.enabled=true
security.headers.csp.policy=default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.stripe.com https://cdn.jsdelivr.net; frame-src 'self' https://js.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self'
security.headers.csp.report-uri=/api/security/csp-report

# Autres headers sécurisés
security.headers.x-frame-options=DENY
security.headers.x-content-type-options=nosniff
security.headers.x-xss-protection=1; mode=block
security.headers.referrer-policy=strict-origin-when-cross-origin

# =================================================================
# SESSIONS ET COOKIES SÉCURISÉS
# =================================================================

# Configuration cookies sécurisés
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=PT30M

# Protection CSRF renforcée
security.csrf.enabled=true
security.csrf.cookie-name=XSRF-TOKEN
security.csrf.header-name=X-XSRF-TOKEN

# =================================================================
# CONFIGURATION SSL/TLS
# =================================================================

# TLS 1.3 obligatoire
server.ssl.enabled=true
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1.3
server.ssl.ciphers=TLS_AES_256_GCM_SHA384,TLS_CHACHA20_POLY1305_SHA256,TLS_AES_128_GCM_SHA256

# Certificats
server.ssl.key-store=${SSL_KEYSTORE:classpath:keystore.p12}
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:}
server.ssl.key-alias=gedavocat
server.ssl.key-store-type=PKCS12

# =================================================================
# JOURNALISATION SÉCURISÉE
# =================================================================

# Niveaux de log sécurisés (pas de DEBUG en prod)
logging.level.com.gedavocat.security=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.apache.http=WARN

# Format logs sécurisés (masquage données sensibles)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{userId:-SYSTEM}] [%X{ipAddress:-unknown}] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{userId:-SYSTEM}] [%X{ipAddress:-unknown}] %logger{36} - %msg%n

# Rotation et rétention logs
logging.file.name=logs/gedavocat-secure.log
logging.logback.rollingpolicy.file-name-pattern=logs/gedavocat-secure-%d{yyyy-MM-dd}.%i.log.gz
logging.logback.rollingpolicy.max-file-size=100MB
logging.logback.rollingpolicy.max-history=90

# =================================================================
# ACTUATOR SÉCURISÉ
# =================================================================

# Endpoints Actuator restrictions
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.info.enabled=true
management.endpoint.metrics.enabled=true

# Sécurisation Actuator
management.endpoints.web.base-path=/actuator
management.security.enabled=true

# =================================================================
# CORS RESTRICTIF
# =================================================================

# Configuration CORS stricte (pas de wildcard)
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://app.gedavocat.com,https://admin.gedavocat.com}
security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
security.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,X-XSRF-TOKEN
security.cors.allow-credentials=true
security.cors.max-age=3600

# =================================================================
# CONFIGURATION PRODUCTION
# =================================================================

# Profil sécurisé
spring.profiles.active=secure,production

# Désactivation fonctionnalités debug
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
logging.level.web=WARN
debug=false
trace=false

# Configuration JPA sécurisée
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Optimisations production
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =================================================================
# INTÉGRITÉ ET AUDIT
# =================================================================

# Audit complet des opérations
security.audit.enabled=true
security.audit.log-all-requests=true
security.audit.include-request-body=false
security.audit.include-response-body=false
security.audit.retention-days=2555

# Vérification intégrité
security.integrity.file-checksum=true
security.integrity.database-checksum=true
security.integrity.code-signing=false

# Backup et archivage sécurisés
security.backup.encryption=true
security.backup.retention-years=7
security.backup.integrity-check=true