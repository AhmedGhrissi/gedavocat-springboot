# ===================================================================
# GED Avocat - Configuration principale
# ===================================================================

# ===================================================================
# Logging
# ===================================================================
debug=false
logging.level.root=WARN
logging.level.com.gedavocat=INFO
logging.level.org.hibernate.resource.transaction=INFO
logging.level.org.springframework.data.jpa.repository.query=INFO
# Niveau prod : pas de debug web
logging.level.org.springframework.web=WARN
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN

# ===================================================================
# Serveur
# ===================================================================
server.port=8081
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# ===================================================================
# MySQL
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/gedavocat?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / Hibernate
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ===================================================================
# Thymeleaf
# ===================================================================
spring.thymeleaf.cache=true
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ===================================================================
# Jackson - sérialisation dates ISO-8601 (pour les APIs REST)
# ===================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ===================================================================
# Upload fichiers
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=./uploads/documents
app.signature.dir=./uploads/signatures

# ===================================================================
# JWT
# ===================================================================
jwt.secret=${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_RANDOM_64_BYTES}
jwt.expiration=86400000

# ===================================================================
# Actuator - restreindre les endpoints exposés
# ===================================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true

# ===================================================================
# Session
# ===================================================================
server.servlet.session.timeout=8h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=GEDAVOCAT_SESSION
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=Lax

# ===================================================================
# Email
# ===================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@gedavocat.com
spring.mail.password=dummy_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@gedavocat.com
app.base-url=http://localhost:8081

# ===================================================================
# API externes (valeurs par defaut pour eviter les erreurs)
# ===================================================================
# Yousign
yousign.api.key=${YOUSIGN_API_KEY:dummy_key}
yousign.api.url=https://api-sandbox.yousign.app
yousign.api.version=v3

# RPVA
rpva.api.url=https://api.e-barreau.fr
rpva.api.key=dummy_key
rpva.certificate.path=dummy_path
rpva.certificate.password=dummy_password

# Stripe
# IMPORTANT : Vous devez avoir 3 cles differentes
# 1. Secret key (sk_test_...) - Pour les appels API depuis le serveur
# 2. Publishable key (pk_test_...) - Pour le frontend/checkout
# 3. Webhook secret (whsec_...) - Pour verifier les webhooks
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_dummy}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_dummy}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_dummy}

# PayPlug
payplug.secret.key=sk_test_YOUR_KEY
payplug.api.url=https://api.payplug.com/v1



# ===================================================================
# URLs de retour
# ===================================================================
payment.success.url=http://localhost:8081/payment/success
payment.cancel.url=http://localhost:8081/payment/cancel
payment.webhook.url=http://localhost:8081/payment/webhook

# ===================================================================
# Tarification
# ===================================================================
app.subscription.solo.price=29.99
app.subscription.cabinet.price=99.99
app.subscription.enterprise.price=299.99