# ===================================================================
# GED Avocat - Configuration principale
# ===================================================================

# ===================================================================
# Logging
# ===================================================================
debug=false
logging.level.root=INFO
logging.level.com.gedavocat=DEBUG
logging.level.org.hibernate.resource.transaction=INFO
logging.level.org.springframework.data.jpa.repository.query=INFO
logging.level.org.springframework.web=DEBUG

# ===================================================================
# Serveur
# ===================================================================
server.port=8081

# ===================================================================
# MySQL
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/gedavocat?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / Hibernate
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===================================================================
# Thymeleaf
# ===================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ===================================================================
# Jackson - sérialisation dates ISO-8601 (pour les APIs REST)
# ===================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ===================================================================
# Upload fichiers
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=./uploads/documents
app.signature.dir=./uploads/signatures

# ===================================================================
# JWT
# ===================================================================
jwt.secret=5YGTYn++gP1BYYEu9echrStL3+udzI9yNLQFf58oIQqAkDIfVWHMtcC2zxTpJ1bVmUQ9BzDiBNKETQORcKTHGA==
jwt.expiration=86400000

# ===================================================================
# Session
# ===================================================================
server.servlet.session.timeout=8h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=GEDAVOCAT_SESSION

# ===================================================================
# Email
# ===================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@gedavocat.com
spring.mail.password=dummy_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@gedavocat.com
app.base-url=http://localhost:8080

