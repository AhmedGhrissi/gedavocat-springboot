# ===================================================================
# GED Avocat - Configuration principale
# ===================================================================

# ===================================================================
# Logging
# ===================================================================
debug=false
logging.level.root=WARN
logging.level.com.gedavocat=INFO
logging.level.org.hibernate.resource.transaction=INFO
logging.level.org.springframework.data.jpa.repository.query=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN

# ===================================================================
# Serveur
# ===================================================================
server.port=8092

server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# ===================================================================
# MySQL
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/gedavocat?useSSL=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / Hibernate
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ===================================================================
# Thymeleaf
# ===================================================================
spring.thymeleaf.cache=true
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ===================================================================
# Jackson - serialisation dates ISO-8601
# ===================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ===================================================================
# Upload fichiers
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=./uploads/documents
app.signature.dir=./uploads/signatures

# ===================================================================
# JWT - Secret securise en Base64
# ===================================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ===================================================================
# Actuator
# ===================================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true

# ===================================================================
# Session
# ===================================================================
server.servlet.session.timeout=1h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=GEDAVOCAT_SESSION
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=Lax

# ===================================================================
# Email
# ===================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@gedavocat.com
spring.mail.password=dummy_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@gedavocat.com
app.base-url=http://localhost:8081

# ===================================================================
# API externes - valeurs par defaut
# ===================================================================
yousign.api.key=${YOUSIGN_API_KEY:}
yousign.api.url=https://api-sandbox.yousign.app
yousign.api.version=v3

rpva.api.url=https://api.e-barreau.fr
rpva.api.key=dummy_key
rpva.certificate.path=dummy_path
rpva.certificate.password=dummy_password

stripe.api.key=${STRIPE_SECRET_KEY:sk_test_dummy}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_dummy}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_dummy}

# ===================================================================
# Console H2 (desactivee par defaut)
# ===================================================================
spring.h2.console.enabled=false
