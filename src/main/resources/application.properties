# ===================================================================
# GED Avocat - Configuration principale (cleaned)
# ===================================================================

# Logging
debug=false
logging.level.root=WARN
logging.level.com.gedavocat=INFO
logging.level.org.hibernate.resource.transaction=INFO
logging.level.org.springframework.data.jpa.repository.query=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN

# Server
server.port=8092
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# Datasource (MySQL) — credentials via env vars in production
# SEC-HARDENED : useSSL=true + requireSSL=true + verifyServerCertificate (chiffrement transit DB)
spring.datasource.url=jdbc:mysql://localhost:3306/gedavocat?useSSL=true&requireSSL=true&verifyServerCertificate=false&serverTimezone=Europe/Paris&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:gedavocat}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate — SEC-HARDENED : validate au lieu de update (schéma géré par migrations)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true
spring.mvc.static-path-pattern=/**

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
app.upload.dir=./uploads/documents
app.signature.dir=./uploads/signatures

# JWT — SEC-HARDENED : 15 minutes (900000ms) au lieu de 24h (OWASP recommandation)
jwt.secret=${JWT_SECRET:}
jwt.expiration=900000
# Refresh token : 4 heures (renouvelable)
jwt.refresh.expiration=14400000

# SEC-HARDENED : Clé AES-256 pour chiffrement des secrets MFA en BDD
# Générer : openssl rand -base64 32
# OBLIGATOIRE en production. Sans clé, les secrets MFA sont stockés en clair.
security.mfa.encryption-key=${MFA_ENCRYPTION_KEY:}

# Actuator - completely disabled for main profile
management.endpoints.enabled-by-default=false
management.endpoints.web.exposure.include=
management.endpoint.health.enabled=false
management.endpoint.info.enabled=false
management.endpoint.metrics.enabled=false
management.endpoint.prometheus.enabled=false
management.metrics.export.prometheus.enabled=false
management.server.port=-1

# Session — SEC-HARDENED : 30 minutes max (ANSSI recommandation applications sensibles)
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=GEDAVOCAT_SESSION
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=Strict

# Email — credentials via env vars
spring.mail.host=${MAIL_HOST:smtp.ethereal.email}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:false}
app.mail.from=${MAIL_FROM:noreply@docavocat.fr}
app.base-url=${APP_BASE_URL:http://localhost:8081}

# External APIs
yousign.api.key=${YOUSIGN_API_KEY:}
yousign.api.url=https://api-sandbox.yousign.app
yousign.api.version=v3

rpva.api.url=${RPVA_API_URL:https://api.e-barreau.fr}
rpva.api.key=${RPVA_API_KEY:}
rpva.certificate.path=${RPVA_CERT_PATH:}
rpva.certificate.password=${RPVA_CERT_PASSWORD:}

stripe.api.key=${STRIPE_SECRET_KEY:sk_test_dummy}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_dummy}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_dummy}

# H2 Console
spring.h2.console.enabled=false

# =============================================================================
# CONFORMITÉ RÉGLEMENTAIRE - Configuration DPO et RGPD
# =============================================================================
# DPO (Data Protection Officer) - Conformité RGPD Art. 37-39
app.rgpd.dpo.name=${DPO_NAME:À configurer}
app.rgpd.dpo.email=${DPO_EMAIL:dpo@example.com}
app.rgpd.dpo.phone=${DPO_PHONE:}
app.rgpd.dpo.address=${DPO_ADDRESS:}
app.rgpd.dpo.certification=${DPO_CERTIFICATION:}

# Durées de rétention des données (RGPD Art. 5)
app.rgpd.retention.client-data=7
app.rgpd.retention.case-data=30
app.rgpd.retention.financial-data=10
app.rgpd.retention.audit-logs=5
app.rgpd.retention.communication-data=3

# Consentement et droits des personnes
app.rgpd.consent.required=true
app.rgpd.rights.portability.enabled=true
app.rgpd.rights.deletion.enabled=true
app.rgpd.rights.rectification.enabled=true

# =============================================================================
# LAB-FT (Lutte Anti-Blanchiment et Financement du Terrorisme)
# =============================================================================
# Configuration ACPR - Conformité Code Monétaire et Financier
app.labft.enabled=true
app.labft.seuil.vigilance=8000
app.labft.seuil.declaration=10000
app.labft.scoring.enabled=true
app.labft.pep.check=true
app.labft.sanctions.check=true
app.labft.tracfin.endpoint=https://api.tracfin.finances.gouv.fr
app.labft.reporting.auto=true

# =============================================================================
# PRA (Plan de Reprise d'Activité) - ISO 27001  
# =============================================================================
app.pra.enabled=true
app.pra.rto.max=4
app.pra.rpo.max=1
app.pra.backup.frequency=4
app.pra.test.frequency=quarterly
app.pra.contact.responsable=${PRA_CONTACT:admin@example.com}
app.pra.site.secours=${PRA_BACKUP_SITE:}

# =============================================================================
# eIDAS - Archivage Électronique Qualifié
# =============================================================================
# Horodatage électronique qualifié (Règlement UE 910/2014)
app.eidas.tsa.enabled=true
app.eidas.tsa.url=https://tsa.certinomis.fr
app.eidas.tsa.policy=1.2.250.1.111.20.2
app.eidas.archive.format=ASIC-E
app.eidas.signature.level=XAdES-LTA
app.eidas.retention.legal=30