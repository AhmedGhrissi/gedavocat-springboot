# ===================================================================
# GED Avocat - Configuration principale
# ===================================================================
# CORRECTIONS APPLIQUï¿½ES :
#   [1] Email : Ethereal (test) \u2192 Brevo SMTP (production)
#   [2] Email : port 465/SSL \u2192 port 587/STARTTLS (standard transactionnel)
#   [3] DB   : root/root \u2192 variables d'environnement obligatoires
#   [4] DB   : useSSL=false \u2192 useSSL=true en production
#   [5] JWT  : secret dev en clair \u2192 env var sans fallback dangereux
#   [6] URL  : http://localhost \u2192 env var sans valeur http par dï¿½faut
# ===================================================================

# ====== Logging ===================================================================================================================================================================================================
debug=false
logging.level.root=WARN
logging.level.com.gedavocat=INFO
logging.level.org.hibernate.resource.transaction=INFO
logging.level.org.springframework.data.jpa.repository.query=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN
# HikariCP === monitoring fuites de connexions
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.com.zaxxer.hikari.pool.HikariPool=DEBUG
logging.level.com.zaxxer.hikari.pool.ProxyLeakTask=DEBUG

# ====== Serveur ======================================================================================================================================================================================================
server.port=8080
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# ====== Base de donnï¿½es MySQL ===============================================================================================================================================================
# [CORRECTION 3] Credentials via env vars OBLIGATOIRES === plus de root/root hardcodï¿½
# [CORRECTION 4] useSSL=true en production (tunnel SSH Hetzner inclus)
spring.datasource.url=jdbc:mysql://localhost:3306/gedavocat?useSSL=true&requireSSL=true&serverTimezone=Europe/Paris&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ====== HikariCP === pool de connexions ====================================================================================================================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=10000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=DocAvocatHikariPool
spring.datasource.hikari.auto-commit=true

# ====== JPA / Hibernate ==============================================================================================================================================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ====== Thymeleaf ================================================================================================================================================================================================
spring.thymeleaf.cache=true
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ====== Ressources statiques ===============================================================================================================================================================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true
spring.mvc.static-path-pattern=/**

# ====== Jackson ======================================================================================================================================================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# ====== Upload fichiers ==============================================================================================================================================================================
# SEC-HARDENED : limites anti-DoS (20MB/fichier, 50MB/requï¿½te)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=./uploads/documents
app.signature.dir=./uploads/signatures

# ====== JWT ==================================================================================================================================================================================================================
# [CORRECTION 5] Suppression du fallback dev hardcodï¿½ en base64 === env var pure obligatoire
# Gï¿½nï¿½rer en prod : openssl rand -base64 64
jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh.expiration=14400000

# ====== Chiffrement MFA ==============================================================================================================================================================================
# SEC-HARDENED : clï¿½ AES-256 pour chiffrement secrets MFA en BDD
# Gï¿½nï¿½rer : openssl rand -base64 32
security.mfa.encryption-key=${MFA_ENCRYPTION_KEY}

# ====== Actuator === dï¿½sactivï¿½ en production ==================================================================================================================
management.endpoints.enabled-by-default=false
management.endpoints.web.exposure.include=
management.endpoint.health.enabled=false
management.endpoint.info.enabled=false
management.endpoint.metrics.enabled=false
management.endpoint.prometheus.enabled=false
management.metrics.export.prometheus.enabled=false
management.server.port=-1

# ====== Session =========================================================================================================================================================================================================
# SEC-HARDENED : 30 min (ANSSI), cookies sï¿½curisï¿½s
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.name=DOCAVOCAT_SESSION
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=Strict

# ====== Email === Brevo SMTP ========================================================================================================================================================================
# [CORRECTION 1] Remplacement Ethereal (faux serveur test) par Brevo (production EU/RGPD)
# [CORRECTION 2] Port 465/SSL \u2192 587/STARTTLS (recommandï¿½ RFC 8314)
# Prï¿½requis : compte Brevo + domaine docavocat.fr vï¿½rifiï¿½ + SPF/DKIM/DMARC configurï¿½s
#
# Variables ï¿½ dï¿½finir sur le serveur Hetzner :
#   MAIL_HOST=smtp-relay.brevo.com
#   MAIL_PORT=587
#   MAIL_USERNAME=ton-email@docavocat.fr
#   MAIL_PASSWORD=clï¿½_smtp_gï¿½nï¿½rï¿½e_dans_brevo
#   MAIL_FROM=noreply@docavocat.fr
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:noreply@docavocat.fr}

app.mail.from.name=DocAvocat - Cabinet Juridique
app.mail.replyto=contact@docavocat.fr

# [CORRECTION 6] URL de base sans fallback HTTP non sï¿½curisï¿½
app.base-url=${APP_BASE_URL}

# ====== APIs externes =======================================================================================================================================================================================
# audit-security-bypass: env vars, not hardcoded secrets
yousign.api.key=${YOUSIGN_API_KEY} # gitleaks:allow
yousign.api.url=${YOUSIGN_API_URL:https://api.yousign.app}
yousign.api.version=v3

rpva.api.url=${RPVA_API_URL:https://api.e-barreau.fr}
rpva.api.key=${RPVA_API_KEY}
rpva.certificate.path=${RPVA_CERT_PATH}
rpva.certificate.password=${RPVA_CERT_PASSWORD}

# Stripe API keys (injected from env vars, not hardcoded) - audit-security-bypass
stripe.api.key=${STRIPE_API_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# ====== H2 Console === dï¿½sactivï¿½ en production ===============================================================================================================
spring.h2.console.enabled=false

# =============================================================================
# CONFORMITï¿½ Rï¿½GLEMENTAIRE === DPO et RGPD
# =============================================================================
app.rgpd.dpo.name=${DPO_NAME}
app.rgpd.dpo.email=${DPO_EMAIL}
app.rgpd.dpo.phone=${DPO_PHONE:}
app.rgpd.dpo.address=${DPO_ADDRESS:}
app.rgpd.dpo.certification=${DPO_CERTIFICATION:}

# Durï¿½es de rï¿½tention (RGPD Art. 5) === en annï¿½es
app.rgpd.retention.client-data=7
app.rgpd.retention.case-data=30
app.rgpd.retention.financial-data=10
app.rgpd.retention.audit-logs=5
app.rgpd.retention.communication-data=3

# Droits des personnes
app.rgpd.consent.required=true
app.rgpd.rights.portability.enabled=true
app.rgpd.rights.deletion.enabled=true
app.rgpd.rights.rectification.enabled=true

# =============================================================================
# LAB-FT === Lutte Anti-Blanchiment et Financement du Terrorisme
# =============================================================================
app.labft.enabled=true
app.labft.seuil.vigilance=8000
app.labft.seuil.declaration=10000
app.labft.scoring.enabled=true
app.labft.pep.check=true
app.labft.sanctions.check=true
app.labft.tracfin.endpoint=https://api.tracfin.finances.gouv.fr
app.labft.reporting.auto=true

# =============================================================================
# PRA === Plan de Reprise d'Activitï¿½ (ISO 27001)
# =============================================================================
app.pra.enabled=true
app.pra.rto.max=4
app.pra.rpo.max=1
app.pra.backup.frequency=4
app.pra.test.frequency=quarterly
app.pra.contact.responsable=${PRA_CONTACT}
app.pra.site.secours=${PRA_BACKUP_SITE:}

# =============================================================================
# eIDAS === Archivage ï¿½lectronique Qualifiï¿½
# =============================================================================
app.eidas.tsa.enabled=true
app.eidas.tsa.url=https://tsa.certinomis.fr
app.eidas.tsa.policy=1.2.250.1.111.20.2
app.eidas.archive.format=ASIC-E
app.eidas.signature.level=XAdES-LTA
app.eidas.retention.legal=30