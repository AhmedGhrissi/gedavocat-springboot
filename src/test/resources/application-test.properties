# Clean test configuration - UTF-8 encoded, no hidden characters
# H2 Database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# Server configuration
server.port=8092

# JWT settings - test only
jwt.secret=${JWT_SECRET:dGVzdF9vbmx5X3NlY3JldF9rZXlfbm90X2Zvcl9wcm9kdWN0aW9u}
jwt.expiration=86400000

# JWT RS256 keys - auto-generated in test temp dir
jwt.keys.private-key-path=target/test-keys/private_key.pem
jwt.keys.public-key-path=target/test-keys/public_key.pem

# Template engine
spring.thymeleaf.cache=false

# External API test keys
yousign.api.key=test
stripe.api.key=sk_test_dummy
stripe.publishable.key=pk_test_dummy
stripe.webhook.secret=whsec_test_dummy
rpva.api.key=test

# Mail configuration for tests
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@example.com
spring.mail.password=testpassword
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=test@example.com
app.base-url=http://localhost:8092

# Upload directories for tests
app.upload.dir=./test-uploads/documents
app.signature.dir=./test-uploads/signatures

# Actuator - completely disabled for tests
management.endpoints.enabled-by-default=false
management.endpoints.web.exposure.include=
management.endpoint.health.enabled=false
management.endpoint.info.enabled=false
management.endpoint.metrics.enabled=false
management.endpoint.prometheus.enabled=false
management.metrics.export.prometheus.enabled=false
management.server.port=-1
management.health.defaults.enabled=false
