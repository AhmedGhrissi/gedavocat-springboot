# Clean test configuration - UTF-8 encoded, no hidden characters
# H2 Database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# Server configuration
server.port=8092

# JWT settings - test only
jwt.secret=${JWT_SECRET:dGVzdF9vbmx5X3NlY3JldF9rZXlfbm90X2Zvcl9wcm9kdWN0aW9u}
jwt.expiration=86400000

# JWT RS256 keys - auto-generated in test temp dir
jwt.keys.private-key-path=target/test-keys/private_key.pem
jwt.keys.public-key-path=target/test-keys/public_key.pem

# Disable SQL init scripts (schema.sql uses MySQL syntax, H2 uses ddl-auto=create-drop)
spring.sql.init.mode=never

# Template engine
spring.thymeleaf.cache=false

# External API test keys
yousign.api.key=test
yousign.api.url=https://api-test.yousign.com
stripe.api.key=sk_test_dummy
stripe.publishable.key=pk_test_dummy
stripe.webhook.secret=whsec_test_dummy
rpva.api.key=test
rpva.api.url=https://api-test.rpva.fr
rpva.certificate.path=target/test-certs/rpva-test.p12
rpva.certificate.password=test-password

# Mail configuration for tests
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@example.com
spring.mail.password=testpassword
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=test@example.com
app.base-url=http://localhost:8092

# Upload directories for tests
app.upload.dir=./test-uploads/documents
app.signature.dir=./test-uploads/signatures

# Minio / S3 storage - disabled for tests
minio.endpoint=http://localhost:9000
minio.access-key=testkey
minio.secret-key=testsecret
minio.bucket=test-bucket

# Actuator - completely disabled for tests
management.endpoints.enabled-by-default=false
management.endpoints.web.exposure.include=
management.endpoint.health.enabled=false
management.endpoint.info.enabled=false
management.endpoint.metrics.enabled=false
management.endpoint.prometheus.enabled=false
management.metrics.export.prometheus.enabled=false
management.server.port=-1
management.health.defaults.enabled=false

# MFA Encryption - 32 bytes key (256 bits)
security.mfa.encryption-key=8DzmvSzLoXcqc8rUXOHQtsd8c4va5xAnsrN6e00fKeY=

# RGPD / DPO Configuration for tests
app.rgpd.dpo.name=Test DPO
app.rgpd.dpo.email=dpo@test.com
app.rgpd.dpo.phone=+33123456789
app.rgpd.dpo.address=123 Test Street
app.rgpd.dpo.certification=Test Cert
app.rgpd.retention.client-data=7
app.rgpd.retention.case-data=30
app.rgpd.retention.financial-data=10
app.rgpd.retention.audit-logs=5
app.rgpd.retention.communication-data=3
app.rgpd.consent.required=true
app.rgpd.rights.portability.enabled=true
app.rgpd.rights.deletion.enabled=true
app.rgpd.rights.rectification.enabled=true

# LAB-FT Configuration for tests
app.labft.enabled=true
app.labft.seuil.vigilance=8000
app.labft.seuil.declaration=10000
app.labft.scoring.enabled=true
app.labft.pep.check=true
app.labft.sanctions.check=true
app.labft.tracfin.endpoint=https://api.tracfin.test
app.labft.reporting.auto=true

# PRA Configuration for tests
app.pra.enabled=true
app.pra.rto.max=4
app.pra.rpo.max=1
app.pra.backup.frequency=4
app.pra.test.frequency=quarterly
app.pra.contact.responsable=admin@test.com
app.pra.site.secours=https://backup.test.com

# eIDAS Configuration for tests
app.eidas.tsa.enabled=true
app.eidas.tsa.url=https://tsa.test.com
app.eidas.tsa.policy=1.2.250.1.111.20.2
app.eidas.archive.format=ASIC-E
app.eidas.signature.level=XAdES-LTA
app.eidas.retention.legal=30
