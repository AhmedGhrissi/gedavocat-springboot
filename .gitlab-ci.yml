# ============================================================
# DocAvocat — Pipeline CI/CD GitLab
#
# COMPORTEMENT PAR BRANCHE :
#
#   Branche feature (ex: JC, dev, fix/...)  push :
#     -> security + build + test automatiques
#     -> JAMAIS de package ou deploy
#
#   Branche main  push automatique :
#     -> AUCUN pipeline (protege la prod des pushs accidentels)
#
#   Branche main  Run pipeline MANUEL (GitLab UI) :
#     -> security -> build -> test -> package -> deploy (manuel)
#     -> Notifications Discord a chaque etape
#
# WORKFLOW RECOMMANDE :
#   1. Developper sur une branche feature
#   2. Push -> CI valide automatiquement (security + build + test)
#   3. Merge Request -> review -> merge dans main
#   4. GitLab -> CI/CD -> Pipelines -> "Run pipeline" sur main
#   5. Suivre les etapes, cliquer Play sur deploy pour mettre en prod
#
# VARIABLES GITLAB (Settings > CI/CD > Variables) :
#   SSH_PRIVATE_KEY  File     Protected    Cle privee SSH du serveur
#   SSH_KNOWN_HOSTS  Variable Protected    Fingerprints serveur (ssh-keyscan)
#   ENV_PROD         File     Protected    Contenu du fichier .env prod
#   DISCORD_WEBHOOK  Variable Masked       URL du webhook Discord
#   NVD_API_KEY      Variable Protected    Cle API NVD (nvd.nist.gov — gratuit)
#
# VARIABLES OPTIONNELLES (Run pipeline > Variables) :
#   SKIP_SECURITY    true     Pour tester rapidement sans scans (dev only)
#   FAST_DEPLOY      true     Correctif rapide : skip scans securite + deploy auto (~15 min)
#                             Workflow : GitLab -> Run pipeline sur main -> Variable FAST_DEPLOY=true
# ============================================================

# Controle du declenchement des pipelines
workflow:
  rules:
    # main en push automatique -> bloque (protege la prod)
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      when: never
    # main declenche manuellement (Run pipeline dans l'UI) -> OK
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "web"
      when: always
    # Merge Requests -> security + build + test automatiques
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    # Branches feature -> security + build + test automatiques
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "main"
      when: always

default:
  tags:
    - vps

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress"
  REMOTE_DIR: "/opt/docavocat"

stages:
  - security      # ← NOUVEAU — tolérance zéro, bloque tout si échec
  - build
  - test
  - package
  - deploy

# ──────────────────────────────────────────────────────────────────
# ANCRES DISCORD (inchangées)
# ──────────────────────────────────────────────────────────────────

.discord_commit_notify: &discord_commit_notify
  - |
    WEBHOOK="${DISCORD_WEBHOOK:-${DISCORD_COMMIT_WEBHOOK:-}}"
    if [ -z "$WEBHOOK" ]; then
      echo "Discord webhook non configure, notification ignoree"
    else
      apt-get update -qq && apt-get install -yqq curl > /dev/null 2>&1 || apk add --no-cache curl --quiet 2>/dev/null || true
      BRANCH="${CI_COMMIT_BRANCH:-MR}"
      AUTHOR="${GITLAB_USER_NAME:-CI}"
      SHA="${CI_COMMIT_SHORT_SHA:-????}"
      TITLE="${CI_COMMIT_TITLE:-}"
      COMMIT_MSG=$(printf '%s' "$TITLE" | head -c 80 | sed 's/\\/\\\\/g; s/"/\\"/g; s/	/ /g')
      PAYLOAD=$(printf '{"embeds":[{"title":"%s %s","description":"**Branche :** `%s`\\n**Commit :** [`%s`](%s)\\n**Par :** %s\\n**Message :** %s\\n\\n[Logs job ->](%s/-/jobs/%s)","color":%s,"footer":{"text":"DocAvocat CI/CD"},"timestamp":"%s"}]}' \
        "$EMOJI" "$STATUS" \
        "$BRANCH" "$SHA" "$CI_PIPELINE_URL" "$AUTHOR" "$COMMIT_MSG" \
        "$CI_PROJECT_URL" "$CI_JOB_ID" \
        "$COLOR" \
        "$(date -u '+%Y-%m-%dT%H:%M:%SZ')")
      RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK" \
           -H "Content-Type: application/json" \
           -d "$PAYLOAD" 2>/dev/null || echo "000")
      echo "Discord commit notify: HTTP $RESPONSE"
    fi
    true

.discord_deploy_notify: &discord_deploy_notify
  - |
    if [ -z "${DISCORD_WEBHOOK:-}" ]; then
      echo "Discord webhook non configure, notification ignoree"
    else
      BRANCH="${CI_COMMIT_BRANCH:-MR}"
      AUTHOR="${GITLAB_USER_NAME:-CI}"
      SHA="${CI_COMMIT_SHORT_SHA:-????}"
      TITLE="${CI_COMMIT_TITLE:-}"
      COMMIT_MSG=$(printf '%s' "$TITLE" | head -c 80 | sed 's/\\/\\\\/g; s/"/\\"/g; s/	/ /g')
      PAYLOAD=$(printf '{"embeds":[{"title":"%s %s","description":"**Branche :** `%s`\\n**Commit :** [`%s`](%s)\\n**Par :** %s\\n**Message :** %s\\n\\n[Logs job ->](%s/-/jobs/%s)","color":%s,"footer":{"text":"DocAvocat CI/CD"},"timestamp":"%s"}]}' \
        "$EMOJI" "$STATUS" \
        "$BRANCH" "$SHA" "$CI_PIPELINE_URL" "$AUTHOR" "$COMMIT_MSG" \
        "$CI_PROJECT_URL" "$CI_JOB_ID" \
        "$COLOR" \
        "$(date -u '+%Y-%m-%dT%H:%M:%SZ')")
      RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${DISCORD_WEBHOOK}" \
           -H "Content-Type: application/json" \
           -d "$PAYLOAD" 2>/dev/null || echo "000")
      echo "Discord deploy notify: HTTP $RESPONSE"
    fi
    true

# ──────────────────────────────────────────────────────────────────
# STAGE 0 : SECURITY (NOUVEAU — bloquant, toutes branches)
# ──────────────────────────────────────────────────────────────────

audit-code-security:
  stage: security
  image: maven:3.9-eclipse-temurin-17
  variables:
    # Skip OWASP dans audit-security.sh (job dédié owasp-dependency-check le fait déjà)
    SKIP_OWASP_AUDIT: "true"
  rules:
    - if: '$SKIP_SECURITY == "true" || $FAST_DEPLOY == "true"'
      when: never
    - when: always
  before_script:
    - apt-get update -qq && apt-get install -yqq curl nodejs npm git > /dev/null 2>&1 || true
    - chmod +x ./audit-security.sh
    # Notification Discord : audit démarre
    - |
      WEBHOOK="${DISCORD_WEBHOOK:-}"
      [ -z "$WEBHOOK" ] && true || {
        PAYLOAD=$(printf '{"embeds":[{"title":"[SHIELD] Audit securite demarre","description":"**Branche :** `%s`\\n**Commit :** [`%s`](%s)\\n**Par :** %s\\n\\n*Analyse OWASP, secrets, injections, RGPD...*","color":16776960,"footer":{"text":"DocAvocat CI/CD"},"timestamp":"%s"}]}' \
          "${CI_COMMIT_BRANCH:-MR}" "${CI_COMMIT_SHORT_SHA:-????}" \
          "$CI_PIPELINE_URL" "${GITLAB_USER_NAME:-CI}" \
          "$(date -u '+%Y-%m-%dT%H:%M:%SZ')")
        curl -s -o /dev/null -X POST "$WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD" || true
      }
  script:
    - echo "========================================="
    - echo "AUDIT SECURITE — TOLERANCE ZERO"
    - echo "========================================="
    - ./audit-security.sh
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        EMOJI="[SHIELD]"; STATUS="Audit securite OK — aucune faille critique"; COLOR=3066993
      else
        EMOJI="[ALERT]"; STATUS="AUDIT ECHOUE — faille securite detectee ! Deploy BLOQUE"; COLOR=15158332
      fi
    - *discord_commit_notify
  artifacts:
    name: "audit-security-$CI_COMMIT_SHORT_SHA"
    when: always
    paths:
      - security-reports/
    expire_in: 90 days
  allow_failure: false   # BLOQUANT — ne jamais changer
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository/
    policy: pull

owasp-dependency-check:
  stage: security
  image: maven:3.9-eclipse-temurin-17
  timeout: 30m  # Timeout 30 minutes (sans clé NVD, prend ~20-30min)
  rules:
    - if: '$SKIP_SECURITY == "true" || $FAST_DEPLOY == "true"'
      when: never
    - when: always
  before_script:
    - apt-get update -qq && apt-get install -yqq curl > /dev/null 2>&1 || true
  script:
    - echo "========================================="
    - echo "OWASP DEPENDENCY CHECK — CVE >= 7.0"
    - echo "========================================="
    - mkdir -p security-reports
    - |
      MVN_ARGS="$MAVEN_CLI_OPTS org.owasp:dependency-check-maven:check \
        -DfailBuildOnCVSS=7 \
        -Dformat=HTML \
        -DoutputDirectory=security-reports/"
      # Ajouter la clé NVD si disponible (évite le rate-limiting)
      if [ -n "${NVD_API_KEY:-}" ]; then
        MVN_ARGS="$MVN_ARGS -DnvdApiKey=$NVD_API_KEY"
        echo "NVD_API_KEY configurée — scan rapide (~2-3 min)"
      else
        echo "NVD_API_KEY non définie — scan lent (~20-30 min sans clé)"
        echo "Obtenir une clé gratuite : https://nvd.nist.gov/developers/request-an-api-key"
      fi
      mvn $MVN_ARGS
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        EMOJI="[SHIELD]"; STATUS="OWASP OK — aucune CVE critique dans les dependances"; COLOR=3066993
      else
        EMOJI="[ALERT]"; STATUS="OWASP FAIL — CVE critique detectee dans les dependances !"; COLOR=15158332
      fi
    - *discord_commit_notify
  artifacts:
    name: "owasp-$CI_COMMIT_SHORT_SHA"
    when: always
    paths:
      - security-reports/dependency-check-report.html
    expire_in: 90 days
  allow_failure: true   # Non bloquant temporairement (problèmes techniques NVD)
  cache:
    key: "owasp-nvd-data"  # Cache global pour la base NVD (partagé entre branches)
    paths:
      - .m2/repository/
      - .m2/repository/org/owasp/dependency-check-data/
    policy: pull-push  # Télécharge ET sauvegarde le cache (base NVD ~500MB)

snyk-security-scan:
  stage: security
  image: maven:3.9-eclipse-temurin-17
  rules:
    - if: '$SKIP_SECURITY == "true" || $FAST_DEPLOY == "true"'
      when: never
    - when: always
  before_script:
    - apt-get update -qq && apt-get install -yqq curl > /dev/null 2>&1 || true
    # Install Snyk CLI (compatible ARM64)
    - curl -Lo /usr/local/bin/snyk https://static.snyk.io/cli/latest/snyk-linux || curl -Lo /usr/local/bin/snyk https://static.snyk.io/cli/latest/snyk-linux-arm64
    - chmod +x /usr/local/bin/snyk
  script:
    - echo "========================================="
    - echo "SNYK SECURITY SCAN — CVE + Code Analysis"
    - echo "========================================="
    - mkdir -p security-reports
    - |
      if [ -z "${SNYK_TOKEN:-}" ]; then
        echo "SNYK_TOKEN non défini — scan ignoré"
        echo "Pour activer : GitLab > Settings > CI/CD > Variables > SNYK_TOKEN"
        echo "Obtenir token : https://app.snyk.io/account"
        exit 0
      fi
    - snyk auth $SNYK_TOKEN
    - snyk test --all-projects --severity-threshold=high --json > security-reports/snyk-report.json || true
    - snyk test --all-projects --severity-threshold=high
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        EMOJI="🛡️"; STATUS="Snyk OK — aucune vulnérabilité high/critical"; COLOR=3066993
      else
        EMOJI="⚠️"; STATUS="Snyk détecté des vulnérabilités"; COLOR=16776960
      fi
    - *discord_commit_notify
  artifacts:
    name: "snyk-scan-$CI_COMMIT_SHORT_SHA"
    when: always
    paths:
      - security-reports/snyk-report.json
    expire_in: 90 days
  allow_failure: true   # Non bloquant (optionnel)

trivy-security-scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]  # Override pour permettre exécution shell normale (after_script Discord)
  rules:
    - if: '$SKIP_SECURITY == "true" || $FAST_DEPLOY == "true"'
      when: never
    - when: always
  before_script:
    - apk add --no-cache curl > /dev/null 2>&1 || true
  script:
    - echo "========================================="
    - echo "TRIVY SECURITY SCAN — Filesystem + Deps"
    - echo "========================================="
    - trivy --version
    - mkdir -p security-reports
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL --format json --output security-reports/trivy-report.json .
    - trivy fs --exit-code 1 --severity CRITICAL --format table .
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        EMOJI="🛡️"; STATUS="Trivy OK — aucune vulnérabilité critique"; COLOR=3066993
      else
        EMOJI="🔴"; STATUS="Trivy détecté des vulnérabilités CRITICAL"; COLOR=15158332
      fi
    - *discord_commit_notify
  artifacts:
    name: "trivy-scan-$CI_COMMIT_SHORT_SHA"
    when: always
    reports:
      container_scanning: security-reports/trivy-report.json
    paths:
      - security-reports/trivy-report.json
    expire_in: 90 days
  allow_failure: true   # Non bloquant (complémentaire)

# ── Semgrep SAST (remplace CodeQL de GitHub Actions) ──────────
semgrep-sast:
  stage: security
  image: semgrep/semgrep:latest
  rules:
    - if: '$SKIP_SECURITY == "true"'
      when: never
    - when: always
  script:
    - echo "========================================="
    - echo "SEMGREP SAST — Analyse statique du code"
    - echo "========================================="
    - mkdir -p security-reports
    - semgrep scan --config auto --config p/java --config p/owasp-top-ten --config p/secrets --json --output security-reports/semgrep-report.json . || true
    - semgrep scan --config auto --config p/java --config p/owasp-top-ten --config p/secrets --error --severity ERROR .
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        EMOJI="[SAST]"; STATUS="Semgrep SAST OK — aucune faille critique"; COLOR=3066993
      else
        EMOJI="[ALERT]"; STATUS="Semgrep SAST — faille critique détectée !"; COLOR=15158332
      fi
    - *discord_commit_notify
  artifacts:
    name: "semgrep-$CI_COMMIT_SHORT_SHA"
    when: always
    paths:
      - security-reports/semgrep-report.json
    expire_in: 90 days
  allow_failure: true

# ──────────────────────────────────────────────────────────────────
# STAGE 1 : BUILD (inchangé + needs security)
# ──────────────────────────────────────────────────────────────────

# ── SBOM — CycloneDX (Software Bill of Materials) ─────────────
# Requis : EU Cyber Resilience Act (CRA), NIST SSDF, EO 14028
sbom-generate:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "web"
  script:
    - echo "========================================="
    - echo "SBOM — CycloneDX (Supply Chain Security)"
    - echo "========================================="
    - mkdir -p security-reports
    - mvn $MAVEN_CLI_OPTS org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom -DoutputFormat=json -DoutputName=sbom
    - cp target/sbom.json security-reports/sbom-cyclonedx.json
    - echo "SBOM generated — $(jq '.components | length' security-reports/sbom-cyclonedx.json 2>/dev/null || echo '?') components"
  artifacts:
    name: "sbom-$CI_COMMIT_SHORT_SHA"
    paths:
      - security-reports/sbom-cyclonedx.json
    expire_in: 1 year
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository/
    policy: pull

build:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  needs: 
    - job: audit-code-security
      optional: true   # N'attend pas si SKIP_SECURITY=true
    - job: owasp-dependency-check
      optional: true   # N'attend pas si SKIP_SECURITY=true
    - job: snyk-security-scan
      optional: true   # N'attend pas si SNYK_TOKEN non défini
    - job: trivy-security-scan
      optional: true   # N'attend pas si SKIP_SECURITY=true
  before_script:
    - apt-get update -qq && apt-get install -yqq curl > /dev/null 2>&1 || true
    - |
      WEBHOOK="${DISCORD_WEBHOOK:-${DISCORD_COMMIT_WEBHOOK:-}}"
      [ -z "$WEBHOOK" ] && true || {
        BRANCH="${CI_COMMIT_BRANCH:-MR}"
        AUTHOR="${GITLAB_USER_NAME:-CI}"
        SHA="${CI_COMMIT_SHORT_SHA:-????}"
        TITLE="${CI_COMMIT_TITLE:-}"
        COMMIT_MSG=$(printf '%s' "$TITLE" | head -c 80 | sed 's/\\/\\\\/g; s/"/\\"/g; s/	/ /g')
        if [ "$BRANCH" = "main" ]; then
          SCOPE="branche main - pipeline complet (security -> build -> test -> package -> deploy)"
        else
          SCOPE="branche feature - security + build + test uniquement"
        fi
        PAYLOAD=$(printf '{"embeds":[{"title":"[START] Pipeline demarre","description":"**Branche :** `%s`\\n**Commit :** [`%s`](%s)\\n**Par :** %s\\n**Message :** %s\\n**Scope :** %s","color":16776960,"footer":{"text":"DocAvocat CI/CD"},"timestamp":"%s"}]}' \
          "$BRANCH" "$SHA" "$CI_PIPELINE_URL" "$AUTHOR" "$COMMIT_MSG" "$SCOPE" "$(date -u '+%Y-%m-%dT%H:%M:%SZ')")
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK" \
             -H "Content-Type: application/json" \
             -d "$PAYLOAD")
        echo "Discord pipeline-start: HTTP $RESPONSE"
      }
  script:
    - echo "========================================="
    - echo "COMPILATION MAVEN"
    - echo "========================================="
    - |
      if ! mvn $MAVEN_CLI_OPTS compile; then
        echo ""
        echo "ERREUR: La compilation Maven a echoue!"
        echo ""
        echo "--- Derniers messages d'erreur ---"
        tail -100 target/*.log 2>/dev/null || echo "Pas de fichier log trouve"
        exit 1
      fi
      echo ""
      echo "✓ Compilation reussie"
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        EMOJI="[OK]"; STATUS="Build compile avec succes"; COLOR=3066993
      else
        EMOJI="[FAIL]"; STATUS="ECHEC de compilation - voir logs"; COLOR=15158332
      fi
      JOB_NAME="Build Maven"
    - *discord_commit_notify
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository/

# ──────────────────────────────────────────────────────────────────
# STAGE 2 : TEST (inchangé)
# ──────────────────────────────────────────────────────────────────

test:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  needs: [build]
  rules:
    - if: '$FAST_DEPLOY == "true"'
      when: never
    - when: always
  before_script:
    - apt-get update -qq && apt-get install -yqq curl > /dev/null 2>&1 || true
  script:
    - echo "========================================="
    - echo "EXECUTION DES TESTS UNITAIRES"
    - echo "========================================="
    - |
      if ! mvn $MAVEN_CLI_OPTS test; then
        echo ""
        echo "ERREUR: Les tests unitaires ont echoue!"
        echo ""
        echo "--- Rapport des tests echoues ---"
        find target/surefire-reports -name "*.txt" -exec echo "=== {} ===" \; -exec cat {} \; 2>/dev/null || echo "Pas de rapport de test trouve"
        echo ""
        echo "--- Derniers logs Maven ---"
        tail -200 target/*.log 2>/dev/null || echo "Pas de fichier log trouve"
        exit 1
      fi
      echo ""
      echo "✓ Tous les tests sont passes"
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        EMOJI="[OK]"; STATUS="Tests unitaires passes"; COLOR=3066993
      else
        EMOJI="[FAIL]"; STATUS="TESTS ECHOUES - deploiement bloque !"; COLOR=15158332
      fi
      JOB_NAME="Tests unitaires"
    - *discord_commit_notify
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository/
    policy: pull
  artifacts:
    when: always
    reports:
      junit: target/surefire-reports/TEST-*.xml
    paths:
      - target/surefire-reports/
    expire_in: 2 weeks

# ──────────────────────────────────────────────────────────────────
# STAGE 3 : PACKAGE (inchangé)
# ──────────────────────────────────────────────────────────────────

package:
  stage: package
  image: docker:27-cli
  needs:
    - job: test
      optional: true
    - job: build
      optional: true
  variables:
    DOCKER_BUILDKIT: "1"
    DOCKER_CLI_EXPERIMENTAL: "enabled"
  before_script:
    - |
      MAX_RETRIES=3
      RETRY_COUNT=0
      until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
        echo "Tentative de connexion au registry ($((RETRY_COUNT+1))/$MAX_RETRIES)..."
        if docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY" 2>&1; then
          echo "Connexion reussie au registry"
          break
        else
          RETRY_COUNT=$((RETRY_COUNT+1))
          if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
            echo "Echec de connexion, nouvelle tentative dans 10s..."
            sleep 10
          else
            echo "ERREUR: Impossible de se connecter au registry apres $MAX_RETRIES tentatives"
            exit 1
          fi
        fi
      done
  script:
    - echo "========================================="
    - echo "ETAPE 1 - Build de l'image Docker"
    - echo "========================================="
    - |
      echo "Repository: $CI_REGISTRY_IMAGE"
      echo "SHA: $CI_COMMIT_SHORT_SHA"
      echo ""
      if ! docker build \
        --file docker/Dockerfile \
        --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" \
        --tag "$CI_REGISTRY_IMAGE:latest" \
        --progress=plain \
        .; then
        echo ""
        echo "ERREUR: Le build Docker a echoue!"
        exit 1
      fi
      echo ""
      echo "✓ Image buildee avec succes"
      docker images | grep -E "(REPOSITORY|$CI_REGISTRY_IMAGE)" || true
    - echo ""
    - echo "========================================="
    - echo "ETAPE 2 - Push des images vers le registry"
    - echo "========================================="
    - |
      MAX_RETRIES=3
      for TAG in "$CI_COMMIT_SHORT_SHA" "latest"; do
        echo ""
        echo "--- Push de l'image :$TAG ---"
        RETRY_COUNT=0
        until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
          echo "Tentative ($((RETRY_COUNT+1))/$MAX_RETRIES)..."
          if docker push "$CI_REGISTRY_IMAGE:$TAG" 2>&1; then
            echo "✓ Image :$TAG poussee avec succes"
            break
          else
            RETRY_COUNT=$((RETRY_COUNT+1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "! Echec du push, nouvelle tentative dans 15s..."
              sleep 15
            else
              echo "ERREUR: Impossible de pousser l'image :$TAG apres $MAX_RETRIES tentatives"
              exit 1
            fi
          fi
        done
      done
      echo ""
      echo "✓✓✓ Toutes les images poussees avec succes ✓✓✓"
  after_script:
    - apk add --no-cache curl --quiet 2>/dev/null || true
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        EMOJI="[DOCKER]"; STATUS="Image Docker prete${FAST_DEPLOY:+ - deploy auto en cours}${FAST_DEPLOY:-" - cliquer Play sur deploy"}"; COLOR=3447003
      else
        EMOJI="[FAIL]"; STATUS="ECHEC build image Docker"; COLOR=15158332
      fi
      JOB_NAME="Package Docker"
    - *discord_deploy_notify
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "web"

# ── Trivy : scan de l'image Docker buildée ────────────────────
trivy-image-scan:
  stage: package
  needs: [package]
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "web"
  script:
    - echo "========================================="
    - echo "TRIVY IMAGE SCAN — CVE dans l'image Docker"
    - echo "========================================="
    - mkdir -p security-reports
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format json --output security-reports/trivy-image-report.json "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        EMOJI="[DOCKER]"; STATUS="Trivy image OK — aucune CVE critique dans l'image"; COLOR=3066993
      else
        EMOJI="[ALERT]"; STATUS="Trivy image — CVE CRITICAL dans l'image Docker !"; COLOR=15158332
      fi
    - *discord_commit_notify
  artifacts:
    name: "trivy-image-$CI_COMMIT_SHORT_SHA"
    when: always
    paths:
      - security-reports/trivy-image-report.json
    expire_in: 90 days
  allow_failure: true

# ──────────────────────────────────────────────────────────────────
# STAGE 4 : DEPLOY (inchangé)
# ──────────────────────────────────────────────────────────────────

deploy:
  stage: deploy
  image: alpine:3.19
  needs: [package]
  allow_failure: false
  before_script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - tr -d '\r' < "$SSH_PRIVATE_KEY" > /tmp/id_rsa
    - echo "" >> /tmp/id_rsa
    - chmod 600 /tmp/id_rsa
    - ssh-keygen -l -f /tmp/id_rsa 2>&1 || (echo "CLE INVALIDE - voir debug:"; head -1 /tmp/id_rsa; tail -1 /tmp/id_rsa | cat -A; wc -l /tmp/id_rsa; exit 1)
    - ssh-add /tmp/id_rsa
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - |
      [ -z "${DISCORD_WEBHOOK:-}" ] && true || {
        PAYLOAD=$(printf '{"embeds":[{"title":"[DEPLOY] Deploiement en cours...","description":"**Branche :** `%s`\\n**Commit :** [`%s`](%s)\\n**Par :** %s\\n\\n*Envoi fichiers -> restart -> check HTTP...*\\n\\n[Logs deploy ->](%s/-/jobs/%s)","color":16776960,"footer":{"text":"DocAvocat CI/CD"},"timestamp":"%s"}]}' \
          "$CI_COMMIT_BRANCH" "$CI_COMMIT_SHORT_SHA" "$CI_PIPELINE_URL" \
          "$GITLAB_USER_NAME" "$CI_PROJECT_URL" "$CI_JOB_ID" \
          "$(date -u '+%Y-%m-%dT%H:%M:%SZ')")
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${DISCORD_WEBHOOK}" \
             -H "Content-Type: application/json" \
             -d "$PAYLOAD")
        echo "Discord deploy-start: HTTP $RESPONSE"
      }
  script:
    - |
      ssh root@$SERVER_HOST "
        echo '=== Création du répertoire si nécessaire ==='
        mkdir -p $REMOTE_DIR/docker
        echo '=== Espace disque avant nettoyage ==='
        df -h / | tail -1
        echo '--- Nettoyage Docker (volumes exclus pour proteger les donnees) ---'
        docker system prune -af --filter 'until=72h' 2>/dev/null || true
        truncate -s 0 /var/lib/docker/containers/*/*-json.log 2>/dev/null || true
        apt-get clean 2>/dev/null || true
        rm -rf /var/lib/apt/lists/* /tmp/* 2>/dev/null || true
        echo '=== Espace disque apres nettoyage ==='
        df -h / | tail -1
      "
    - scp docker/docker-compose.yml root@$SERVER_HOST:$REMOTE_DIR/docker-compose.yml
    - scp docker/nginx/docavocat.conf root@$SERVER_HOST:/etc/nginx/sites-available/docavocat.conf
    - ssh root@$SERVER_HOST "ln -sf /etc/nginx/sites-available/docavocat.conf /etc/nginx/sites-enabled/ 2>/dev/null || true"
    - |
      # Créer ou copier le fichier .env s'il n'existe pas
      if [ -n "${ENV_PROD:-}" ]; then
        echo "Copie de ENV_PROD vers le serveur..."
        cat "$ENV_PROD" | ssh root@$SERVER_HOST "cat > $REMOTE_DIR/.env"
      else
        echo "ENV_PROD non définie, création d'un fichier .env minimal..."
        ssh root@$SERVER_HOST "touch $REMOTE_DIR/.env"
      fi
    - |
      ssh root@$SERVER_HOST "
        cd $REMOTE_DIR
        # Ensure .env ends with a newline (GitLab File variables may strip trailing newline)
        sed -i -e '\$a\\' .env
        # Remove any existing APP_IMAGE line (including if concatenated with previous line)
        sed -i '/APP_IMAGE=/d' .env
        # Append APP_IMAGE on its own line
        echo 'APP_IMAGE=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA' >> .env
      "
    - |
      ssh root@$SERVER_HOST "
        cd $REMOTE_DIR
        for VAR in MAIL_HOST MAIL_PORT MAIL_USERNAME MAIL_PASSWORD; do
          sed -i \"/^\${VAR}=/d\" .env
        done
        echo 'MAIL_HOST=${MAIL_HOST:-smtp-relay.brevo.com}' >> .env
        echo 'MAIL_PORT=${MAIL_PORT:-587}' >> .env
        echo 'MAIL_USERNAME=${MAIL_USERNAME:-noreply@docavocat.fr}' >> .env
        echo 'MAIL_PASSWORD=${MAIL_PASSWORD}' >> .env
      "
    - |
      ssh root@$SERVER_HOST "
        cd $REMOTE_DIR
        sed -i '/^DPO_NAME=/d' .env
        sed -i '/^DPO_EMAIL=/d' .env
        sed -i '/^DPO_PHONE=/d' .env
        sed -i '/^DPO_ADDRESS=/d' .env
        sed -i '/^DPO_CERTIFICATION=/d' .env
        sed -i '/^PRA_CONTACT=/d' .env
        sed -i '/^PRA_BACKUP_SITE=/d' .env
        echo 'DPO_NAME=A Configurer' >> .env
        echo 'DPO_EMAIL=dpo@docavocat.fr' >> .env
        echo 'DPO_PHONE=' >> .env
        echo 'DPO_ADDRESS=' >> .env
        echo 'DPO_CERTIFICATION=' >> .env
        echo 'PRA_CONTACT=IT Manager - A Configurer' >> .env
        echo 'PRA_BACKUP_SITE=' >> .env
      "
    - ssh root@$SERVER_HOST "mkdir -p $REMOTE_DIR/loki $REMOTE_DIR/promtail $REMOTE_DIR/prometheus $REMOTE_DIR/alertmanager $REMOTE_DIR/grafana/provisioning/datasources $REMOTE_DIR/grafana/provisioning/dashboards"
    - scp docker/loki/local-config.yaml root@$SERVER_HOST:$REMOTE_DIR/loki/local-config.yaml
    - scp docker/promtail/config.yaml root@$SERVER_HOST:$REMOTE_DIR/promtail/config.yaml
    - scp docker/prometheus/prometheus.yml root@$SERVER_HOST:$REMOTE_DIR/prometheus/prometheus.yml
    - scp docker/prometheus/alerts.yml root@$SERVER_HOST:$REMOTE_DIR/prometheus/alerts.yml
    - scp docker/alertmanager/alertmanager.yml root@$SERVER_HOST:$REMOTE_DIR/alertmanager/alertmanager.yml
    - scp docker/grafana/provisioning/datasources/loki.yaml root@$SERVER_HOST:$REMOTE_DIR/grafana/provisioning/datasources/loki.yaml
    - scp docker/grafana/provisioning/datasources/prometheus.yml root@$SERVER_HOST:$REMOTE_DIR/grafana/provisioning/datasources/prometheus.yml
    - scp docker/grafana/provisioning/dashboards/dashboards.yaml root@$SERVER_HOST:$REMOTE_DIR/grafana/provisioning/dashboards/dashboards.yaml
    - scp docker/grafana/provisioning/dashboards/docavocat.json root@$SERVER_HOST:$REMOTE_DIR/grafana/provisioning/dashboards/docavocat.json
    - scp docker/grafana/provisioning/dashboards/docavocat-metrics.json root@$SERVER_HOST:$REMOTE_DIR/grafana/provisioning/dashboards/docavocat-metrics.json
    - ssh root@$SERVER_HOST "mkdir -p $REMOTE_DIR/scripts"
    - scp docker/scripts/backup.sh root@$SERVER_HOST:$REMOTE_DIR/scripts/backup.sh
    - ssh root@$SERVER_HOST "sed -i 's/\r//' $REMOTE_DIR/scripts/backup.sh && chmod +x $REMOTE_DIR/scripts/backup.sh"
    - |
      ssh root@$SERVER_HOST "
        set -e
        cd $REMOTE_DIR

        MAX_RETRIES=3
        RETRY_COUNT=0
        until [ \$RETRY_COUNT -ge \$MAX_RETRIES ]; do
          echo \"Tentative de connexion au registry (\$((RETRY_COUNT+1))/\$MAX_RETRIES)...\"
          if docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY 2>&1; then
            echo \"Connexion reussie au registry\"
            break
          else
            RETRY_COUNT=\$((RETRY_COUNT+1))
            if [ \$RETRY_COUNT -lt \$MAX_RETRIES ]; then
              echo \"Echec de connexion, nouvelle tentative dans 10s...\"
              sleep 10
            else
              echo \"ERREUR: Impossible de se connecter au registry apres \$MAX_RETRIES tentatives\"
              exit 1
            fi
          fi
        done

        echo '=== Pull de la nouvelle image ==='
        docker compose pull app || { echo 'ERREUR pull image'; exit 1; }

        echo '=== Nettoyage anciens reseaux prefixes ==='
        docker network rm docavocat_docavocat-net 2>/dev/null || true
        docker network rm gedavocat_docavocat-net 2>/dev/null || true

        echo '=== Etat avant recreation ==='
        docker ps --format 'table {{.Names}}\t{{.Status}}' 2>/dev/null || true
        docker network ls --filter name=docavocat 2>/dev/null || true

        echo '=== S assurer que MySQL tourne ==='
        MYSQL_HEALTH=\$(docker inspect docavocat-mysql --format='{{.State.Health.Status}}' 2>/dev/null || echo 'absent')
        echo \"MySQL actuel: \$MYSQL_HEALTH\"
        if [ \"\$MYSQL_HEALTH\" = \"healthy\" ]; then
          echo 'MySQL deja running et healthy — skip re-creation'
          docker network connect docavocat-net docavocat-mysql 2>/dev/null || true
        else
          echo 'MySQL pas healthy, tentative de demarrage via compose...'
          docker compose up -d mysql 2>/dev/null || {
            echo 'Conflit conteneur — adoption du conteneur existant...'
            docker stop docavocat-mysql 2>/dev/null || true
            docker rm docavocat-mysql 2>/dev/null || true
            docker compose up -d mysql || { echo 'ERREUR demarrage MySQL'; exit 1; }
          }
          echo 'Attente healthcheck MySQL (max 120s)...'
          MYSQL_WAIT=0
          while [ \$MYSQL_WAIT -lt 120 ]; do
            MYSQL_STATUS=\$(docker inspect docavocat-mysql --format='{{.State.Health.Status}}' 2>/dev/null || echo 'not found')
            if [ \"\$MYSQL_STATUS\" = \"healthy\" ]; then
              echo \"MySQL healthy apres \${MYSQL_WAIT}s\"
              break
            fi
            echo \"  MySQL status: \$MYSQL_STATUS \${MYSQL_WAIT}s/120s\"
            sleep 5
            MYSQL_WAIT=\$((MYSQL_WAIT + 5))
          done
        fi

        echo '=== Migration schema BDD (import dump si tables manquantes) ==='
        docker exec docavocat-mysql sh -c 'mysql -u root -p\"\$MYSQL_ROOT_PASSWORD\" gedavocat -N -e \"SELECT 1 FROM appointments LIMIT 1\"' 2>/dev/null && echo 'Tables OK — skip import' || {
          echo 'Table appointments manquante — import du dump...'
          docker exec docavocat-mysql sh -c 'mysql -u root -p\"\$MYSQL_ROOT_PASSWORD\" gedavocat < /docker-entrypoint-initdb.d/01-gedavocat-dump.sql' 2>&1 && echo 'Import dump OK' || echo 'Import echoue — ddl-auto=update prendra le relais'
        }

        echo '=== Verification cle MFA_ENCRYPTION_KEY (AES-256 = 32 octets base64) ==='
        MFA_KEY=\$(grep '^MFA_ENCRYPTION_KEY=' .env 2>/dev/null | cut -d= -f2-)
        MFA_LEN=\$(echo -n \"\$MFA_KEY\" | base64 -d 2>/dev/null | wc -c)
        echo \"MFA key longueur decodee: \${MFA_LEN} octets\"
        if [ \"\$MFA_LEN\" != '32' ]; then
          echo 'Cle MFA invalide — generation nouvelle cle AES-256...'
          NEW_MFA_KEY=\$(openssl rand -base64 32)
          sed -i \"s|^MFA_ENCRYPTION_KEY=.*|MFA_ENCRYPTION_KEY=\$NEW_MFA_KEY|\" .env
          echo 'Nouvelle cle MFA ecrite dans .env'
        else
          echo 'Cle MFA OK (32 octets)'
        fi

        echo '=== Recreation du conteneur app (force-recreate) ==='
        docker compose up -d --force-recreate --no-deps app || { echo 'ERREUR demarrage app'; docker compose logs app --tail=50; exit 1; }

        echo '=== Demarrage services monitoring ==='
        docker compose up -d loki promtail grafana prometheus cadvisor node-exporter mysql-exporter alertmanager discord-webhook 2>/dev/null || true

        echo '=== Verification connectivite reseau ==='
        sleep 5
        echo '--- Reseaux Docker ---'
        docker network ls --filter name=docavocat
        echo '--- Conteneurs sur docavocat-net ---'
        docker network inspect docavocat-net --format='{{range .Containers}}{{.Name}} {{end}}' 2>/dev/null || echo 'Reseau docavocat-net non trouve!'
        echo '--- DNS mysql depuis app ---'
        docker exec docavocat-app getent hosts mysql && echo 'DNS mysql OK' || echo 'ERREUR: DNS mysql non resolu!'
        echo '--- IP MySQL ---'
        docker inspect docavocat-mysql --format='{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' 2>/dev/null || echo 'MySQL IP non trouvee'

        docker logout $CI_REGISTRY 2>/dev/null || true

        echo '=== Conteneurs actifs ==='
        docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

        echo '=== Premiers logs du conteneur (10s) ==='
        sleep 10
        docker logs docavocat-app --tail=50 2>&1 || echo 'Impossible de lire les logs'
      "
    - |
      echo "========================================="
      echo "ETAPE 1: Verification etat du conteneur"
      echo "========================================="
      ssh root@$SERVER_HOST "
        docker ps --filter name=docavocat-app --format 'table {{.Names}}\t{{.Status}}\t{{.State}}'
        CONTAINER_STATUS=\$(docker inspect docavocat-app --format='{{.State.Status}}' 2>/dev/null || echo 'not found')
        echo \"Status: \$CONTAINER_STATUS\"
        if [ \"\$CONTAINER_STATUS\" != 'running' ]; then
          echo '!!! ERREUR: Le conteneur n est pas en cours d execution !!!'
          docker logs docavocat-app 2>&1 || true
          exit 1
        fi
      "
    - |
      echo "========================================="
      echo "ETAPE 2: Attente demarrage Spring Boot"
      echo "========================================="
      echo "Patience, Spring Boot demarre (environ 60s)..."
      for i in 1 2 3 4 5 6; do
        sleep 10
        echo "[$((i*10))s] Verification en cours..."
        ssh root@$SERVER_HOST "
          if ! docker ps --filter name=docavocat-app --filter status=running -q | grep -q .; then
            echo '!!! ERREUR: Le conteneur s est arrete pendant le demarrage !!!'
            docker logs docavocat-app --tail=100 2>&1
            exit 1
          fi
        " || exit 1
        STARTED=$(ssh root@$SERVER_HOST "docker logs docavocat-app 2>&1 | grep -i 'Started GedAvocatApplication' | wc -l" 2>/dev/null || echo "0")
        if [ "$STARTED" -gt "0" ]; then
          echo "✓ Spring Boot a demarre avec succes!"
          break
        fi
      done
    - |
      echo "========================================="
      echo "ETAPE 3: Verification HTTP"
      echo "========================================="
      MAX_HTTP_RETRIES=5
      HTTP_SUCCESS=false
      for attempt in $(seq 1 $MAX_HTTP_RETRIES); do
        echo "Tentative HTTP $attempt/$MAX_HTTP_RETRIES..."
        HTTP_CODE=$(ssh root@$SERVER_HOST "curl -s -o /dev/null -w '%{http_code}' --max-time 10 http://127.0.0.1:8080/" 2>/dev/null || echo "000")
        echo "  Code HTTP recu: $HTTP_CODE"
        if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
          echo "✓ Application repond correctement (HTTP $HTTP_CODE)"
          HTTP_SUCCESS=true
          break
        else
          [ $attempt -lt $MAX_HTTP_RETRIES ] && sleep 10
        fi
      done
      if [ "$HTTP_SUCCESS" = "false" ]; then
        echo "!!! ERREUR: L'application ne repond pas correctement !!!"
        ssh root@$SERVER_HOST "docker logs docavocat-app --tail=300 2>&1"
        exit 1
      fi
    - |
      echo "========================================="
      echo "ETAPE 4: Fix nginx — www redirect + suppression headers en double"
      echo "========================================="
      ssh root@$SERVER_HOST "
        echo '=== 4a. Redirect www -> non-www (obligatoire pour sessions/cookies) ==='
        WWW_REDIRECT='/etc/nginx/conf.d/www-redirect-docavocat.conf'
        if [ ! -f \"\$WWW_REDIRECT\" ]; then
          echo 'Creation redirect www.docavocat.fr -> docavocat.fr'
          printf '%s\n' \
            'server {' \
            '    listen 80;' \
            '    listen [::]:80;' \
            '    server_name www.docavocat.fr;' \
            '    return 301 https://docavocat.fr\\\$request_uri;' \
            '}' \
            'server {' \
            '    listen 443 ssl;' \
            '    listen [::]:443 ssl;' \
            '    server_name www.docavocat.fr;' \
            '    ssl_certificate /etc/letsencrypt/live/docavocat.fr/fullchain.pem;' \
            '    ssl_certificate_key /etc/letsencrypt/live/docavocat.fr/privkey.pem;' \
            '    return 301 https://docavocat.fr\\\$request_uri;' \
            '}' > \"\$WWW_REDIRECT\"
          echo '  -> Fichier cree: '\"\$WWW_REDIRECT\"
        else
          echo '  -> Redirect www deja en place, OK'
        fi

        echo '=== 4b. SUPPRESSION BRUTALE de tous les headers security dans TOUTE la config nginx ==='
        echo '--- Spring Boot gere TOUS les security headers — nginx ne doit en ajouter AUCUN ---'
        echo '--- Scan de /etc/nginx/ en entier (sites-available, sites-enabled, conf.d, snippets) ---'
        FOUND_CSP=0
        for CONF in \$(grep -rl 'add_header' /etc/nginx/ 2>/dev/null || true); do
          echo \"Scanning \$CONF ...\"
          for HDR in Content-Security-Policy X-Frame-Options X-Content-Type-Options Referrer-Policy Strict-Transport-Security Permissions-Policy X-XSS-Protection; do
            if grep -q \"\$HDR\" \"\$CONF\"; then
              echo \"  -> Commenting out \$HDR in \$CONF\"
              sed -i \"/\$HDR/s/^\\(\\s*\\)\\(add_header\\)/\\1# DISABLED_BY_CI \\2/\" \"\$CONF\"
              FOUND_CSP=1
            fi
          done
        done
        if [ \"\$FOUND_CSP\" = '1' ]; then
          echo '  -> Headers nginx commentes. Seul Spring Boot servira les security headers.'
        else
          echo '  -> Aucun header security trouve dans nginx, OK'
        fi

        echo '=== 4c. Test et reload nginx ==='
        nginx -t && nginx -s reload && echo 'nginx reloaded OK' || echo 'WARN: nginx reload failed, check config manually'
      "
    - |
      echo "========================================="
      echo "ETAPE 5: Verification finale + preuve CSP OK"
      echo "========================================="
      ssh root@$SERVER_HOST "
        docker stats docavocat-app --no-stream --format 'table {{.Container}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}' || true
        docker logs docavocat-app --tail=20 2>&1
        echo ''
        echo '=== VERIFICATION CSP HEADERS (preuve form-action absent) ==='
        echo '--- curl -sI https://docavocat.fr/login ---'
        CSP_HEADERS=\$(curl -sI https://docavocat.fr/login | grep -i content-security-policy || true)
        echo \"\$CSP_HEADERS\"
        if echo \"\$CSP_HEADERS\" | grep -qi 'form-action'; then
          echo ''
          echo '!!! ALERTE: form-action ENCORE PRESENT dans les headers !!!'
          echo '!!! Il y a probablement un fichier nginx non couvert !!!'
          echo '--- Recherche dans toute la config nginx: ---'
          grep -rn 'form-action' /etc/nginx/ 2>/dev/null || echo 'Pas trouve dans /etc/nginx/'
          grep -rn 'Content-Security-Policy' /etc/nginx/ 2>/dev/null || echo 'Pas de CSP dans /etc/nginx/'
        else
          echo ''
          echo 'OK: form-action absent des headers -> login fonctionnel'
        fi
        NB_CSP=\$(echo \"\$CSP_HEADERS\" | grep -ci content-security-policy || true)
        if [ \"\$NB_CSP\" -gt 1 ]; then
          echo '!!! ALERTE: PLUSIEURS headers CSP detectes (nginx + Spring Boot) !!!'
        elif [ \"\$NB_CSP\" -eq 1 ]; then
          echo 'OK: Un seul header CSP (Spring Boot only)'
        else
          echo 'WARN: Aucun header CSP detecte (app pas encore up?)'
        fi
      "
      echo ""
      echo "✓✓✓ Deploiement reussi -> https://docavocat.fr ✓✓✓"
    # ── Smoke tests post-deploy ──
    - |
      echo "========================================="
      echo "ETAPE 6: Smoke tests automatiques"
      echo "========================================="
      SMOKE_PASS=true
      # Test 1: Page de login accessible
      HTTP_LOGIN=$(ssh root@$SERVER_HOST "curl -s -o /dev/null -w '%{http_code}' --max-time 10 https://docavocat.fr/login" 2>/dev/null || echo "000")
      echo "  [1] GET /login = HTTP $HTTP_LOGIN"
      [ "$HTTP_LOGIN" = "200" ] || SMOKE_PASS=false
      # Test 2: Redirect HTTP → HTTPS
      HTTP_REDIRECT=$(ssh root@$SERVER_HOST "curl -s -o /dev/null -w '%{http_code}' --max-time 10 http://docavocat.fr/" 2>/dev/null || echo "000")
      echo "  [2] HTTP redirect = HTTP $HTTP_REDIRECT"
      [ "$HTTP_REDIRECT" = "301" ] || [ "$HTTP_REDIRECT" = "302" ] || SMOKE_PASS=false
      # Test 3: MySQL query count
      USER_COUNT=$(ssh root@$SERVER_HOST "docker exec docavocat-mysql mysql -u gedavocat -p\"\$(grep MYSQL_PASSWORD /opt/docavocat/.env | head -1 | cut -d= -f2-)\" gedavocat -N -e 'SELECT COUNT(*) FROM users' 2>/dev/null" || echo "ERR")
      echo "  [3] Users in DB = $USER_COUNT"
      [ "$USER_COUNT" != "ERR" ] && [ "$USER_COUNT" -gt 0 ] 2>/dev/null || SMOKE_PASS=false
      # Test 4: HSTS header present
      HSTS=$(ssh root@$SERVER_HOST "curl -sI --max-time 10 https://docavocat.fr/login | grep -i strict-transport-security | wc -l" 2>/dev/null || echo "0")
      echo "  [4] HSTS header = $HSTS"
      [ "$HSTS" -ge 1 ] 2>/dev/null || echo "  WARN: HSTS manquant"
      echo ""
      if [ "$SMOKE_PASS" = "true" ]; then
        echo "✓ Tous les smoke tests passes"
      else
        echo "⚠ Certains smoke tests ont echoue — verifier manuellement"
      fi
  after_script:
    - apk add --no-cache curl 2>/dev/null || true
    - |
      set +e
      if [ "$CI_JOB_STATUS" != "success" ]; then
        echo "Le deploiement a echoue. Consultez les logs ci-dessus."
      fi
      true
    - |
      set +e
      if [ "$CI_JOB_STATUS" = "success" ]; then
        EMOJI="[PROD]"; STATUS="DEPLOYE EN PRODUCTION ! https://docavocat.fr"; COLOR=3066993
      else
        EMOJI="[FAIL]"; STATUS="ECHEC DU DEPLOIEMENT - voir logs detailles"; COLOR=15158332
      fi
      JOB_NAME="Deploiement Production"
      true
    - *discord_deploy_notify
  environment:
    name: production
    url: https://docavocat.fr
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "web" && $FAST_DEPLOY == "true"
      when: on_success
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "web"
      when: manual

# ──────────────────────────────────────────────────────────────────
# DAST — OWASP ZAP Baseline Scan (post-deploy)
# ──────────────────────────────────────────────────────────────────
dast-zap-baseline:
  stage: deploy
  image:
    name: ghcr.io/zaproxy/zaproxy:stable
    entrypoint: [""]
  needs: ["deploy-production"]
  variables:
    GIT_STRATEGY: none
  script:
    - echo "=== OWASP ZAP Baseline Scan ==="
    - echo "Cible — https://docavocat.fr"
    - |
      mkdir -p /zap/wrk
      zap-baseline.py \
        -t https://docavocat.fr \
        -r zap-report.html \
        -J zap-report.json \
        -c zap-baseline.conf \
        -I \
        || true
    - echo "=== Scan termine ==="
    - |
      if [ -f /zap/wrk/zap-report.json ]; then
        ALERTS=$(python3 -c "import json; d=json.load(open('/zap/wrk/zap-report.json')); print(sum(1 for s in d.get('site',[]) for a in s.get('alerts',[]) if a.get('riskcode','0') in ('3',)))" 2>/dev/null || echo "?")
        echo "Alertes HIGH: $ALERTS"
        if [ "$ALERTS" != "?" ] && [ "$ALERTS" -gt 0 ] 2>/dev/null; then
          echo "⚠ $ALERTS alerte(s) HIGH detectee(s) — consulter le rapport"
        else
          echo "✓ Aucune alerte HIGH"
        fi
      fi
    - cp /zap/wrk/zap-report.* . 2>/dev/null || true
  artifacts:
    paths:
      - zap-report.html
      - zap-report.json
    expire_in: 30 days
    when: always
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "web"
