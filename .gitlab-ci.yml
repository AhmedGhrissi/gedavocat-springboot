# ============================================================
# GitLab CI/CD — gedavocat-springboot
# Stages: security -> build -> test -> e2e -> package -> deploy
# Runner: hetzner-cax11-runner (ARM64, tag: vps)
# ============================================================

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

stages:
  - security
  - build
  - test
  - e2e
  - package
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Djava.awt.headless=true"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end"
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  DOCKER_IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"
  REMOTE_DIR: "/opt/docavocat"
  MINIO_ACCESS_KEY: ""  # Override in GitLab CI/CD Variables (Settings → CI/CD → Variables)
  MINIO_SECRET_KEY: ""  # Override in GitLab CI/CD Variables (Settings → CI/CD → Variables)

# ── Ancres Discord ────────────────────────────────────────────
.discord_notify: &discord_notify |
  if [ -n "${DISCORD_WEBHOOK:-}" ]; then
    if [ "${CI_JOB_STATUS}" = "success" ]; then COLOR=3066993; else COLOR=15158332; fi
    curl -sf -X POST "${DISCORD_WEBHOOK}" \
      -H "Content-Type: application/json" \
      -d "{\"embeds\":[{\"title\":\"CI: ${CI_JOB_NAME} (${CI_JOB_STATUS}) — ${CI_COMMIT_BRANCH}\",\"color\":${COLOR},\"fields\":[{\"name\":\"Commit\",\"value\":\"${CI_COMMIT_SHORT_SHA}\",\"inline\":true},{\"name\":\"Pipeline\",\"value\":\"#${CI_PIPELINE_ID}\",\"inline\":true}]}]}" \
      || true
  fi

.discord_deploy_notify: &discord_deploy_notify |
  if [ -n "${DISCORD_WEBHOOK:-}" ]; then
    if [ "${CI_JOB_STATUS}" = "success" ]; then COLOR=3066993; MSG="Deploiement reussi"; else COLOR=15158332; MSG="Deploiement echoue"; fi
    curl -sf -X POST "${DISCORD_WEBHOOK}" \
      -H "Content-Type: application/json" \
      -d "{\"embeds\":[{\"title\":\"${MSG} — ${CI_COMMIT_BRANCH}\",\"color\":${COLOR},\"fields\":[{\"name\":\"Commit\",\"value\":\"${CI_COMMIT_SHORT_SHA}\",\"inline\":true},{\"name\":\"URL\",\"value\":\"https://docavocat.fr\",\"inline\":true}]}]}" \
      || true
  fi

# ============================================================
# STAGE: security
# ============================================================

audit-code-security:
  stage: security
  rules:
    - if: '$FAST_DEPLOY == "true"'
      when: never
    - when: on_success
  image: maven:3.9-eclipse-temurin-17
  script:
    - chmod +x ./audit-security.sh
    - ./audit-security.sh
  allow_failure: true
  artifacts:
    when: always
    paths:
      - audit-report*.txt
    expire_in: 7 days

owasp-dependency-check:
  stage: security
  rules:
    - if: '$FAST_DEPLOY == "true"'
      when: never
    - when: on_success
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]
  script:
    - mkdir -p security-reports
    - /usr/share/dependency-check/bin/dependency-check.sh
      --project "gedavocat"
      --scan .
      --format "JSON"
      --out security-reports/
      || true
  allow_failure: false
  artifacts:
    when: always
    paths:
      - security-reports/
    expire_in: 7 days

snyk-security-scan:
  stage: security
  rules:
    - if: '$FAST_DEPLOY == "true"'
      when: never
    - when: on_success
  image: maven:3.9-eclipse-temurin-17
  script:
    - |
      if [ -z "${SNYK_TOKEN:-}" ]; then
        echo "SNYK_TOKEN absent — scan ignore"
        exit 0
      fi
      npm install -g snyk
      snyk auth "$SNYK_TOKEN"
      snyk test --all-projects --severity-threshold=high || true
  allow_failure: true

trivy-security-scan:
  stage: security
  rules:
    - if: '$FAST_DEPLOY == "true"'
      when: never
    - when: on_success
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL --format table .
  allow_failure: true

semgrep-sast:
  stage: security
  rules:
    - if: '$FAST_DEPLOY == "true"'
      when: never
    - when: on_success
  image: semgrep/semgrep:latest
  script:
    - semgrep --config=auto --output semgrep-report.json --json . || true
  allow_failure: true
  artifacts:
    when: always
    paths:
      - semgrep-report.json
    expire_in: 7 days

gitleaks-secrets:
  stage: security
  rules:
    - if: '$FAST_DEPLOY == "true"'
      when: never
    - when: on_success
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --exit-code 0 --report-format json --report-path gitleaks-report.json || true
  allow_failure: true
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
    expire_in: 7 days

rgpd-check:
  stage: security
  rules:
    - if: '$FAST_DEPLOY == "true"'
      when: never
    - when: on_success
  image: alpine:3.19
  script:
    - apk add --no-cache grep
    - |
      echo "=== Verification RGPD ==="
      FOUND=$(grep -rIin --include="*.java" --include="*.properties" \
        -E "password=|passwd=|secret=|private_key=" src/ 2>/dev/null | grep -v "placeholder\|example" || true)
      if [ -n "$FOUND" ]; then
        echo "Donnees sensibles potentielles:"
        echo "$FOUND"
      else
        echo "Aucune donnee sensible brute detectee"
      fi
  allow_failure: true

# ============================================================
# STAGE: build
# ============================================================

sbom-generate:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  rules:
    - if: '$FAST_DEPLOY == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web"'
  cache:
    key: "$CI_COMMIT_REF_SLUG-maven"
    paths:
      - .m2/repository/
  script:
    - mvn $MAVEN_CLI_OPTS org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom
  artifacts:
    when: always
    paths:
      - target/bom.json
      - target/bom.xml
    expire_in: 30 days

build:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  needs:
    - job: audit-code-security
      optional: true
    - job: owasp-dependency-check
      optional: true
    - job: snyk-security-scan
      optional: true
    - job: trivy-security-scan
      optional: true
    - job: semgrep-sast
      optional: true
    - job: gitleaks-secrets
      optional: true
    - job: rgpd-check
      optional: true
  cache:
    key: "$CI_COMMIT_REF_SLUG-maven"
    paths:
      - .m2/repository/
  script:
    - mvn $MAVEN_CLI_OPTS compile
  after_script:
    - *discord_notify
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

# ============================================================
# STAGE: test
# ============================================================

test:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  needs: [build]
  rules:
    - if: '$FAST_DEPLOY == "true"'
      when: never
    - when: on_success
  cache:
    key: "$CI_COMMIT_REF_SLUG-maven"
    paths:
      - .m2/repository/
  variables:
    SPRING_PROFILES_ACTIVE: h2
  script:
    - mvn $MAVEN_CLI_OPTS test
  after_script:
    - *discord_notify
  artifacts:
    when: always
    reports:
      junit: target/surefire-reports/TEST-*.xml
    paths:
      - target/surefire-reports/
    expire_in: 7 days

backup-restore-test:
  stage: test
  image: alpine:3.19
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  needs: []
  script:
    - apk add --no-cache bash curl
    - chmod +x scripts/backup-restore-test.sh
    - ./scripts/backup-restore-test.sh
  allow_failure: false
  artifacts:
    when: always
    paths:
      - backup-test-report*.txt
    expire_in: 7 days

# ============================================================
# STAGE: e2e
# ============================================================

e2e-playwright:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.43.1-focal
  needs: [build]
  rules:
    - if: '$FAST_DEPLOY == "true"'
      when: never
    - when: on_success
  script:
    - |
      if [ ! -d "e2e" ]; then
        echo "Repertoire e2e/ absent — tests E2E ignores"
        exit 0
      fi
      cd e2e
      npm ci
      npx playwright install --with-deps
      npx playwright test
  after_script:
    - *discord_notify
  allow_failure: true
  artifacts:
    when: always
    paths:
      - e2e/playwright-report/
      - e2e/test-results/
    expire_in: 7 days

# ============================================================
# STAGE: package
# ============================================================

package:
  stage: package
  image: docker:27-cli
  needs:
    - job: build
    - job: test
      optional: true
    - job: e2e-playwright
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web"'
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - |
      ATTEMPT=0
      until docker build -f docker/Dockerfile -t "$DOCKER_IMAGE" -t "$DOCKER_IMAGE_LATEST" .; do
        ATTEMPT=$((ATTEMPT + 1))
        if [ $ATTEMPT -ge 3 ]; then echo "Echec build Docker apres 3 tentatives"; exit 1; fi
        echo "Tentative $ATTEMPT echouee, attente 10s..."
        sleep 10
      done
    - docker push "$DOCKER_IMAGE"
    - docker push "$DOCKER_IMAGE_LATEST"
  after_script:
    - *discord_notify

trivy-image-scan:
  stage: package
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  needs: [package]
  rules:
    - if: '$FAST_DEPLOY == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web"'
  script:
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format table "$DOCKER_IMAGE_LATEST"
  allow_failure: true

# ============================================================
# STAGE: deploy
# ============================================================

deploy:
  stage: deploy
  image: alpine:3.19
  needs: [package]
  rules:
    - if: '$FAST_DEPLOY == "true" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web")'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web"'
      when: manual
  environment:
    name: production
    url: https://docavocat.fr
  script:
    - apk add --no-cache openssh-client curl bash
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - eval $(ssh-agent -s)
    - echo "var_length=${#SSH_PRIVATE_KEY}"
    - echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/deploy_key 2>&1 && echo "base64_decode=OK" || echo "base64_decode=FAILED"
    - echo "key_bytes=$(wc -c < ~/.ssh/deploy_key)"
    - head -1 ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-add ~/.ssh/deploy_key
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - echo "$ENV_PROD" | ssh root@"${SERVER_HOST}" "cat > /opt/docavocat/.env && chmod 600 /opt/docavocat/.env"
    - |
      # Injecter les variables MinIO seulement si définies comme CI/CD vars et absentes de ENV_PROD
      if [ -n "${MINIO_ACCESS_KEY}" ] && [ -n "${MINIO_SECRET_KEY}" ]; then
        ssh root@"${SERVER_HOST}" "grep -q '^MINIO_ACCESS_KEY=' /opt/docavocat/.env || printf '\n# MinIO S3 (CX23 Hetzner)\nMINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}\nMINIO_SECRET_KEY=${MINIO_SECRET_KEY}\n' >> /opt/docavocat/.env"
      else
        echo "WARN: MINIO_ACCESS_KEY/SECRET_KEY non définis — ajouter dans GitLab Settings > CI/CD > Variables"
      fi
    - |
      ssh root@"${SERVER_HOST}" bash -s << 'ENDSSH'
      set -e
      cd /opt/docavocat

      # ── Blue/Green Zero-Downtime Deploy ────────────────────────
      # Principe : deux slots (blue=8080, green=8081)
      # La CI determine le slot inactif, le demarre, attend UP, bascule nginx, arrête l'ancien.
      # nginx -s reload est atomique cote TLS : 0 connexion droppee.

      UPSTREAM_FILE="/etc/nginx/conf.d/upstream-app.conf"

      # Creer le fichier upstream si absent (premiere installation)
      if [ ! -f "$UPSTREAM_FILE" ]; then
        echo "upstream docavocat_app { server 127.0.0.1:8080; }" > "$UPSTREAM_FILE"
      fi

      # Determiner le slot actif (blue=8080, green=8081)
      CURRENT_PORT=$(grep -oP '127\.0\.0\.1:\K\d+' "$UPSTREAM_FILE" | head -1)
      if [ "$CURRENT_PORT" = "8080" ]; then
        ACTIVE_SLOT="blue"
        IDLE_SLOT="green"
        IDLE_PORT="8081"
        ACTIVE_PORT="8080"
      else
        ACTIVE_SLOT="green"
        IDLE_SLOT="blue"
        IDLE_PORT="8080"
        ACTIVE_PORT="8081"
      fi
      echo "=== Blue/Green : actif=${ACTIVE_SLOT}:${ACTIVE_PORT} => deploiement sur ${IDLE_SLOT}:${IDLE_PORT} ==="

      echo "=== Nettoyage disque (images orphelines) ==="
      docker image prune -f || true
      df -h /

      echo "=== Pull nouvelle image sur slot ${IDLE_SLOT} ==="
      docker compose pull app-${IDLE_SLOT}

      echo "=== Verification MySQL ==="
      for i in $(seq 1 30); do
        docker compose exec -T mysql mysqladmin ping -h localhost --silent 2>/dev/null && echo "MySQL pret" && break || true
        echo "Attente MySQL ($i/30)..."
        sleep 2
      done

      echo "=== Demarrage slot ${IDLE_SLOT} (l ancien reste actif) ==="
      docker compose up -d --no-deps --force-recreate app-${IDLE_SLOT}

      echo "=== Attente health check slot ${IDLE_SLOT}:${IDLE_PORT} ==="
      READY=0
      for i in $(seq 1 60); do
        if curl -sf http://localhost:${IDLE_PORT}/actuator/health 2>/dev/null | grep -q '"status":"UP"'; then
          echo "Slot ${IDLE_SLOT} pret apres $((i*3))s"
          READY=1
          break
        fi
        echo "Attente ($i/60)..."
        sleep 3
      done

      if [ "$READY" != "1" ]; then
        echo "ERREUR: Slot ${IDLE_SLOT} non pret — rollback (slot ${ACTIVE_SLOT} reste actif)"
        docker compose stop app-${IDLE_SLOT} || true
        exit 1
      fi

      echo "=== Verification cle MFA ==="
      if [ ! -f config/keys/mfa.key ]; then
        echo "Attention: cle MFA absente dans config/keys/"
      fi

      echo "=== Bascule nginx vers slot ${IDLE_SLOT}:${IDLE_PORT} (reload atomique) ==="
      echo "upstream docavocat_app { server 127.0.0.1:${IDLE_PORT}; }" > "$UPSTREAM_FILE"
      nginx -t && nginx -s reload
      echo "Nginx pointe maintenant sur ${IDLE_SLOT}:${IDLE_PORT}"

      echo "=== Verification HTTP post-bascule ==="
      sleep 2
      HTTP_CODE=$(curl -so /dev/null -w "%{http_code}" https://docavocat.fr/ || echo "000")
      if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
        echo "Site accessible HTTP $HTTP_CODE"
      else
        echo "ERREUR: Site inaccessible apres bascule HTTP $HTTP_CODE — rollback nginx"
        echo "upstream docavocat_app { server 127.0.0.1:${ACTIVE_PORT}; }" > "$UPSTREAM_FILE"
        nginx -s reload
        docker compose stop app-${IDLE_SLOT} || true
        exit 1
      fi

      echo "=== Smoke tests ==="
      curl -sf https://docavocat.fr/actuator/health | grep -q '"status":"UP"' && echo "Health check OK" || echo "WARN: Health check KO"
      curl -sf https://docavocat.fr/login > /dev/null && echo "Page login OK" || echo "WARN: Page login KO"

      echo "=== Arret propre de l ancien slot ${ACTIVE_SLOT} ==="
      # Attendre 30s que les connexions en cours se terminent (keep-alive nginx)
      sleep 30
      docker compose stop app-${ACTIVE_SLOT} || true

      echo "=== Nettoyage images obsoletes ==="
      docker image prune -f || true

      echo "=== Deploiement Blue/Green termine : ${IDLE_SLOT}:${IDLE_PORT} est actif ==="
      ENDSSH
    - |
      # Purge cache Cloudflare après déploiement
      if [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && [ -n "${CLOUDFLARE_ZONE_ID:-}" ]; then
        echo "Purge cache Cloudflare..."
        HTTP=$(curl -sf -o /dev/null -w "%{http_code}" -X POST \
          "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
          -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
          -H "Content-Type: application/json" \
          -d '{"purge_everything":true}' || echo "000")
        if [ "$HTTP" = "200" ]; then
          echo "Cache Cloudflare purgé (HTTP 200)"
        else
          echo "WARN: Purge Cloudflare HTTP $HTTP (non bloquant)"
        fi
      else
        echo "CLOUDFLARE_API_TOKEN ou CLOUDFLARE_ZONE_ID absent — purge ignorée"
      fi
  after_script:
    - *discord_deploy_notify

dast-zap-baseline:
  stage: deploy
  image:
    name: ghcr.io/zaproxy/zaproxy:stable
    entrypoint: [""]
  needs: [deploy]
  rules:
    - if: '$FAST_DEPLOY == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web"'
  script:
    - mkdir -p /zap/wrk
    - |
      zap-baseline.py \
        -t https://docavocat.fr \
        -c zap-baseline.conf \
        -r zap-report.html \
        -x zap-report.xml \
        --auto || true
  allow_failure: true
  artifacts:
    when: always
    paths:
      - zap-report.html
      - zap-report.xml
    expire_in: 7 days
