# ============================================================
# GitLab CI/CD — gedavocat-springboot
# Stages: security -> build -> test -> e2e -> package -> deploy
# Runner: hetzner-cax11-runner (ARM64, tag: vps)
# ============================================================

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

stages:
  - security
  - build
  - test
  - e2e
  - package
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Djava.awt.headless=true"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end"
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  DOCKER_IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"
  REMOTE_DIR: "/opt/docavocat"

# ── Ancres Discord ────────────────────────────────────────────
.discord_notify: &discord_notify |
  if [ -n "${DISCORD_WEBHOOK:-}" ]; then
    if [ "${CI_JOB_STATUS}" = "success" ]; then COLOR=3066993; else COLOR=15158332; fi
    curl -sf -X POST "${DISCORD_WEBHOOK}" \
      -H "Content-Type: application/json" \
      -d "{\"embeds\":[{\"title\":\"CI: ${CI_JOB_NAME} (${CI_JOB_STATUS}) — ${CI_COMMIT_BRANCH}\",\"color\":${COLOR},\"fields\":[{\"name\":\"Commit\",\"value\":\"${CI_COMMIT_SHORT_SHA}\",\"inline\":true},{\"name\":\"Pipeline\",\"value\":\"#${CI_PIPELINE_ID}\",\"inline\":true}]}]}" \
      || true
  fi

.discord_deploy_notify: &discord_deploy_notify |
  if [ -n "${DISCORD_WEBHOOK:-}" ]; then
    if [ "${CI_JOB_STATUS}" = "success" ]; then COLOR=3066993; MSG="Deploiement reussi"; else COLOR=15158332; MSG="Deploiement echoue"; fi
    curl -sf -X POST "${DISCORD_WEBHOOK}" \
      -H "Content-Type: application/json" \
      -d "{\"embeds\":[{\"title\":\"${MSG} — ${CI_COMMIT_BRANCH}\",\"color\":${COLOR},\"fields\":[{\"name\":\"Commit\",\"value\":\"${CI_COMMIT_SHORT_SHA}\",\"inline\":true},{\"name\":\"URL\",\"value\":\"https://docavocat.fr\",\"inline\":true}]}]}" \
      || true
  fi

# ============================================================
# STAGE: security
# ============================================================

audit-code-security:
  stage: security
  image: maven:3.9-eclipse-temurin-17
  tags: [vps]
  script:
    - chmod +x ./audit-security.sh
    - ./audit-security.sh
  allow_failure: true
  artifacts:
    when: always
    paths:
      - audit-report*.txt
    expire_in: 7 days

owasp-dependency-check:
  stage: security
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]
  tags: [vps]
  script:
    - mkdir -p security-reports
    - /usr/share/dependency-check/bin/dependency-check.sh
      --project "gedavocat"
      --scan .
      --format "JSON"
      --out security-reports/
      || true
  allow_failure: false
  artifacts:
    when: always
    paths:
      - security-reports/
    expire_in: 7 days

snyk-security-scan:
  stage: security
  image: maven:3.9-eclipse-temurin-17
  tags: [vps]
  script:
    - |
      if [ -z "${SNYK_TOKEN:-}" ]; then
        echo "SNYK_TOKEN absent — scan ignore"
        exit 0
      fi
      npm install -g snyk
      snyk auth "$SNYK_TOKEN"
      snyk test --all-projects --severity-threshold=high || true
  allow_failure: true

trivy-security-scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  tags: [vps]
  script:
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL --format table .
  allow_failure: true

semgrep-sast:
  stage: security
  image: semgrep/semgrep:latest
  tags: [vps]
  script:
    - semgrep --config=auto --output semgrep-report.json --json . || true
  allow_failure: true
  artifacts:
    when: always
    paths:
      - semgrep-report.json
    expire_in: 7 days

gitleaks-secrets:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  tags: [vps]
  script:
    - gitleaks detect --source . --exit-code 0 --report-format json --report-path gitleaks-report.json || true
  allow_failure: true
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
    expire_in: 7 days

rgpd-check:
  stage: security
  image: alpine:3.19
  tags: [vps]
  script:
    - apk add --no-cache grep
    - |
      echo "=== Verification RGPD ==="
      FOUND=$(grep -rIin --include="*.java" --include="*.properties" \
        -E "password=|passwd=|secret=|private_key=" src/ 2>/dev/null | grep -v "placeholder\|example" || true)
      if [ -n "$FOUND" ]; then
        echo "Donnees sensibles potentielles:"
        echo "$FOUND"
      else
        echo "Aucune donnee sensible brute detectee"
      fi
  allow_failure: true

# ============================================================
# STAGE: build
# ============================================================

sbom-generate:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  tags: [vps]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web"'
  cache:
    key: "$CI_COMMIT_REF_SLUG-maven"
    paths:
      - .m2/repository/
  script:
    - mvn $MAVEN_CLI_OPTS org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom
  artifacts:
    when: always
    paths:
      - target/bom.json
      - target/bom.xml
    expire_in: 30 days

build:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  tags: [vps]
  needs:
    - audit-code-security
    - owasp-dependency-check
    - snyk-security-scan
    - trivy-security-scan
    - semgrep-sast
    - gitleaks-secrets
    - rgpd-check
  cache:
    key: "$CI_COMMIT_REF_SLUG-maven"
    paths:
      - .m2/repository/
  script:
    - mvn $MAVEN_CLI_OPTS compile
  after_script:
    - *discord_notify
  artifacts:
    paths:
      - target/
    expire_in: 1 hour

# ============================================================
# STAGE: test
# ============================================================

test:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  tags: [vps]
  needs: [build]
  cache:
    key: "$CI_COMMIT_REF_SLUG-maven"
    paths:
      - .m2/repository/
  variables:
    SPRING_PROFILES_ACTIVE: h2
  script:
    - |
      if [ "${FAST_DEPLOY:-false}" = "true" ]; then
        echo "FAST_DEPLOY active — tests ignores"
        exit 0
      fi
      mvn $MAVEN_CLI_OPTS test
  after_script:
    - *discord_notify
  artifacts:
    when: always
    reports:
      junit: target/surefire-reports/TEST-*.xml
    paths:
      - target/surefire-reports/
    expire_in: 7 days

backup-restore-test:
  stage: test
  image: alpine:3.19
  tags: [vps]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  needs: []
  script:
    - apk add --no-cache bash curl
    - chmod +x scripts/backup-restore-test.sh
    - ./scripts/backup-restore-test.sh
  allow_failure: false
  artifacts:
    when: always
    paths:
      - backup-test-report*.txt
    expire_in: 7 days

# ============================================================
# STAGE: e2e
# ============================================================

e2e-playwright:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.43.1-focal
  tags: [vps]
  needs: [build]
  script:
    - |
      if [ ! -d "e2e" ]; then
        echo "Repertoire e2e/ absent — tests E2E ignores"
        exit 0
      fi
      cd e2e
      npm ci
      npx playwright install --with-deps
      npx playwright test
  after_script:
    - *discord_notify
  allow_failure: true
  artifacts:
    when: always
    paths:
      - e2e/playwright-report/
      - e2e/test-results/
    expire_in: 7 days

# ============================================================
# STAGE: package
# ============================================================

package:
  stage: package
  image: docker:27-cli
  tags: [vps]
  needs: [build, test, e2e-playwright]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web"'
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - |
      ATTEMPT=0
      until docker build -f docker/Dockerfile -t "$DOCKER_IMAGE" -t "$DOCKER_IMAGE_LATEST" .; do
        ATTEMPT=$((ATTEMPT + 1))
        if [ $ATTEMPT -ge 3 ]; then echo "Echec build Docker apres 3 tentatives"; exit 1; fi
        echo "Tentative $ATTEMPT echouee, attente 10s..."
        sleep 10
      done
    - docker push "$DOCKER_IMAGE"
    - docker push "$DOCKER_IMAGE_LATEST"
  after_script:
    - *discord_notify

trivy-image-scan:
  stage: package
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  tags: [vps]
  needs: [package]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web"'
  script:
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format table "$DOCKER_IMAGE_LATEST"
  allow_failure: true

# ============================================================
# STAGE: deploy
# ============================================================

deploy:
  stage: deploy
  image: alpine:3.19
  tags: [vps]
  needs: [package]
  rules:
    - if: '$FAST_DEPLOY == "true" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web")'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web"'
      when: manual
  environment:
    name: production
    url: https://docavocat.fr
  script:
    - apk add --no-cache openssh-client curl bash
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - echo "$ENV_PROD" | ssh root@"${SERVER_HOST}" "cat > /opt/docavocat/.env && chmod 600 /opt/docavocat/.env"
    - |
      ssh root@"${SERVER_HOST}" bash -s << 'ENDSSH'
      set -e
      cd /opt/docavocat

      echo "=== Nettoyage disque ==="
      docker system prune -f --volumes || true
      df -h /

      echo "=== Deploiement Docker Compose ==="
      docker compose pull
      docker compose up -d --remove-orphans

      echo "=== Verification MySQL ==="
      for i in $(seq 1 30); do
        docker compose exec -T db mysqladmin ping -h localhost --silent 2>/dev/null && echo "MySQL pret" && break || true
        echo "Attente MySQL ($i/30)..."
        sleep 2
      done

      echo "=== Verification cle MFA ==="
      if [ ! -f config/keys/mfa.key ]; then
        echo "Attention: cle MFA absente dans config/keys/"
      fi

      echo "=== Attente Spring Boot ==="
      for i in $(seq 1 60); do
        curl -sf http://localhost:8080/actuator/health 2>/dev/null | grep -q '"status":"UP"' && echo "Application demarree" && break || true
        echo "Attente application ($i/60)..."
        sleep 3
      done

      echo "=== Verification HTTP ==="
      HTTP_CODE=$(curl -so /dev/null -w "%{http_code}" https://docavocat.fr/ || echo "000")
      if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ]; then
        echo "Site accessible HTTP $HTTP_CODE"
      else
        echo "ERREUR: Site inaccessible HTTP $HTTP_CODE"
        exit 1
      fi

      echo "=== Reload nginx ==="
      docker compose exec -T nginx nginx -t 2>/dev/null && docker compose exec -T nginx nginx -s reload || true

      echo "=== Smoke tests ==="
      curl -sf https://docavocat.fr/actuator/health | grep -q '"status":"UP"' && echo "Health check OK" || echo "Health check KO"
      curl -sf https://docavocat.fr/login > /dev/null && echo "Page login OK" || echo "Page login KO"

      echo "=== Deploiement termine ==="
      ENDSSH
  after_script:
    - *discord_deploy_notify

dast-zap-baseline:
  stage: deploy
  image:
    name: ghcr.io/zaproxy/zaproxy:stable
    entrypoint: [""]
  tags: [vps]
  needs: [deploy]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "web"'
  script:
    - mkdir -p /zap/wrk
    - |
      zap-baseline.py \
        -t https://docavocat.fr \
        -c zap-baseline.conf \
        -r zap-report.html \
        -x zap-report.xml \
        --auto || true
  allow_failure: true
  artifacts:
    when: always
    paths:
      - zap-report.html
      - zap-report.xml
    expire_in: 7 days
