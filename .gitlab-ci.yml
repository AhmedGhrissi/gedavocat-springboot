# ============================================================
# DocAvocat — Pipeline CI/CD GitLab
#
# COMPORTEMENT PAR BRANCHE :
#
#   Branche feature (ex: JC, dev, fix/...)  push :
#     -> security + build + test automatiques
#     -> JAMAIS de package ou deploy
#
#   Branche main  push automatique :
#     -> AUCUN pipeline (protege la prod des pushs accidentels)
#
#   Branche main  Run pipeline MANUEL (GitLab UI) :
#     -> security -> build -> test -> package -> deploy (manuel)
#     -> Notifications Discord a chaque etape
#
# WORKFLOW RECOMMANDE :
#   1. Developper sur une branche feature
#   2. Push -> CI valide automatiquement (security + build + test)
#   3. Merge Request -> review -> merge dans main
#   4. GitLab -> CI/CD -> Pipelines -> "Run pipeline" sur main
#   5. Suivre les etapes, cliquer Play sur deploy pour mettre en prod
#
# VARIABLES GITLAB (Settings > CI/CD > Variables) :
#   SSH_PRIVATE_KEY  File     Protected    Cle privee SSH du serveur
#   SSH_KNOWN_HOSTS  Variable Protected    Fingerprints serveur (ssh-keyscan)
#   ENV_PROD         File     Protected    Contenu du fichier .env prod
#   DISCORD_WEBHOOK  Variable Masked       URL du webhook Discord
#   NVD_API_KEY      Variable Protected    Cle API NVD (nvd.nist.gov — gratuit)
#
# VARIABLES OPTIONNELLES (Run pipeline > Variables) :
#   SKIP_SECURITY    true     Pour tester rapidement sans scans (dev only)
# ============================================================

# Controle du declenchement des pipelines
workflow:
  rules:
    # main en push automatique -> bloque (protege la prod)
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
      when: never
    # main declenche manuellement (Run pipeline dans l'UI) -> OK
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "web"
      when: always
    # Merge Requests -> security + build + test automatiques
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    # Branches feature -> security + build + test automatiques
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "main"
      when: always

default:
  tags:
    - vps

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --no-transfer-progress"
  REMOTE_DIR: "/opt/docavocat"

stages:
  - security      # ← NOUVEAU — tolérance zéro, bloque tout si échec
  - build
  - test
  - package
  - deploy

# ────────────────────────────────────────────────────────────────
# ANCRES DISCORD (inchangées)
# ────────────────────────────────────────────────────────────────

.discord_commit_notify: &discord_commit_notify
  - |
    WEBHOOK="${DISCORD_WEBHOOK:-${DISCORD_COMMIT_WEBHOOK:-}}"
    if [ -z "$WEBHOOK" ]; then
      echo "Discord webhook non configure, notification ignoree"
    else
      apt-get update -qq && apt-get install -yqq curl > /dev/null 2>&1 || apk add --no-cache curl --quiet 2>/dev/null || true
      BRANCH="${CI_COMMIT_BRANCH:-MR}"
      AUTHOR="${GITLAB_USER_NAME:-CI}"
      SHA="${CI_COMMIT_SHORT_SHA:-????}"
      TITLE="${CI_COMMIT_TITLE:-}"
      COMMIT_MSG=$(printf '%s' "$TITLE" | head -c 80 | sed 's/\/\\/g; s/"/\"/g; s/\t/ /g')
      PAYLOAD=$(printf '{"embeds":[{"title":"%s %s","description":"**Branche :** `%s`\n**Commit :** [`%s`](%s)\n**Par :** %s\n**Message :** %s\n\n[Logs job ->](%s/-/jobs/%s)","color":%s,"footer":{"text":"DocAvocat CI/CD"},"timestamp":"%s"}]}' 
        "$EMOJI" "$STATUS" 
        "$BRANCH" "$SHA" "$CI_PIPELINE_URL" "$AUTHOR" "$COMMIT_MSG" 
        "$CI_PROJECT_URL" "$CI_JOB_ID" 
        "$COLOR" 
        "$(date -u '+%Y-%m-%dT%H:%M:%SZ')")
      RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK" \
           -H "Content-Type: application/json" \
           -d "$PAYLOAD" 2>/dev/null || echo "000")
      echo "Discord commit notify: HTTP $RESPONSE"
    fi
    true

.discord_deploy_notify: &discord_deploy_notify
  - |
    if [ -z "${DISCORD_WEBHOOK:-}" ]; then
      echo "Discord webhook non configure, notification ignoree"
    else
      BRANCH="${CI_COMMIT_BRANCH:-MR}"
      AUTHOR="${GITLAB_USER_NAME:-CI}"
      SHA="${CI_COMMIT_SHORT_SHA:-????}"
      TITLE="${CI_COMMIT_TITLE:-}"
      COMMIT_MSG=$(printf '%s' "$TITLE" | head -c 80 | sed 's/\/\\/g; s/"/\"/g; s/\t/ /g')
      PAYLOAD=$(printf '{"embeds":[{"title":"%s %s","description":"**Branche :** `%s`\n**Commit :** [`%s`](%s)\n**Par :** %s\n**Message :** %s\n\n[Logs job ->](%s/-/jobs/%s)","color":%s,"footer":{"text":"DocAvocat CI/CD"},"timestamp":"%s"}]}' \
        "$EMOJI" "$STATUS" \
        "$BRANCH" "$SHA" "$CI_PIPELINE_URL" "$AUTHOR" "$COMMIT_MSG" \
        "$CI_PROJECT_URL" "$CI_JOB_ID" \
        "$COLOR" \
        "$(date -u '+%Y-%m-%dT%H:%M:%SZ')")
      RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${DISCORD_WEBHOOK}" \
           -H "Content-Type: application/json" \
           -d "$PAYLOAD" 2>/dev/null || echo "000")
      echo "Discord deploy notify: HTTP $RESPONSE"
    fi
    true

# ──────────────────────────────────────────────────────────────────
# STAGE 0 : SECURITY (NOUVEAU — bloquant, toutes branches)
# ──────────────────────────────────────────────────────────────────
audit-code-security:
  stage: security
  image: maven:3.9-eclipse-temurin-17
  variables:
    # Skip OWASP dans audit-security.sh (job dédié owasp-dependency-check le fait déjà)
    SKIP_OWASP_AUDIT: "true"
  rules:
    - if: '$SKIP_SECURITY == "true"'
      when: never
    - when: always
  before_script:
    - apt-get update -qq && apt-get install -yqq curl nodejs npm git > /dev/null 2>&1 || true
    - chmod +x ./audit-security.sh
    # Notification Discord : audit démarre
    - |
      WEBHOOK="${DISCORD_WEBHOOK:-}"
      [ -z "$WEBHOOK" ] && true || {
        PAYLOAD=$(printf '{"embeds":[{"title":"[SHIELD] Audit securite demarre","description":"**Branche :** `%s`\n**Commit :** [`%s`](%s)\n**Par :** %s\n\n*Analyse OWASP, secrets, injections, RGPD...*","color":16776960,"footer":{"text":"DocAvocat CI/CD"},"timestamp":"%s"}]}' \
          "${CI_COMMIT_BRANCH:-MR}" "${CI_COMMIT_SHORT_SHA:-????}" \
          "$CI_PIPELINE_URL" "${GITLAB_USER_NAME:-CI}" \
          "$(date -u '+%Y-%m-%dT%H:%M:%SZ')")
        curl -s -o /dev/null -X POST "$WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD" || true
      }
  script:
    - echo "========================================="
    - echo "AUDIT SECURITE — TOLERANCE ZERO"
    - echo "========================================="
    - ./audit-security.sh
  after_script:
    - |
      if [ "$CI_JOB_STATUS" = "success" ]; then
        EMOJI="[SHIELD]"; STATUS="Audit securite OK — aucune faille critique"; COLOR=3066993
      else
        EMOJI="[ALERT]"; STATUS="AUDIT ECHOUE — faille securite detectee ! Deploy BLOQUE"; COLOR=15158332
      fi
    - *discord_commit_notify
  artifacts:
    name: "audit-security-$CI_COMMIT_SHORT_SHA"
    when: always
    paths:
      - security-reports/
    expire_in: 90 days
  allow_failure: false   # BLOQUANT — ne jamais changer
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository/
    policy: pull

owasp-dependency-check:
  stage: security
  image: maven:3.9-eclipse-temurin-17
  timeout: 30m  # Timeout 30 minutes (sans clé NVD, prend ~20-30min)
  rules:
    - if: '$SKIP_SECURITY == "true"'
      when: never
    - when: always
  before_script:
    - apt-get update -qq && apt-get install -yqq curl > /dev/null 2>&1 || true
  script:
    - echo "========================================="
    - echo "OWASP DEPENDENCY CHECK — CVE >= 7.0"
    - echo "========================================="
    - mkdir -p security-reports
    - |
      MVN_ARGS="$MAVEN_CLI_OPTS org.owasp:dependency-check-maven:check \
        -DfailBuildOnCVSS=7 \
        -Dformat=HTML \
        -DoutputDirectory=security-reports/"
      # Ajouter la clé NVD si disponible (évite le rate-limiting)
      if [ -n "${NVD_API_KEY:-}" ]; then
        MVN_ARGS="$MVN_ARGS -DnvdApiKey=$NVD_API_KEY"
        echo "NVD_API_KEY configurée — scan rapide (~2-3 min)"
      else
        echo "NVD_API_KEY non définie — scan lent (~20-30 min sans clé)"
        echo "Obtenir une clé gratuite : https://nvd.nist.gov/developers/request-an-api-key"
      fi
      mvn $MVN_ARGS

